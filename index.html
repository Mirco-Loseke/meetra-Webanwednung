        <button style={{background:"transparent",border:"none",color:"#888",cursor:"pointer",fontSize:14,padding:"0 0 18px",display:"flex",alignItems:"center",gap:6,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>setShowShopping(false)}>← Zurück</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div><h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:0}}>Einkaufsliste</h1><p style={{color:"#666",fontSize:13,marginTop:4}}>{shoppingList.length} Artikel</p></div>
          <div style={{display:"flex",gap:10}}>
            {Object.keys(checkedItems).some(k=>checkedItems[k])&&<button style={{background:"#EF476F22",border:"1px solid #EF476F44",borderRadius:9,padding:"9px 16px",color:"#EF476F",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}} onClick={clearChecked}>Erledigte löschen</button>}
            <button style={{background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:9,padding:"9px 16px",color:"#888",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>setShoppingList([])}>Leeren</button>
          </div>
        </div>
        {Object.entries(grouped).map(([recipe,items])=>(
          <div key={recipe} style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>{recipe}</div>
            <div style={{background:"#111114",border:"1px solid #1E1E24",borderRadius:14,overflow:"hidden"}}>
              {items.map((item,i)=>(
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 18px",borderBottom:i<items.length-1?"1px solid #1A1A1F":"none",cursor:"pointer",opacity:checkedItems[item.id]?0.4:1}} onClick={()=>toggleCheck(item.id)}>
                  <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${checkedItems[item.id]?"#06D6A0":"#2A2A30"}`,background:checkedItems[item.id]?"#06D6A0":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
                    {checkedItems[item.id]&&<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="white" strokeWidth="3"><path d="M5 13l4 4L19 7"/></svg>}
                  </div>
                  <span style={{flex:1,fontSize:14,fontWeight:600,textDecoration:checkedItems[item.id]?"line-through":"none"}}>{item.name}</span>
                  <span style={{fontSize:13,color:"#888"}}>{item.amount}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
        {!shoppingList.length&&<div style={{textAlign:"center",padding:"60px 20px",color:"#555",border:"2px dashed #1E1E24",borderRadius:16}}><div style={{fontSize:40,marginBottom:12}}>🛒</div><div>Einkaufsliste ist leer</div></div>}
      </div>
    );
  }

  return(
    <div style={{padding:"28px 32px 56px",maxWidth:940,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
        <div><h1 style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,margin:0,letterSpacing:"-0.5px"}}>Kochbuch</h1><p style={{color:"#666",fontSize:13,marginTop:4}}>{recipes.length} Rezepte</p></div>
        <div style={{display:"flex",gap:10}}>
          <button style={{background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:10,padding:"10px 18px",color:"#aaa",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:7}} onClick={()=>setShowShopping(true)}>
            🛒 Einkaufsliste {shoppingList.length>0&&<span style={{background:"#FF6B35",color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{shoppingList.length}</span>}
          </button>
          <button style={{background:"#FF6B35",border:"none",borderRadius:10,padding:"10px 18px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={()=>setShowAdd(o=>!o)}>
            + Rezept
          </button>
        </div>
      </div>

      {/* Search + Filter */}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <button style={{background:searchMode==="local"?"#FF6B35":"#111114",border:`1px solid ${searchMode==="local"?"#FF6B35":"#2A2A30"}`,borderRadius:9,padding:"9px 16px",color:searchMode==="local"?"#fff":"#888",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",flexShrink:0}} onClick={()=>{setSearchMode("local");setApiRecipes([]);}}>Meine Rezepte</button>
        <button style={{background:searchMode==="api"?"#FF6B35":"#111114",border:`1px solid ${searchMode==="api"?"#FF6B35":"#2A2A30"}`,borderRadius:9,padding:"9px 16px",color:searchMode==="api"?"#fff":"#888",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",flexShrink:0}} onClick={()=>{setSearchMode("api");setApiRecipes([]);}}>🌍 Open Food Facts</button>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <input style={{flex:1,minWidth:200,background:"#111114",border:"1px solid #2A2A30",borderRadius:9,padding:"10px 14px",color:"#F0EDE8",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none"}} placeholder={searchMode==="api"?"Produkt suchen (mind. 3 Zeichen)...":"Rezept suchen..."} value={search} onChange={e=>setSearch(e.target.value)}/>
        {searchMode==="local"&&<div style={{display:"flex",gap:7}}>
          {cats.map(cat=><button key={cat} style={{background:filterCat===cat?(CAT_COLORS[cat]||"#FF6B35"):"#111114",border:`1px solid ${filterCat===cat?(CAT_COLORS[cat]||"#FF6B35"):"#2A2A30"}`,borderRadius:9,padding:"9px 14px",color:filterCat===cat?"#000":"#888",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>setFilterCat(cat)}>{cat}</button>)}
        </div>}
      </div>
      {searchMode==="api"&&apiLoading&&<div style={{textAlign:"center",padding:"24px",color:"#888",fontSize:13}}>🔍 Suche in Open Food Facts...</div>}
      {searchMode==="api"&&!apiLoading&&search.length>=3&&apiRecipes.length===0&&<div style={{textAlign:"center",padding:"24px",color:"#555",fontSize:13}}>Keine Ergebnisse für "{search}"</div>}

      {/* Add recipe form */}
      {showAdd&&<div style={{background:"#111114",border:"1px solid #2A2A30",borderRadius:16,padding:22,marginBottom:22}} className="fadeIn">
        <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,margin:"0 0 16px"}}>Neues Rezept</h3>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:11,marginBottom:11}}>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Name</label><input style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newRecipe.name} onChange={e=>setNewRecipe(r=>({...r,name:e.target.value}))} placeholder="Rezeptname"/></div>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Kategorie</label><select style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newRecipe.category} onChange={e=>setNewRecipe(r=>({...r,category:e.target.value}))}>{["Frühstück","Mittagessen","Abendessen","Snack"].map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Zeit (Min)</label><input type="number" style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newRecipe.time} onChange={e=>setNewRecipe(r=>({...r,time:e.target.value}))} placeholder="20"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:14}}>
          {[["Kalorien","kcal","#FF6B35"],["Protein (g)","protein","#00D9C0"],["Carbs (g)","carbs","#FFD166"],["Fett (g)","fat","#A78BFA"]].map(([label,key,color])=>(
            <div key={key}><label style={{display:"block",fontSize:11,fontWeight:600,color,marginBottom:5,textTransform:"uppercase"}}>{label}</label><input type="number" style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newRecipe[key]} onChange={e=>setNewRecipe(r=>({...r,[key]:e.target.value}))} placeholder="0"/></div>
          ))}
        </div>
        <div style={{marginBottom:11}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Tags (kommagetrennt)</label>
          <input style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newRecipe.tags} onChange={e=>setNewRecipe(r=>({...r,tags:e.target.value}))} placeholder="High Protein, Quick, Low Carb"/>
        </div>
        <div style={{display:"flex",gap:12}}>
          <button style={{background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:9,padding:"10px 18px",color:"#aaa",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={()=>setShowAdd(false)}>Abbrechen</button>
          <button style={{background:"#FF6B35",border:"none",borderRadius:9,padding:"10px 18px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={saveNewRecipe}>Speichern</button>
        </div>
      </div>}

      {/* Recipe Grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
        {filtered.map(r=>(
          <div key={r.id} style={{background:"#111114",border:"1px solid #1E1E24",borderRadius:16,overflow:"hidden",cursor:"pointer",transition:"transform 0.2s,box-shadow 0.2s"}} className="planCard" onClick={()=>setSelRecipe(r)}>
            <div style={{background:`linear-gradient(135deg,${CAT_COLORS[r.category]||"#FF6B35"}30,#0D0D0F)`,padding:"18px 18px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <span style={{background:CAT_COLORS[r.category]||"#FF6B35",borderRadius:7,padding:"3px 10px",fontSize:10,fontWeight:700,color:"#000"}}>{r.category}</span>
                <span style={{fontSize:12,color:"#888"}}>⏱ {r.time} Min</span>
              </div>
              <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,margin:"0 0 6px"}}>{r.name}</h3>
              <div style={{display:"flex",gap:10,fontSize:11}}>
                <span style={{color:"#FF6B35"}}>🔥 {r.kcal}</span>
                <span style={{color:"#00D9C0"}}>💪 {r.protein}g</span>
                <span style={{color:"#FFD166"}}>🍞 {r.carbs}g</span>
                <span style={{color:"#A78BFA"}}>🥑 {r.fat}g</span>
              </div>
            </div>
            <div style={{padding:"10px 18px 14px"}}>
              <div style={{fontSize:12,color:"#666",marginBottom:8}}>{r.ingredients?.length||0} Zutaten</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                {(r.tags||[]).slice(0,3).map((tag,i)=><span key={i} style={{fontSize:10,background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:5,padding:"2px 8px",color:"#888"}}>{tag}</span>)}
              </div>
              <button style={{width:"100%",background:"transparent",border:"1px solid #2A2A30",borderRadius:8,padding:"8px",color:"#888",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s"}} onClick={e=>{e.stopPropagation();addToShopping(r);}}>
                🛒 Zur Einkaufsliste
              </button>
            </div>
          </div>
        ))}
      </div>
      {!filtered.length&&<div style={{textAlign:"center",padding:"60px 20px",color:"#555",border:"2px dashed #1E1E24",borderRadius:16,marginTop:16}}><div style={{fontSize:40,marginBottom:12}}>🍽️</div><div>Keine Rezepte gefunden</div></div>}
    </div>
  );
}


// ─── Goals Page ───────────────────────────────────────────────────────────────
function GoalsPage({user,setUser,data,notify}){
  const [goals,setGoals]=useState(()=>{try{const r=localStorage.getItem("ff_goals");return r?JSON.parse(r):[
    {id:1,title:"10kg abnehmen",category:"Gewicht",target:10,current:3,unit:"kg",deadline:"2025-06-01",color:"#FF6B35",icon:"⚖️",done:false},
    {id:2,title:"5x pro Woche trainieren",category:"Training",target:5,current:3,unit:"x/Woche",deadline:"2025-04-01",color:"#00D9C0",icon:"💪",done:false},
    {id:3,title:"100kg Bankdrücken",category:"Kraft",target:100,current:85,unit:"kg",deadline:"2025-12-01",color:"#A78BFA",icon:"🏋️",done:false},
  ];}catch{return[];}});
  const [showAdd,setShowAdd]=useState(false);
  const [newGoal,setNewGoal]=useState({title:"",category:"Training",target:"",current:"",unit:"",deadline:"",color:"#FF6B35",icon:"🎯"});
  const [editId,setEditId]=useState(null);

  useEffect(()=>localStorage.setItem("ff_goals",JSON.stringify(goals)),[goals]);

  const saveGoal=()=>{
    if(!newGoal.title||!newGoal.target)return notify("Titel und Ziel ausfüllen","error");
    if(editId){
      setGoals(g=>g.map(x=>x.id===editId?{...x,...newGoal,target:parseFloat(newGoal.target),current:parseFloat(newGoal.current)||0}:x));
      notify("Ziel aktualisiert! ✅");
    } else {
      setGoals(g=>[...g,{...newGoal,id:Date.now(),target:parseFloat(newGoal.target),current:parseFloat(newGoal.current)||0,done:false}]);
      notify("Ziel hinzugefügt! 🎯");
    }
    setShowAdd(false);setEditId(null);
    setNewGoal({title:"",category:"Training",target:"",current:"",unit:"",deadline:"",color:"#FF6B35",icon:"🎯"});
  };

  const updateProgress=(id,val)=>setGoals(g=>g.map(x=>x.id===id?{...x,current:parseFloat(val)||0,done:parseFloat(val)>=x.target}:x));
  const delGoal=id=>{setGoals(g=>g.filter(x=>x.id!==id));notify("Ziel gelöscht");};
  const toggleDone=id=>setGoals(g=>g.map(x=>x.id===id?{...x,done:!x.done}:x));

  const ICONS=["🎯","💪","⚖️","🏋️","🏃","🥗","❤️","🧘","🚴","🏊","⚡","🔥"];
  const CATS=["Training","Gewicht","Kraft","Ausdauer","Ernährung","Gesundheit"];
  const COLORS=["#FF6B35","#00D9C0","#FFD166","#A78BFA","#EF476F","#06D6A0","#4361EE","#F72585"];

  // Stats
  const totalGoals=goals.length;
  const doneGoals=goals.filter(g=>g.done).length;
  const avgProgress=totalGoals?Math.round(goals.reduce((a,g)=>a+Math.min(g.current/g.target*100,100),0)/totalGoals):0;
  const totalWorkouts=data.workouts.length;
  const thisWeekW=data.workouts.filter(w=>new Date(w.date)>=new Date(Date.now()-7*864e5)).length;

  return(
    <div style={{padding:"28px 32px 56px",maxWidth:940,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div><h1 style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,margin:0,letterSpacing:"-0.5px"}}>Meine Ziele</h1><p style={{color:"#666",fontSize:13,marginTop:4}}>Verfolge deinen Fortschritt</p></div>
        <button style={{background:"#FF6B35",border:"none",borderRadius:10,padding:"11px 20px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={()=>{setShowAdd(o=>!o);setEditId(null);setNewGoal({title:"",category:"Training",target:"",current:"",unit:"",deadline:"",color:"#FF6B35",icon:"🎯"});}}>+ Neues Ziel</button>
      </div>

      {/* Overview Cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:28}}>
        {[[`${doneGoals}/${totalGoals}`,"Ziele erreicht","#FF6B35","🎯"],[`${avgProgress}%`,"Ø Fortschritt","#00D9C0","📈"],[totalWorkouts,"Trainings","#A78BFA","💪"],[thisWeekW,"Diese Woche","#FFD166","🔥"]].map(([v,l,c,ic],i)=>(
          <div key={i} style={{background:"#111114",border:"1px solid #1E1E24",borderRadius:14,padding:"18px",textAlign:"center"}} className="statCard">
            <div style={{fontSize:22,marginBottom:6}}>{ic}</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#666",marginTop:4}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Add/Edit Form */}
      {showAdd&&<div style={{background:"#111114",border:"1px solid #2A2A30",borderRadius:16,padding:22,marginBottom:24}} className="fadeIn">
        <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,margin:"0 0 16px"}}>{editId?"Ziel bearbeiten":"Neues Ziel"}</h3>
        {/* Icon picker */}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:7,textTransform:"uppercase"}}>Icon</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ICONS.map(ic=><button key={ic} style={{width:38,height:38,borderRadius:9,background:newGoal.icon===ic?"#FF6B3530":"#1A1A1F",border:`1px solid ${newGoal.icon===ic?"#FF6B35":"#2A2A30"}`,cursor:"pointer",fontSize:18}} onClick={()=>setNewGoal(g=>({...g,icon:ic}))}>{ic}</button>)}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:11,marginBottom:11}}>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Titel</label><input style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newGoal.title} onChange={e=>setNewGoal(g=>({...g,title:e.target.value}))} placeholder="z.B. 10kg abnehmen"/></div>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Kategorie</label><select style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newGoal.category} onChange={e=>setNewGoal(g=>({...g,category:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:11,marginBottom:11}}>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Zielwert</label><input type="number" style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newGoal.target} onChange={e=>setNewGoal(g=>({...g,target:e.target.value}))} placeholder="100"/></div>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Aktuell</label><input type="number" style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newGoal.current} onChange={e=>setNewGoal(g=>({...g,current:e.target.value}))} placeholder="0"/></div>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Einheit</label><input style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newGoal.unit} onChange={e=>setNewGoal(g=>({...g,unit:e.target.value}))} placeholder="kg"/></div>
          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:5,textTransform:"uppercase"}}>Deadline</label><input type="date" style={{width:"100%",background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:8,padding:"9px 12px",color:"#F0EDE8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}} value={newGoal.deadline} onChange={e=>setNewGoal(g=>({...g,deadline:e.target.value}))}/></div>
        </div>
        {/* Color */}
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:"#888",marginBottom:7,textTransform:"uppercase"}}>Farbe</label>
          <div style={{display:"flex",gap:8}}>{COLORS.map(c=><div key={c} onClick={()=>setNewGoal(g=>({...g,color:c}))} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",outline:newGoal.color===c?`3px solid ${c}`:"none",outlineOffset:2}} className="colorSwatch"/>)}</div>
        </div>
        <div style={{display:"flex",gap:11}}>
          <button style={{background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:9,padding:"10px 18px",color:"#aaa",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={()=>{setShowAdd(false);setEditId(null);}}>Abbrechen</button>
          <button style={{background:"#FF6B35",border:"none",borderRadius:9,padding:"10px 18px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={saveGoal}>Speichern</button>
        </div>
      </div>}

      {/* Goals Grid */}
      {!goals.length&&<div style={{textAlign:"center",padding:"60px 20px",color:"#555",border:"2px dashed #1E1E24",borderRadius:16}}><div style={{fontSize:48,marginBottom:12}}>🎯</div><div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Noch keine Ziele</div><div style={{fontSize:13}}>Setze dir dein erstes Ziel!</div></div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
        {goals.map(goal=>{
          const pct=Math.min(goal.current/goal.target*100,100);
          const daysLeft=goal.deadline?Math.ceil((new Date(goal.deadline)-new Date())/864e5):null;
          return(
            <div key={goal.id} style={{background:"#111114",border:`1px solid ${goal.done?"#06D6A0":"#1E1E24"}`,borderRadius:16,padding:20,position:"relative",opacity:goal.done?0.8:1,transition:"all 0.2s"}} className="statCard">
              {goal.done&&<div style={{position:"absolute",top:14,right:14,background:"#06D6A020",border:"1px solid #06D6A0",borderRadius:8,padding:"3px 10px",fontSize:11,color:"#06D6A0",fontWeight:700}}>✓ Erreicht!</div>}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <div style={{width:44,height:44,borderRadius:12,background:goal.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{goal.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{goal.title}</div>
                  <div style={{fontSize:11,color:"#888"}}>{goal.category}</div>
                </div>
              </div>
              {/* Progress bar */}
              <div style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:700,color:goal.color}}>{goal.current} {goal.unit}</span>
                  <span style={{fontSize:12,color:"#666"}}>Ziel: {goal.target} {goal.unit}</span>
                </div>
                <div style={{height:8,background:"#1A1A1F",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:goal.color,borderRadius:4,transition:"width 0.5s"}}/>
                </div>
                <div style={{fontSize:11,color:"#888",marginTop:4}}>{Math.round(pct)}% erreicht</div>
              </div>
              {/* Update progress */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <input type="number" style={{flex:1,background:"#0D0D0F",border:"1px solid #2A2A30",borderRadius:7,padding:"7px 10px",color:"#F0EDE8",fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:"none"}} value={goal.current} onChange={e=>updateProgress(goal.id,e.target.value)} placeholder="Aktuell"/>
                <span style={{fontSize:11,color:"#666"}}>{goal.unit}</span>
              </div>
              {/* Deadline */}
              {daysLeft!==null&&<div style={{fontSize:11,color:daysLeft<7?"#EF476F":daysLeft<30?"#FFD166":"#666",marginBottom:10}}>
                {daysLeft>0?`📅 Noch ${daysLeft} Tage`:daysLeft===0?"📅 Heute!":"⚠️ Abgelaufen"}
              </div>}
              <div style={{display:"flex",gap:8}}>
                <button style={{flex:1,background:"transparent",border:`1px solid ${goal.done?"#1E1E24":"#06D6A030"}`,borderRadius:8,padding:"7px",color:goal.done?"#555":"#06D6A0",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>toggleDone(goal.id)}>
                  {goal.done?"↩ Zurücksetzen":"✓ Als erreicht"}
                </button>
                <button style={{background:"transparent",border:"1px solid #1E1E24",borderRadius:8,padding:"7px 10px",color:"#555",cursor:"pointer",fontSize:12}} onClick={()=>{setEditId(goal.id);setNewGoal({...goal,target:String(goal.target),current:String(goal.current)});setShowAdd(true);}}>✏️</button>
                <button style={{background:"transparent",border:"1px solid #1E1E24",borderRadius:8,padding:"7px 10px",color:"#555",cursor:"pointer",fontSize:12}} onClick={()=>delGoal(goal.id)}>🗑</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── BIBLIOTHEK ───────────────────────────────────────────────────────────────
const MUSCLE_GROUPS=["Arme","Rücken","Brust","Schultern","Bauch","Oberschenkel","Unterschenkel","Gesäß"];
const TRAINING_TYPES=["Krafttraining","Ausdauertraining","Cardio","HIIT","Mobility / Beweglichkeit","Stretching / Dehnen"];
const MUSCLE_COLORS={Arme:"#FF6B35",Rücken:"#A78BFA",Brust:"#00D9C0",Schultern:"#4361EE",Bauch:"#EF476F",Oberschenkel:"#FFD166",Unterschenkel:"#06D6A0",Gesäß:"#F72585"};
const TYPE_COLORS={Krafttraining:"#3B82F6",Ausdauertraining:"#10B981",Cardio:"#F59E0B",HIIT:"#EF476F","Mobility / Beweglichkeit":"#CBFF8C","Stretching / Dehnen":"#FF9F1C"};

function LibraryPage({library,setLibrary,notify}){
  const [filterMuscle,setFilterMuscle]=useState([]);
  const [filterType,setFilterType]=useState([]);
  const [search,setSearch]=useState("");
  const [showForm,setShowForm]=useState(false);
  const [editEx,setEditEx]=useState(null);
  const [detailEx,setDetailEx]=useState(null);

  const filtered=library.filter(ex=>{
    const matchSearch=!search||ex.name.toLowerCase().includes(search.toLowerCase());
    const matchMuscle=!filterMuscle.length||filterMuscle.some(m=>ex.muscles?.includes(m));
    const matchType=!filterType.length||filterType.some(t=>ex.types?.includes(t));
    return matchSearch&&matchMuscle&&matchType;
  });

  const delEx=id=>{setLibrary(l=>l.filter(e=>e.id!==id));notify("Übung gelöscht");};
  const saveEx=ex=>{
    if(editEx){setLibrary(l=>l.map(e=>e.id===editEx.id?{...editEx,...ex}:e));notify("Übung aktualisiert ✏️");}
    else{setLibrary(l=>[...l,{...ex,id:Date.now()}]);notify("Übung gespeichert! 💪");}
    setShowForm(false);setEditEx(null);
  };

  const toggleArr=(arr,setArr,val)=>setArr(a=>a.includes(val)?a.filter(x=>x!==val):[...a,val]);

  return(
    <div style={s.page}>
      <div style={s.pageHead}>
        <div><h1 style={s.pageTitle}>Bibliothek</h1><p style={s.pageSub}>{library.length} Übungen gespeichert</p></div>
        <button style={s.primaryBtn} onClick={()=>{setEditEx(null);setShowForm(true);}}>{IC.plus} Übung erstellen</button>
      </div>

      {/* Search + Filter */}
      <div style={{background:"#111114",border:"1px solid #1E1E24",borderRadius:16,padding:20,marginBottom:22}}>
        <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center"}}>
          <div style={{flex:1,position:"relative"}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#666",display:"flex"}}>{IC.search}</span>
            <input style={{...s.inp,paddingLeft:36}} placeholder="Übung suchen..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {(filterMuscle.length||filterType.length)>0&&<button style={{...s.secBtn,padding:"10px 14px",fontSize:12}} onClick={()=>{setFilterMuscle([]);setFilterType([]);}}>✕ Filter</button>}
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Muskelgruppe</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {MUSCLE_GROUPS.map(m=>(
              <button key={m} onClick={()=>toggleArr(filterMuscle,setFilterMuscle,m)} style={{background:filterMuscle.includes(m)?MUSCLE_COLORS[m]+"22":"#1A1A1F",border:`1px solid ${filterMuscle.includes(m)?MUSCLE_COLORS[m]:"#2A2A30"}`,borderRadius:20,padding:"5px 13px",color:filterMuscle.includes(m)?MUSCLE_COLORS[m]:"#888",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s"}}>{m}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Trainingsart</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {TRAINING_TYPES.map(t=>(
              <button key={t} onClick={()=>toggleArr(filterType,setFilterType,t)} style={{background:filterType.includes(t)?TYPE_COLORS[t]+"22":"#1A1A1F",border:`1px solid ${filterType.includes(t)?TYPE_COLORS[t]:"#2A2A30"}`,borderRadius:20,padding:"5px 13px",color:filterType.includes(t)?TYPE_COLORS[t]:"#888",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s"}}>{t}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Grid */}
      {!filtered.length&&(
        <div style={{textAlign:"center",padding:"80px 20px",color:"#555",border:"2px dashed #1E1E24",borderRadius:18}}>
          <div style={{fontSize:48,marginBottom:16}}>🏋️</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:8,color:"#888"}}>{library.length?'Keine Übungen gefunden':'Noch keine Übungen'}</div>
          <div style={{fontSize:13}}>{library.length?'Filter anpassen':'Erstelle deine erste Übung über den Button oben!'}</div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
        {filtered.map(ex=>(
          <div key={ex.id} style={{background:"#111114",border:"1px solid #1E1E24",borderRadius:16,overflow:"hidden",transition:"transform 0.2s,box-shadow 0.2s",cursor:"pointer"}} className="planCard" onClick={()=>setDetailEx(ex)}>
            {/* Thumbnail */}
            <div style={{height:120,background:"#0D0D0F",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
              {ex.thumbnail?(
                <MediaDisplay src={ex.thumbnail} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              ):(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,color:"#2A2A30"}}>
                  <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1"><path d="M6.5 6.5h11M6.5 17.5h11"/><rect x="2" y="5" width="3" height="14" rx="1.5"/><rect x="19" y="5" width="3" height="14" rx="1.5"/><path d="M5 12h14"/></svg>
                </div>
              )}
              <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",border:"1px solid rgba(255,255,255,0.2)"}}>
                <span style={{transform:"scale(0.8)",display:"flex"}}>{IC.info}</span>
              </div>
            </div>
            <div style={{padding:"14px 16px"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,marginBottom:8}}>{ex.name}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
                {(ex.muscles||[]).map(m=><span key={m} style={{fontSize:10,background:MUSCLE_COLORS[m]+"20",color:MUSCLE_COLORS[m],borderRadius:10,padding:"2px 8px",fontWeight:600}}>{m}</span>)}
                {(ex.types||[]).map(t=><span key={t} style={{fontSize:10,background:TYPE_COLORS[t]+"20",color:TYPE_COLORS[t],borderRadius:10,padding:"2px 8px",fontWeight:600}}>{t}</span>)}
              </div>
              {ex.description&&<div style={{fontSize:12,color:"#888",marginBottom:10,lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{ex.description}</div>}
              <div style={{display:"flex",justifyContent:"flex-end",gap:6}}>
                <button style={s.cardIconBtn} className="cardIconBtn" onClick={e=>{e.stopPropagation();setEditEx(ex);setShowForm(true);}}>{IC.edit}</button>
                <button style={{...s.cardIconBtn,color:"#EF476F88"}} className="cardIconBtn" onClick={e=>{e.stopPropagation();delEx(ex.id);}}>{IC.trash}</button>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Exercise Form Modal */}
      {showForm&&<ExerciseFormModal exercise={editEx} onSave={saveEx} onClose={()=>{setShowForm(false);setEditEx(null);}}/>}

      {/* Detail Modal */}
      {detailEx&&<ExerciseDetailModal exercise={detailEx} onClose={()=>setDetailEx(null)} onEdit={()=>{setEditEx(detailEx);setDetailEx(null);setShowForm(true);}} onDelete={()=>{delEx(detailEx.id);setDetailEx(null);}}/>}
    </div>
  );
}

function ExerciseFormModal({exercise,onSave,onClose}){
  const [name,setName]=useState(exercise?.name||"");
  const [desc,setDesc]=useState(exercise?.description||"");
  const [sets,setSets]=useState(exercise?.sets||"");
  const [reps,setReps]=useState(exercise?.reps||"");
  const [weight,setWeight]=useState(exercise?.weight||"");
  const [kcal,setKcal]=useState(exercise?.kcal||"");
  const [km,setKm]=useState(exercise?.km||"");
  const [incline,setIncline]=useState(exercise?.incline||"");
  const [tempo,setTempo]=useState(exercise?.tempo||"");
  const [trackSets,setTrackSets]=useState(exercise?.trackSets??true);
  const [trackReps,setTrackReps]=useState(exercise?.trackReps??true);
  const [trackWeight,setTrackWeight]=useState(exercise?.trackWeight??true);
  const [trackKcal,setTrackKcal]=useState(exercise?.trackKcal??false);
  const [trackKm,setTrackKm]=useState(exercise?.trackKm??false);
  const [trackIncline,setTrackIncline]=useState(exercise?.trackIncline??false);
  const [trackTempo,setTrackTempo]=useState(exercise?.trackTempo??false);

  const [muscles,setMuscles]=useState(exercise?.muscles||[]);
  const [types,setTypes]=useState(exercise?.types||[]);
  const [thumbnail,setThumbnail]=useState(exercise?.thumbnail||null);
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef();

  const toggleArr=(arr,setArr,val)=>setArr(a=>a.includes(val)?a.filter(x=>x!==val):[...a,val]);

  const handleImg=async(file)=>{
    if(!file)return;
    setUploading(true);
    try{
      // Try Firebase Storage first
      const url=await uploadToStorage(file,`exercises/${Date.now()}_${file.name}`);
      setThumbnail(url);
      setUploading(false);
    }catch{
      // Fallback: base64
      if (file.type.includes("video")) {
        readFile(file).then(d=>{ setThumbnail(d); setUploading(false); });
      } else {
        const reader=new FileReader();
        reader.onload=async(e)=>{
          const img=new Image();
          img.onload=()=>{
            const canvas=document.createElement("canvas");
            const MAX=300;
            let w=img.width,h=img.height;
            if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
            canvas.width=w;canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            setThumbnail(canvas.toDataURL("image/jpeg",0.75));
            setUploading(false);
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }
  };

  const save=()=>{
    if(!name.trim())return;
    onSave({name:name.trim(),description:desc,sets,reps,weight,kcal,km,incline,tempo,trackSets,trackReps,trackWeight,trackKcal,trackKm,trackIncline,trackTempo,muscles,types,thumbnail});
  };


  return(
    <div style={s.overlay2} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...s.modal,maxWidth:520,maxHeight:"90vh",overflowY:"auto"}}>
        <h2 style={s.modalTitle}>{exercise?"Übung bearbeiten":"Neue Übung"}</h2>

        <div style={s.fg}><label style={s.lbl}>Name *</label><input style={s.inp} value={name} onChange={e=>setName(e.target.value)} placeholder="z. B. Bankdrücken"/></div>
        
        {/* New Field Grid */}
        {/* Tracking Configuration */}
        <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Angezeigte Felder (Tracken)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:9,marginBottom:14}}>
          {[
            ["Sets",trackSets,setTrackSets,"#00D9C0"],
            ["Reps",trackReps,setTrackReps,"#FF6B35"],
            ["Weight",trackWeight,setTrackWeight,"#A78BFA"],
            ["kcal",trackKcal,setTrackKcal,"#FF6B6B"],
            ["km",trackKm,setTrackKm,"#4CC9F0"],
            ["Incline",trackIncline,setTrackIncline,"#FFD166"],
            ["Tempo",trackTempo,setTrackTempo,"#EF476F"]
          ].map(([label,val,set,color])=>(

            <div key={label} onClick={()=>set(!val)} style={{background:val?color+"15":"#1A1A1F",border:`1px solid ${val?color:"#2A2A30"}`,borderRadius:9,padding:"8px 4px",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}>
              <div style={{fontSize:9,fontWeight:700,color:val?color:"#666",marginBottom:4}}>{label}</div>
              <div style={{width:16,height:16,borderRadius:4,border:`1px solid ${val?color:"#333"}`,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",background:val?color:"transparent"}}>
                {val&&<svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="4"><path d="M5 13l4 4L19 7"/></svg>}
              </div>
            </div>
          ))}
        </div>

        {/* Value Inputs (only visible if tracked or always for defaults) */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(60px, 1fr))",gap:9,marginBottom:14}}>
          <div style={{...s.fg,opacity:trackSets?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#00D9C0"}}>Sätze</label><input style={{...s.inp,padding:"8px"}} type="number" value={sets} onChange={e=>setSets(e.target.value)} placeholder="0" disabled={!trackSets}/></div>
          <div style={{...s.fg,opacity:trackReps?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#FF6B35"}}>Wdh</label><input style={{...s.inp,padding:"8px"}} type="number" value={reps} onChange={e=>setReps(e.target.value)} placeholder="0" disabled={!trackReps}/></div>
          <div style={{...s.fg,opacity:trackWeight?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#A78BFA"}}>kg</label><input style={{...s.inp,padding:"8px"}} type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="0" disabled={!trackWeight}/></div>
          <div style={{...s.fg,opacity:trackKcal?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#FF6B6B"}}>kcal</label><input style={{...s.inp,padding:"8px"}} type="number" value={kcal} onChange={e=>setKcal(e.target.value)} placeholder="0" disabled={!trackKcal}/></div>
          <div style={{...s.fg,opacity:trackKm?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#4CC9F0"}}>km</label><input style={{...s.inp,padding:"8px"}} type="number" value={km} onChange={e=>setKm(e.target.value)} placeholder="0" disabled={!trackKm}/></div>
          <div style={{...s.fg,opacity:trackIncline?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#FFD166"}}>Steig.</label><input style={{...s.inp,padding:"8px"}} type="text" value={incline} onChange={e=>setIncline(e.target.value)} placeholder="%" disabled={!trackIncline}/></div>
          <div style={{...s.fg,opacity:trackTempo?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#EF476F"}}>Tempo</label><input style={{...s.inp,padding:"8px"}} type="text" value={tempo} onChange={e=>setTempo(e.target.value)} placeholder="T" disabled={!trackTempo}/></div>
        </div>


        <div style={s.fg}><label style={s.lbl}>Beschreibung</label><textarea style={{...s.inp,minHeight:70,resize:"vertical"}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Ausführung, Hinweise..."/></div>

        <div style={s.fg}>
          <label style={s.lbl}>Bild</label>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <input type="file" accept="image/*,video/*" ref={fileRef} style={{display:"none"}} onChange={e=>handleImg(e.target.files[0])}/>
            {thumbnail?(
              <div style={{width:80,height:60,borderRadius:10,overflow:"hidden",flexShrink:0,position:"relative",cursor:"pointer"}} onClick={()=>fileRef.current.click()}>
                <MediaDisplay src={thumbnail} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",opacity:0,transition:"opacity 0.2s"}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}><span style={{color:"#fff",fontSize:11}}>Ändern</span></div>
              </div>
            ):null}
            <button style={{...s.secBtn,padding:"10px 14px",fontSize:13}} onClick={()=>fileRef.current.click()}>
              {uploading?"⏳ ...":thumbnail?"Bild ändern":"📷 Bild hochladen"}
            </button>
          </div>
        </div>

        <div style={s.fg}>
          <label style={s.lbl}>Muskelgruppen</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {MUSCLE_GROUPS.map(m=>(
              <button key={m} onClick={()=>toggleArr(muscles,setMuscles,m)} style={{background:muscles.includes(m)?MUSCLE_COLORS[m]+"22":"#1A1A1F",border:`1px solid ${muscles.includes(m)?MUSCLE_COLORS[m]:"#2A2A30"}`,borderRadius:20,padding:"6px 14px",color:muscles.includes(m)?MUSCLE_COLORS[m]:"#888",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s"}}>{m}</button>
            ))}
          </div>
        </div>

        <div style={{...s.fg,marginBottom:22}}>
          <label style={s.lbl}>Trainingsart</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {TRAINING_TYPES.map(t=>(

// ─── WOCHENPLAN ───────────────────────────────────────────────────────────────
const WP_DAY_NAMES=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const WP_DAY_SHORT=["Mo","Di","Mi","Do","Fr","Sa","So"];
const MEAL_PRESETS=["Frühstück","Mittagessen","Abendessen","Snack","Pre-Workout","Post-Workout"];
const ENTRY_TYPES={
  training:{color:"#3B82F6",bg:"#1e3a5f",label:"Training",icon:"🏋️"},
  meal:    {color:"#22C55E",bg:"#14532d",label:"Mahlzeit", icon:"🥗"},
  rest:    {color:"#6B7280",bg:"#1f2937",label:"Ruhetag",  icon:"💤"},
  other:   {color:"#F59E0B",bg:"#451a03",label:"Sonstiges",icon:"📌"},
};

function getMonday(d){const date=new Date(d);const day=date.getDay();const diff=date.getDate()-day+(day===0?-6:1);date.setDate(diff);date.setHours(0,0,0,0);return date;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtShort(d){return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});}
function uid(){return Math.random().toString(36).slice(2,9);}

function WochenplanPage({weekPlans,setWeekPlans,data,notify}){
  const [currentMonday,setCurrentMonday]=useState(()=>getMonday(new Date()));
  const [showEntryForm,setShowEntryForm]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [entryDay,setEntryDay]=useState(0);
  const [showTemplates,setShowTemplates]=useState(false);
  const [saveName,setSaveName]=useState("");
  const [showSaveModal,setShowSaveModal]=useState(false);
  const [templates,setTemplates]=useState(()=>{try{return JSON.parse(localStorage.getItem("ff_wptemplates")||"[]");}catch{return [];}});

  useEffect(()=>localStorage.setItem("ff_wptemplates",JSON.stringify(templates)),[templates]);

  const weekKey=currentMonday.toISOString().split("T")[0];
  const weekData=weekPlans[weekKey]||{entries:{}};// entries: {dayIndex: [entry,...]}

  const setWeekData=updater=>{
    setWeekPlans(wp=>{
      const cur=wp[weekKey]||{entries:{}};
      const next=typeof updater==="function"?updater(cur):{...cur,...updater};
      return{...wp,[weekKey]:next};
    });
  };

  const getDayEntries=dayIdx=>(weekData.entries[dayIdx]||[]).slice().sort((a,b)=>a.startTime.localeCompare(b.startTime));

  const addEntry=(dayIdx,entry)=>{
    setWeekData(w=>({...w,entries:{...w.entries,[dayIdx]:[...(w.entries[dayIdx]||[]),{...entry,id:uid()}]}}));
    notify("Eintrag hinzugefügt! ✅");
  };

  const updateEntry=(dayIdx,entryId,updated)=>{
    setWeekData(w=>({...w,entries:{...w.entries,[dayIdx]:(w.entries[dayIdx]||[]).map(e=>e.id===entryId?{...e,...updated}:e)}}));
    notify("Eintrag aktualisiert ✏️");
  };

  const deleteEntry=(dayIdx,entryId)=>{
    setWeekData(w=>({...w,entries:{...w.entries,[dayIdx]:(w.entries[dayIdx]||[]).filter(e=>e.id!==entryId)}}));
    notify("Eintrag gelöscht");
  };

  const prevWeek=()=>setCurrentMonday(d=>addDays(d,-7));
  const nextWeek=()=>setCurrentMonday(d=>addDays(d,7));
  const goToday=()=>setCurrentMonday(getMonday(new Date()));

  const isCurrentWeek=getMonday(new Date()).toISOString().split("T")[0]===weekKey;

  const saveTemplate=()=>{
    if(!saveName.trim())return;
    const tmpl={id:uid(),name:saveName.trim(),entries:weekData.entries,savedAt:Date.now()};
    setTemplates(t=>[...t,tmpl]);
    setShowSaveModal(false);setSaveName("");
    notify(`Woche als Vorlage „${saveName}" gespeichert! 💾`);
  };

  const loadTemplate=(tmpl)=>{
    setWeekData(w=>({...w,entries:{...tmpl.entries}}));
    setShowTemplates(false);
    notify(`Vorlage „${tmpl.name}" geladen! 📅`);
  };

  const deleteTemplate=id=>{setTemplates(t=>t.filter(x=>x.id!==id));};

  const today=new Date();

  return(
    <div style={{padding:"28px 24px 56px",maxWidth:1100,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={s.pageTitle}>Wochenplan</h1>
          <p style={s.pageSub}>
            {fmtShort(currentMonday)} – {fmtShort(addDays(currentMonday,6))}
            {isCurrentWeek&&<span style={{marginLeft:10,background:"#FF6B3520",color:"#FF6B35",borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700}}>Diese Woche</span>}
          </p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={{...s.secBtn,padding:"9px 13px",fontSize:13,display:"flex",alignItems:"center",gap:6}} onClick={()=>setShowTemplates(true)}>📋 Vorlagen</button>
          <button style={{...s.secBtn,padding:"9px 13px",fontSize:13,display:"flex",alignItems:"center",gap:6}} onClick={()=>setShowSaveModal(true)}>{IC.save} Speichern</button>
          <div style={{display:"flex",gap:4}}>
            <button style={{...s.secBtn,padding:"9px 12px"}} onClick={prevWeek}>{IC.chevLeft}</button>
            <button style={{...s.secBtn,padding:"9px 12px",fontSize:12}} onClick={goToday}>Heute</button>
            <button style={{...s.secBtn,padding:"9px 12px"}} onClick={nextWeek}>{IC.chevRight}</button>
          </div>
        </div>
      </div>

      {/* Week grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:10}}>
        {WP_DAY_NAMES.map((dayName,dayIdx)=>{
          const dayDate=addDays(currentMonday,dayIdx);
          const isToday=dayDate.toDateString()===today.toDateString();
          const entries=getDayEntries(dayIdx);
          const isRest=entries.some(e=>e.type==="rest");

          return(
            <div key={dayIdx} style={{background:isRest?"#1C1C22":isToday?"#1A1A2A":"#111114",border:`1px solid ${isToday?"#3B82F6":isRest?"#374151":"#1E1E24"}`,borderRadius:14,minHeight:220,display:"flex",flexDirection:"column",transition:"all 0.2s",overflow:"hidden"}}>
              {/* Day header */}
              <div style={{padding:"10px 10px 8px",borderBottom:"1px solid #1E1E2420",display:"flex",justifyContent:"space-between",alignItems:"center",background:isToday?"#1E2A40":isRest?"#1f2937":"transparent"}}>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:isToday?"#3B82F6":"#666",textTransform:"uppercase",letterSpacing:"0.5px"}}>{WP_DAY_SHORT[dayIdx]}</div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:isToday?"#F0EDE8":"#aaa"}}>{fmtShort(dayDate)}</div>
                </div>
                <button onClick={()=>{setEntryDay(dayIdx);setEditEntry(null);setShowEntryForm(true);}} style={{width:26,height:26,borderRadius:"50%",background:"#FF6B35",border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16,lineHeight:1}}>+</button>
              </div>

              {/* Entries */}
              <div style={{flex:1,padding:"8px 8px 10px",display:"flex",flexDirection:"column",gap:5,overflowY:"auto"}}>
                {!entries.length&&(
                  <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#333",fontSize:12,textAlign:"center",padding:"10px 4px"}}>
                    Klicke + um Einträge hinzuzufügen
                  </div>
                )}
                {entries.map(entry=>{
                  const meta=ENTRY_TYPES[entry.type]||ENTRY_TYPES.other;
                  const plan=entry.type==="training"?data.plans.find(p=>p.id===parseInt(entry.planId)):null;
                  return(
                    <div key={entry.id} style={{background:meta.bg,border:`1px solid ${meta.color}40`,borderRadius:9,padding:"7px 9px",cursor:"pointer",transition:"all 0.15s"}}
                      onClick={()=>{setEntryDay(dayIdx);setEditEntry(entry);setShowEntryForm(true);}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                            <span style={{fontSize:12}}>{meta.icon}</span>
                            <span style={{fontSize:10,fontWeight:700,color:meta.color,textTransform:"uppercase",letterSpacing:"0.3px"}}>{meta.label}</span>
                          </div>
                          <div style={{fontSize:12,fontWeight:700,color:"#F0EDE8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                            {entry.type==="training"?(plan?.name||"Trainingsplan")
                             :entry.type==="meal"?(entry.mealPreset||(entry.mealName||"Mahlzeit"))
                             :entry.type==="rest"?"Ruhetag"
                             :(entry.title||"Eintrag")}
                          </div>
                          <div style={{fontSize:10,color:"#888",marginTop:2}}>
                            {entry.startTime}{entry.endTime&&" – "+entry.endTime}
                            {entry.type==="training"&&plan&&<span style={{marginLeft:6,color:plan.color}}>●</span>}
                          </div>
                          {entry.type==="meal"&&entry.calories&&<div style={{fontSize:10,color:"#22C55E",marginTop:1}}>{entry.calories} kcal</div>}
                          {entry.notes&&<div style={{fontSize:10,color:"#666",marginTop:2,fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{entry.notes}</div>}
                        </div>
                        <button onClick={e=>{e.stopPropagation();deleteEntry(dayIdx,entry.id);}} style={{background:"transparent",border:"none",color:"#555",cursor:"pointer",padding:2,display:"flex",flexShrink:0,borderRadius:4,transition:"color 0.15s"}} onMouseEnter={e=>e.currentTarget.style.color="#EF476F"} onMouseLeave={e=>e.currentTarget.style.color="#555"}>{IC.x}</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:14,marginTop:16,flexWrap:"wrap"}}>
        {Object.entries(ENTRY_TYPES).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:10,height:10,borderRadius:3,background:v.color}}/>
            <span style={{fontSize:11,color:"#666"}}>{v.icon} {v.label}</span>
          </div>
        ))}
      </div>

      {/* Entry Form Modal */}
      {showEntryForm&&(
        <WPEntryModal
          dayName={WP_DAY_NAMES[entryDay]}
          editEntry={editEntry}
          plans={data.plans}
          dayEntries={getDayEntries(entryDay)}
          onSave={entry=>{
            if(editEntry){updateEntry(entryDay,editEntry.id,entry);}
            else{addEntry(entryDay,entry);}
            setShowEntryForm(false);setEditEntry(null);
          }}
          onDelete={()=>{if(editEntry){deleteEntry(entryDay,editEntry.id);}setShowEntryForm(false);setEditEntry(null);}}
          onClose={()=>{setShowEntryForm(false);setEditEntry(null);}}
        />
      )}

      {/* Save template modal */}
      {showSaveModal&&(
        <div style={s.overlay2} onClick={e=>e.target===e.currentTarget&&setShowSaveModal(false)}>
          <div style={{...s.modal,maxWidth:380}}>
            <h3 style={{...s.modalTitle,fontSize:19,marginBottom:16}}>Woche als Vorlage speichern</h3>
            <input style={{...s.inp,marginBottom:16}} placeholder="Vorlagenname..." value={saveName} onChange={e=>setSaveName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveTemplate()}/>
            <div style={{display:"flex",gap:10}}>
              <button style={s.secBtn} onClick={()=>setShowSaveModal(false)}>Abbrechen</button>
              <button style={{...s.primaryBtn,flex:1}} onClick={saveTemplate} disabled={!saveName.trim()}>{IC.save} Speichern</button>
            </div>
          </div>
        </div>
      )}

      {/* Templates Modal */}
      {showTemplates&&(
        <div style={s.overlay2} onClick={e=>e.target===e.currentTarget&&setShowTemplates(false)}>
          <div style={{...s.modal,maxWidth:420,maxHeight:"80vh",overflowY:"auto"}}>
            <h3 style={{...s.modalTitle,fontSize:19,marginBottom:16}}>📋 Vorlagen</h3>
            {!templates.length&&<div style={{color:"#666",textAlign:"center",padding:"30px 0",fontSize:13}}>Noch keine Vorlagen gespeichert.<br/>Speichere eine aktuelle Woche als Vorlage!</div>}
            {templates.map(tmpl=>(
              <div key={tmpl.id} style={{background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:12,padding:"13px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{tmpl.name}</div>
                  <div style={{fontSize:11,color:"#666",marginTop:2}}>
                    {Object.values(tmpl.entries).flat().length} Einträge · Gespeichert {new Date(tmpl.savedAt).toLocaleDateString("de-DE")}
                  </div>
                </div>
                <button style={{...s.secBtn,padding:"7px 12px",fontSize:12}} onClick={()=>loadTemplate(tmpl)}>{IC.copy} Laden</button>
                <button style={{...s.cardIconBtn,color:"#EF476F88"}} className="cardIconBtn" onClick={()=>deleteTemplate(tmpl.id)}>{IC.trash}</button>
              </div>
            ))}
            <button style={{...s.secBtn,width:"100%",marginTop:8}} onClick={()=>setShowTemplates(false)}>Schließen</button>
          </div>
        </div>
      )}
    </div>
  );
}

function WPEntryModal({dayName,editEntry,plans,dayEntries,onSave,onDelete,onClose}){
  const [type,setType]=useState(editEntry?.type||"training");
  const [planId,setPlanId]=useState(editEntry?.planId||String(plans[0]?.id||""));
  const [mealPreset,setMealPreset]=useState(editEntry?.mealPreset||"Frühstück");
  const [mealName,setMealName]=useState(editEntry?.mealName||"");
  const [calories,setCalories]=useState(editEntry?.calories||"");
  const [startTime,setStartTime]=useState(editEntry?.startTime||"08:00");
  const [endTime,setEndTime]=useState(editEntry?.endTime||"");
  const [notes,setNotes]=useState(editEntry?.notes||"");
  const [title,setTitle]=useState(editEntry?.title||"");

  // Prevent duplicate training plans on same day
  const usedPlanIds=dayEntries.filter(e=>e.type==="training"&&e.id!==editEntry?.id).map(e=>String(e.planId));
  const availablePlans=plans.filter(p=>!usedPlanIds.includes(String(p.id)));

  const handleSave=()=>{
    const base={type,startTime,endTime,notes};
    if(type==="training"){if(!planId)return;base.planId=planId;}
    if(type==="meal"){base.mealPreset=mealPreset;base.mealName=mealName;base.calories=calories;}
    if(type==="other"){base.title=title;}
    onSave(base);
  };

  const inp={...s.inp};
  const lbl={...s.lbl};

  return(
    <div style={s.overlay2} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...s.modal,maxWidth:460,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,margin:0}}>
            {editEntry?"Eintrag bearbeiten":"Neuer Eintrag"} – {dayName}
          </h3>
          <button style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",display:"flex"}} onClick={onClose}>{IC.x}</button>
        </div>

        {/* Type selector */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:18}}>
          {Object.entries(ENTRY_TYPES).map(([k,v])=>(
            <button key={k} onClick={()=>setType(k)} style={{background:type===k?v.bg:"#1A1A1F",border:`1px solid ${type===k?v.color:"#2A2A30"}`,borderRadius:10,padding:"8px 4px",cursor:"pointer",textAlign:"center",transition:"all 0.15s",fontFamily:"'DM Sans',sans-serif"}}>
              <div style={{fontSize:16,marginBottom:3}}>{v.icon}</div>
              <div style={{fontSize:10,fontWeight:700,color:type===k?v.color:"#666"}}>{v.label}</div>
            </button>
          ))}
        </div>

        {/* Type-specific fields */}
        {type==="training"&&(
          <div style={s.fg}>
            <label style={lbl}>Trainingsplan</label>
            {!availablePlans.length&&!editEntry?(
              <div style={{background:"#1A1A1F",borderRadius:9,padding:"12px",color:"#888",fontSize:13}}>Alle Trainingspläne sind für diesen Tag bereits eingetragen.</div>
            ):(
              <select style={inp} value={planId} onChange={e=>setPlanId(e.target.value)}>
                {(editEntry&&plans.find(p=>String(p.id)===String(editEntry.planId))?[plans.find(p=>String(p.id)===String(editEntry.planId))]:[]).concat(availablePlans.filter(p=>String(p.id)!==String(editEntry?.planId))).map(p=>(
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
            )}
          </div>
        )}

        {type==="meal"&&(
          <>
            <div style={s.fg}>
              <label style={lbl}>Mahlzeit</label>
              <select style={{...inp,marginBottom:8}} value={mealPreset} onChange={e=>setMealPreset(e.target.value)}>
                {MEAL_PRESETS.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              <input style={inp} placeholder="Eigene Bezeichnung (optional)" value={mealName} onChange={e=>setMealName(e.target.value)}/>
            </div>
            <div style={s.fg}><label style={lbl}>Kalorien (optional)</label><input style={inp} type="number" placeholder="kcal" value={calories} onChange={e=>setCalories(e.target.value)}/></div>
          </>
        )}

        {type==="rest"&&(
          <div style={{background:"#1f2937",border:"1px solid #37415144",borderRadius:12,padding:14,marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:28}}>💤</span>
            <div><div style={{fontWeight:700,fontSize:14}}>Ruhetag</div><div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>Dieser Tag wird als Ruhetag markiert.</div></div>
          </div>
        )}

        {type==="other"&&(
          <div style={s.fg}><label style={lbl}>Titel</label><input style={inp} placeholder="z. B. Arzttermin, Supplements..." value={title} onChange={e=>setTitle(e.target.value)}/></div>
        )}

        {/* Time */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><label style={lbl}>Startzeit *</label><input style={inp} type="time" value={startTime} onChange={e=>setStartTime(e.target.value)}/></div>
          <div><label style={lbl}>Endzeit (optional)</label><input style={inp} type="time" value={endTime} onChange={e=>setEndTime(e.target.value)}/></div>
        </div>
        <div style={{...s.fg,marginBottom:20}}><label style={lbl}>Notizen (optional)</label><textarea style={{...inp,minHeight:56,resize:"vertical"}} placeholder="Hinweise, Ziele..." value={notes} onChange={e=>setNotes(e.target.value)}/></div>

        <div style={{display:"flex",gap:8}}>
          {editEntry&&<button style={{...s.secBtn,padding:"11px 13px",color:"#EF476F",borderColor:"#EF476F44"}} onClick={onDelete}>{IC.trash}</button>}
          <button style={s.secBtn} onClick={onClose}>Abbrechen</button>
          <button style={{...s.primaryBtn,flex:1}} onClick={handleSave}>💾 Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen(){
  const [mode,setMode]=useState("login"); // "login" | "register"
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [showPw,setShowPw]=useState(false);

  const AUTH_ERRORS={
    "auth/invalid-email":"Ungültige E-Mail-Adresse.",
    "auth/user-not-found":"Kein Konto mit dieser E-Mail gefunden.",
    "auth/wrong-password":"Falsches Passwort.",
    "auth/email-already-in-use":"Diese E-Mail ist bereits registriert.",
    "auth/weak-password":"Passwort zu schwach (mind. 6 Zeichen).",
    "auth/too-many-requests":"Zu viele Versuche. Bitte warte kurz.",
    "auth/invalid-credential":"E-Mail oder Passwort falsch.",
  };

  // Warte bis Firebase wirklich bereit ist (max 10 Sekunden)
  const waitForFirebase = () => new Promise((res, rej) => {
    const check = (n) => {
      if(window.firebaseCreateUser && window.firebaseSignIn && window.firebaseAuth){
        res();
      } else if(n <= 0){
        rej(new Error("Firebase konnte nicht geladen werden. Bitte Seite neu laden (F5)."));
      } else {
        setTimeout(()=>check(n-1), 200);
      }
    };
    check(50); // 50 × 200ms = 10 Sekunden
  });

  const handleSubmit=async()=>{

    try{
      await waitForFirebase();
      if(mode==="register"){
        const cred = await window.firebaseCreateUser(window.firebaseAuth, email, password);
        if(window.firebaseUpdateProfile) await window.firebaseUpdateProfile(cred.user, {displayName:name});
      } else {
        await window.firebaseSignIn(window.firebaseAuth, email, password);
      }

      setError(AUTH_ERRORS[e.code]||"Fehler: "+e.message);
    }
    setLoading(false);
  };

            <span style={{fontFamily:"'Syne',sans-serif",fontSize:32,fontWeight:800,color:"#F0EDE8",letterSpacing:"-1px"}}>FitForge</span>
          </div>

        </div>

                {m==="login"?"Einloggen":"Registrieren"}
              </button>
            ))}
          </div>

          {mode==="register"&&(
            <div style={{marginBottom:14}}>

            </div>
          )}

          <div style={{marginBottom:14}}>

            </button>
          </p>
        </div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={error:null}; }
  static getDerivedStateFromError(e){ return {error:e}; }
  componentDidCatch(e,info){
    if(window.dbg){ dbg('⚛️ REACT ERROR: '+e.message,'#f55'); dbg('Component: '+info.componentStack.split('\n')[1],'#f88'); }
  }
  render(){
    if(this.state.error) return React.createElement('div',{style:{padding:40,color:'#FCA5A5',fontFamily:'monospace',background:'#0D0D0F',minHeight:'100vh'}},
      React.createElement('h2',{style:{color:'#FF6B35',marginBottom:16}},'⚠️ App Fehler'),
      React.createElement('p',{style:{marginBottom:8}},'Fehlermeldung:'),
      React.createElement('pre',{style:{background:'#1a1a1a',padding:16,borderRadius:8,fontSize:13,overflow:'auto'}},this.state.error.message),
      React.createElement('p',{style:{marginTop:16,color:'#666',fontSize:13}},'Bitte schick einen Screenshot dieser Seite.')
    );
    return this.props.children;
  }
}
