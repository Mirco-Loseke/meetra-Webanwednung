              <div key={tmpl.id} style={{background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:12,padding:"13px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{tmpl.name}</div>
                  <div style={{fontSize:11,color:"#666",marginTop:2}}>
                    {Object.values(tmpl.entries).flat().length} Einträge · Gespeichert {new Date(tmpl.savedAt).toLocaleDateString("de-DE")}
                  </div>
                </div>
                <button style={{...s.secBtn,padding:"7px 12px",fontSize:12}} onClick={()=>loadTemplate(tmpl)}>{IC.copy} Laden</button>
                <button style={{...s.cardIconBtn,color:"#EF476F88"}} className="cardIconBtn" onClick={()=>deleteTemplate(tmpl.id)}>{IC.trash}</button>
              </div>
            ))}
            <button style={{...s.secBtn,width:"100%",marginTop:8}} onClick={()=>setShowTemplates(false)}>Schließen</button>
          </div>
        </div>
      )}

      {magicModal&&<MagicAssistantModal currentMonday={currentMonday} data={data} recipes={DEFAULT_RECIPES} user={user} library={library} onApply={(entries)=>{setWeekData({entries});setMagicModal(false);notify("Wochenplan automatisch generiert! 🪄");}} onClose={()=>setMagicModal(false)} notify={notify}/>}
    </div>
  );
}

function WPEntryModal({dayName,editEntry,plans,dayEntries,onSave,onDelete,onClose}){
  const [type,setType]=useState(editEntry?.type||"training");
  const [planId,setPlanId]=useState(editEntry?.planId||String(plans[0]?.id||""));
  const [mealPreset,setMealPreset]=useState(editEntry?.mealPreset||"Frühstück");
  const [mealName,setMealName]=useState(editEntry?.mealName||"");
  const [calories,setCalories]=useState(editEntry?.calories||"");
  const [startTime,setStartTime]=useState(editEntry?.startTime||"08:00");
  const [endTime,setEndTime]=useState(editEntry?.endTime||"");
  const [notes,setNotes]=useState(editEntry?.notes||"");
  const [title,setTitle]=useState(editEntry?.title||"");

  // Prevent duplicate training plans on same day
  const usedPlanIds=dayEntries.filter(e=>e.type==="training"&&e.id!==editEntry?.id).map(e=>String(e.planId));
  const availablePlans=plans.filter(p=>!usedPlanIds.includes(String(p.id)));

  const handleSave=()=>{
    const base={type,startTime,endTime,notes};
    if(type==="training"){if(!planId)return;base.planId=planId;}
    if(type==="meal"){base.mealPreset=mealPreset;base.mealName=mealName;base.calories=calories;}
    if(type==="other"){base.title=title;}
    onSave(base);
  };

  const inp={...s.inp};
  const lbl={...s.lbl};

  return(
    <div style={s.overlay2} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...s.modal,maxWidth:460,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,margin:0}}>
            {editEntry?"Eintrag bearbeiten":"Neuer Eintrag"} – {dayName}
          </h3>
          <button style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",display:"flex"}} onClick={onClose}>{IC.x}</button>
        </div>

        {/* Type selector */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:18}}>
          {Object.entries(ENTRY_TYPES).map(([k,v])=>(
            <button key={k} onClick={()=>setType(k)} style={{background:type===k?v.bg:"#1A1A1F",border:`1px solid ${type===k?v.color:"#2A2A30"}`,borderRadius:10,padding:"8px 4px",cursor:"pointer",textAlign:"center",transition:"all 0.15s",fontFamily:"'DM Sans',sans-serif"}}>
              <div style={{fontSize:16,marginBottom:3}}>{v.icon}</div>
              <div style={{fontSize:10,fontWeight:700,color:type===k?v.color:"#666"}}>{v.label}</div>
            </button>
          ))}
        </div>

        {/* Type-specific fields */}
        {type==="training"&&(
          <div style={s.fg}>
            <label style={lbl}>Trainingsplan</label>
            {!availablePlans.length&&!editEntry?(
              <div style={{background:"#1A1A1F",borderRadius:9,padding:"12px",color:"#888",fontSize:13}}>Alle Trainingspläne sind für diesen Tag bereits eingetragen.</div>
            ):(
              <select style={inp} value={planId} onChange={e=>setPlanId(e.target.value)}>
                {(editEntry&&plans.find(p=>String(p.id)===String(editEntry.planId))?[plans.find(p=>String(p.id)===String(editEntry.planId))]:[]).concat(availablePlans.filter(p=>String(p.id)!==String(editEntry?.planId))).map(p=>(
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
            )}
          </div>
        )}

        {type==="meal"&&(
          <>
            <div style={s.fg}>
              <label style={lbl}>Mahlzeit</label>
              <select style={{...inp,marginBottom:8}} value={mealPreset} onChange={e=>setMealPreset(e.target.value)}>
                {MEAL_PRESETS.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              <input style={inp} placeholder="Eigene Bezeichnung (optional)" value={mealName} onChange={e=>setMealName(e.target.value)}/>
            </div>
            <div style={s.fg}><label style={lbl}>Kalorien (optional)</label><input style={inp} type="number" placeholder="kcal" value={calories} onChange={e=>setCalories(e.target.value)}/></div>
          </>
        )}

        {type==="rest"&&(
          <div style={{background:"#1f2937",border:"1px solid #37415144",borderRadius:12,padding:14,marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:28}}>💤</span>
            <div><div style={{fontWeight:700,fontSize:14}}>Ruhetag</div><div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>Dieser Tag wird als Ruhetag markiert.</div></div>
          </div>
        )}

        {type==="other"&&(
          <div style={s.fg}><label style={lbl}>Titel</label><input style={inp} placeholder="z. B. Arzttermin, Supplements..." value={title} onChange={e=>setTitle(e.target.value)}/></div>
        )}

        {/* Time */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><label style={lbl}>Startzeit *</label><input style={inp} type="time" value={startTime} onChange={e=>setStartTime(e.target.value)}/></div>
          <div><label style={lbl}>Endzeit (optional)</label><input style={inp} type="time" value={endTime} onChange={e=>setEndTime(e.target.value)}/></div>
        </div>
        <div style={{...s.fg,marginBottom:20}}><label style={lbl}>Notizen (optional)</label><textarea style={{...inp,minHeight:56,resize:"vertical"}} placeholder="Hinweise, Ziele..." value={notes} onChange={e=>setNotes(e.target.value)}/></div>

        <div style={{display:"flex",gap:8}}>
          {editEntry&&<button style={{...s.secBtn,padding:"11px 13px",color:"#EF476F",borderColor:"#EF476F44"}} onClick={onDelete}>{IC.trash}</button>}
          <button style={s.secBtn} onClick={onClose}>Abbrechen</button>
          <button style={{...s.primaryBtn,flex:1}} onClick={handleSave}>💾 Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── AI ASSISTANT SERVICE ───────────────────────────────────────────────────
const FitAssistantService = {
  getApiKey: () => localStorage.getItem("ff_gemini_key"),
  setApiKey: (key) => localStorage.setItem("ff_gemini_key", key),

  generateRealAI: async (prompt, data, recipes, user, library, notify) => {
    const key = FitAssistantService.getApiKey();
    if (!key) throw new Error("Kein API Key gefunden.");

    const systemPrompt = `Du bist ein hochintelligenter Fitness-Assistent für die App 'FitForge'. 
Aufgabe: Erstelle einen Wochenplan (0=Montag bis 6=Sonntag) im JSON Format.
WICHTIG: Antworte AUSSCHLIESSLICH mit dem puren JSON Objekt ohne Markdown-Code-Blocks.

Kontext:
- Aktuelle Trainingspläne des Nutzers: ${JSON.stringify(data.plans.map(p => ({id:p.id, name:p.name, muscles:p.muscles})))}
- Übungs-Bibliothek (Metadaten für Typ & Muskeln): ${JSON.stringify(library.map(ex => ({name:ex.name, types:ex.types, muscles:ex.muscles})))}
- Verfügbare Rezepte: ${JSON.stringify(recipes.map(r => ({id:r.id, name:r.name, k:r.kcal})))}
- Arbeitszeiten des Nutzers (falls Arbeitswoche): ${JSON.stringify({days:user.workDays, shift:`${user.workStart}-${user.workEnd}`, break1:`${user.break1Start}-${user.break1End}`, break2:`${user.break2Start}-${user.break2End}`})}
- Nutzer-Prompt: "${prompt}"

Beachte extrem präzise alle Muskelgruppen (z.B. "nur Brust") oder Trainingsarten (z.B. "nur Entspannung") die im Prompt genannt werden. Wähle nur passende Pläne aus.

Extrem Wichtige Regeln für Zeit-Management:
1. Prüfe den TYP am Anfang des Prompts.
2. Bei "Arbeitswoche": Plane Training AUSNAHMSLOS außerhalb der Arbeitszeiten (${user.workStart} - ${user.workEnd}). Bevorzugt abends (ab ${user.workEnd}) oder morgens (vor ${user.workStart}).
3. Nutze die Pausenzeiten (Frühstück: ${user.break1Start}-${user.break1End}, Mittag: ${user.break2Start}-${user.break2End}) für Mahlzeiten, falls es sich um Arbeitstage handelt.
4. Berücksichtige Negationen (z.B. "keine Beine" -> keine Pläne mit Beinen).
5. Variiere die Mahlzeiten (cycle durch die Rezepte).
6. Beachte Frequenzwünsche (z.B. "3x Cardio").
7. Nutze bestehende Trainingspläne (planId als String).
8. Format für jeden Tag (Array von Items): 
   { id: "unique_id", type: "training"|"meal"|"rest"|"other", startTime: "HH:mm", planId: "ID", mealName: "Name", calories: 500, title: "Titel", notes: "Info" }

Struktur:
{
  "0": [items],
  "1": [items],
  ...
  "6": [items],
  "message": "Kurze, motivierende Zusammenfassung des Plans in Deutsch."
}`;

    const endpoints = [
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`,
      `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`,
      `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`
    ];

    let lastError = null;
    for (const url of endpoints) {
      try {
        const isV1beta = url.includes("v1beta");
        const resp = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: systemPrompt }] }],
            generationConfig: isV1beta ? { response_mime_type: "application/json" } : {}
          })
        });

        if (!resp.ok) {
           const err = await resp.json();
           lastError = err.error?.message || "Fehler";
           continue;
        }

        const resJson = await resp.json();
        const text = resJson.candidates[0].content.parts[0].text;
        return JSON.parse(text.replace(/```json/g, "").replace(/```/g, "").trim());
      } catch (e) { lastError = e.message; continue; }
    }

    // FINAL FALLBACK: Dynamic Discovery
    try {
      const modelsResp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
      const modelsData = await modelsResp.json();
      const geminiModel = (modelsData.models || []).find(m => m.name.includes("gemini") && m.supportedGenerationMethods?.includes("generateContent"));
      if (geminiModel) {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/${geminiModel.name}:generateContent?key=${key}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: systemPrompt }] }],
              generationConfig: { response_mime_type: "application/json" }
            })
        });
        if (resp.ok) {
           const resJson = await resp.json();
           const text = resJson.candidates[0].content.parts[0].text;
           return JSON.parse(text.replace(/```json/g, "").replace(/```/g, "").trim());
        }
      }
    } catch (discoveryErr) { console.error("Discovery failed", discoveryErr); }

    throw new Error(`${lastError}. Tipp: Prüfe, ob die 'Generative Language API' für dein Projekt aktiviert ist.`);
  }
};

function MagicAssistantModal({currentMonday,data,recipes,user,library,onApply,onClose,notify}){
  const [prompt,setPrompt]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [history,setHistory]=useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [apiKey, setApiKey] = useState(FitAssistantService.getApiKey() || "");
  const [weekType, setWeekType] = useState("work"); // 'work' or 'holiday'

  const saveSettings = () => {
    FitAssistantService.setApiKey(apiKey);
    setShowSettings(false);
    notify("API Key gespeichert! 🔐");
  };

  const generate = async () => {
    if(!prompt.trim()) return;
    setLoading(true);
    setHistory(h => [...h, {type:"user", text:prompt}]);
    
    if (FitAssistantService.getApiKey()) {
      try {
        const fullPrompt = `TYP: ${weekType === 'work' ? 'Arbeitswoche' : 'Urlaub/Frei'}. PROMPT: ${prompt}`;
        const aiResponse = await FitAssistantService.generateRealAI(fullPrompt, data, recipes, user, library, notify);
        const { message, ...weekMap } = aiResponse;
        setResult(weekMap);
        setHistory(h => [...h, {type:"ai", text: message || "Plan erstellt!"}]);
      } catch (e) {
        setHistory(h => [...h, {type:"ai", text: "Fehler: " + e.message + ". Bitte prüfe den API Key in den Einstellungen."}]);
        setShowSettings(true);
      }
      setLoading(false);
      setPrompt("");
      return;
    }

    // fallback to legacy mock logic...
    await new Promise(res => setTimeout(res, 2200));
    // ... (rest of old generate logic follows if needed, but I'll replace it with a call to the improved one)
    // Actually, I'll just keep the improved mock as fallback if no key is present.
    
    // ─── Phase 1: Context Extraction ───
    const negators = ["kein", "keine", "nicht", "ohne", "verzicht", "außer", "statt"];
    const isNegated = (term) => {
      const idx = lower.indexOf(term);
      if (idx === -1) return false;
      const window = lower.substring(Math.max(0, idx - 20), idx);
      return negators.some(n => window.includes(n));
    };

    const getFreq = (terms) => {
      for(const t of (Array.isArray(terms) ? terms : [terms])) {
        const regex = new RegExp(`(\\d+)\\s*(?:x|mal|pro|pro woche)\\s*(?:\\w+\\s*)?${t}`, 'i');
        const match = lower.match(regex);
        if (match) return parseInt(match[1]);
        const regexRev = new RegExp(`${t}\\s*(?:\\w+\\s*)?\\s*(\\d+)\\s*(?:x|mal)`, 'i');
        const matchRev = lower.match(regexRev);
        if (matchRev) return parseInt(matchRev[1]);
      }
      return null;
    };

    // ─── Phase 2: Domain Mapping ───
    const domain = {
      chest: { kw: ["brust", "chest", "push", "drücken"], active: false, freq: 0, neg: false },
      legs:  { kw: ["bein", "leg", "knie", "lower"], active: false, freq: 0, neg: false },
      back:  { kw: ["rücken", "back", "pull", "zug"], active: false, freq: 0, neg: false },
      cardio: { kw: ["cardio", "laufen", "run", "ausdauer"], active: false, freq: 0, neg: false },
      walk:  { kw: ["spazieren", "walk", "gehen", "schritte"], active: false, freq: 0, neg: false },
    };

    Object.keys(domain).forEach(k => {
      const g = domain[k];
      g.active = g.kw.some(kw => lower.includes(kw));
      g.neg = g.kw.some(kw => isNegated(kw));
      g.freq = getFreq(g.kw) || (g.active ? 2 : 0);
    });

    const chickenPref = lower.includes("hähnchen") || lower.includes("chicken");
    const veggiePref  = lower.includes("veggie") || lower.includes("vegetarisch") || isNegated("fleisch");
    const veganPref   = lower.includes("vegan");

    // ─── Phase 3: Selection ───
    const findPlan = (terms) => {
      return data.plans.find(p => 
        terms.some(t => p.name.toLowerCase().includes(t)) || 
        p.exercises.some(e => terms.some(t => e.name.toLowerCase().includes(t)))
      ) || data.plans[0];
    };

    const findRecipes = () => {
      let pool = [];
      if (veganPref) pool = recipes.filter(r => r.tags?.includes("Vegan"));
      else if (veggiePref) pool = recipes.filter(r => r.tags?.includes("Vegan") || r.tags?.includes("Veggie"));
      else if (chickenPref) pool = recipes.filter(r => r.name.toLowerCase().includes("hähnchen"));
      
      // Add favorites to pool for more variety if specific filter didn't yield enough
      const favorites = recipes.filter(r => r.favorite);
      
      let finalPool = pool.length > 0 ? pool : (favorites.length > 0 ? favorites : recipes);
      // Ensure we have at least a few for variety
      if (finalPool.length < 3 && favorites.length > 0) finalPool = [...new Set([...finalPool, ...favorites])];
      if (finalPool.length < 1) finalPool = recipes;

      return finalPool;
    };

    // ─── Phase 4: Build Week ───
    const weekMap = {};
    const daysArr = [0,1,2,3,4,5,6];
    
    // Distribution helpers
    const mainTrainingFreq = Math.max(
      domain.chest.active && !domain.chest.neg ? domain.chest.freq : 0,
      domain.legs.active && !domain.legs.neg ? domain.legs.freq : 0,
      domain.back.active && !domain.back.neg ? domain.back.freq : 0,
      3
    );

    const available = [...daysArr];
    const pickDay = () => available.splice(Math.floor(Math.random() * available.length), 1)[0];

    // Priority 1: Training
    const trainDays = [];
    for(let i=0; i<Math.min(mainTrainingFreq, 5) && available.length > 0; i++) {
      trainDays.push(pickDay());
    }

    // Priority 2: Cardio
    const cardioFrequency = domain.cardio.neg ? 0 : (domain.cardio.active ? domain.cardio.freq : 1);
    const cDays = [];
    for(let i=0; i<cardioFrequency && available.length > 0; i++) {
        cDays.push(pickDay());
    }

    // Priority 3: Walk
    const walkFrequency = domain.walk.neg ? 0 : (domain.walk.active ? domain.walk.freq : 1);
    const wDays = [];
    for(let i=0; i<walkFrequency && available.length > 0; i++) {
        wDays.push(available.includes(pickDay()) ? pickDay() : null); 
    }

    const recipePool = findRecipes();
    
    daysArr.forEach(d => {
      const items = [];
      // Cycle through recipes for variety
      const currentRecipe = recipePool[d % recipePool.length];
      
      items.push({id:uid(),type:"meal",startTime:"08:00",mealPreset:"Frühstück",mealName:"Protein-Overnight-Oats",calories:380});
      items.push({id:uid(),type:"meal",startTime:"13:00",mealPreset:"Mittagessen",mealName:currentRecipe.name,calories:currentRecipe.kcal});

      if(trainDays.includes(d)) {
          let p;
          if (domain.chest.active && !domain.chest.neg) p = findPlan(domain.chest.kw);
          else if (domain.back.active && !domain.back.neg) p = findPlan(domain.back.kw);
          else p = data.plans[d % data.plans.length];
          items.push({id:uid(),type:"training",startTime:"17:30",planId:String(p?.id || 1),notes:"KI-Optimiert"});
      } else if(cDays.includes(d)) {
          items.push({id:uid(),type:"other",startTime:"07:00",title:"Cardio/Laufen 🏃",notes:"Gleichmäßiges Tempo"});
      } else if(trainDays.length === 0 || d === 6) {
          items.push({id:uid(),type:"rest",startTime:"09:00",notes:"Regeneration"});
      }
      
      if(wDays.includes(d)) {
          items.push({id:uid(),type:"other",startTime:"10:30",title:"Aktive Erholung: Gehen 🌳"});
      }

      weekMap[d] = items;
    });

    // ─── Phase 5: Smart Response ───
    let txt = "Verstanden! Ich habe die Woche für dich optimiert: 🧠\n\n";
    if (domain.chest.active) txt += `• Fokus: Brustmuskulatur (${domain.chest.freq}x)\n`;
    if (domain.legs.neg) txt += "• Beine: Bewusst ausgeschlossen (Regeneration)\n";
    if (veggiePref) txt += "• Ernährung: Vegetarisch/Vegan ausgewählt\n";
    if (cardioFrequency > 0) txt += `• Ausdauer: ${cardioFrequency} Einheiten eingeplant\n`;
    txt += `• Abwechslung: ${recipePool.length > 1 ? recipePool.length + ' verschiedene Gerichte' : 'Deine Favoriten'} integriert.\n`;
    txt += "\nDer Plan sorgt für ein ausgewogenes Verhältnis von Belastung und Erholung.";

    setResult(weekMap);
    setHistory(h => [...h, {type:"ai", text:txt}]);
    setLoading(false);
    setPrompt("");
  };

  return(
    <div style={s.overlay2} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...s.modal,maxWidth:520,background:"#111114",padding:0,overflow:"hidden",display:"flex",flexDirection:"column",maxHeight:"85vh"}}>
        {/* Header */}
        <div style={{padding:"20px 24px",background:"linear-gradient(135deg,rgba(167,139,250,0.15),transparent)",borderBottom:"1px solid #1E1E24",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:"#A78BFA",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>{IC.sparkles}</div>
            <div>
              <h3 style={{margin:0,fontSize:17,fontFamily:"'Syne',sans-serif",fontWeight:800}}>KI-Planner PRO</h3>
              <div style={{fontSize:11,color:FitAssistantService.getApiKey()?"#06D6A0":"#A78BFA",fontWeight:700,textTransform:"uppercase"}}>{FitAssistantService.getApiKey()?"Vollversion":"Beta"}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",fontSize:20}} onClick={()=>setShowSettings(!showSettings)}>⚙️</button>
            <button style={{background:"transparent",border:"none",color:"#666",cursor:"pointer"}} onClick={onClose}>{IC.x}</button>
          </div>
        </div>
        
        {showSettings && (
          <div style={{padding:20,background:"#1A1A1F",borderBottom:"1px solid #1E1E24"}} className="fadeIn">
            <label style={s.lbl}>Gemini API Key (Google AI Studio)</label>
            <div style={{display:"flex",gap:10}}>
              <input style={s.inp} type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="AIza..."/>
              <button style={{...s.primaryBtn,padding:"0 18px"}} onClick={saveSettings}>Sichern</button>
            </div>
            <p style={{fontSize:11,color:"#666",marginTop:8}}>Kostenlos erhältlich in den <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{color:"#A78BFA"}}>Google AI Studio Settings</a>.</p>
          </div>
        )}
        
        {/* Chat / Content */}
        <div style={{flex:1,overflowY:"auto",padding:24,display:"flex",flexDirection:"column",gap:16,minHeight:300}}>
          {!history.length && (
            <div style={{textAlign:"center",marginTop:40,color:"#444"}}>
              <div style={{fontSize:40,marginBottom:14}}>✨</div>
              <h4 style={{color:"#888",marginBottom:8}}>Wie kann ich dir helfen?</h4>
              <p style={{fontSize:13,lineHeight:1.5}}>Schreibe mir deine Ziele für die Woche (z.B. „2x Beine, 3x Cardio, vegetarisch") und ich erstelle dir einen Plan!</p>
            </div>
          )}
          
          {history.map((msg,i)=>(
            <div key={i} style={{alignSelf:msg.type==="user"?"flex-end":"flex-start",maxWidth:"85%",display:"flex",flexDirection:"column",gap:4}}>
              <div style={{padding:"12px 16px",borderRadius:14,fontSize:14,lineHeight:1.5,background:msg.type==="user"?"#3B82F6":"#1E1E24",color:msg.type==="user"?"#fff":"#aaa",border:msg.type==="user"?"none":"1px solid #2A2A30",borderBottomLeftRadius:msg.type!=="user"?2:14,borderBottomRightRadius:msg.type==="user"?2:14}}>
                {msg.text}
              </div>
            </div>
          ))}
          
          {loading && (
            <div style={{display:"flex",gap:6,padding:"8px 16px"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#3B82F6",animation:"fadeIn 0.6s infinite alternate"}}></div>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#3B82F6",animation:"fadeIn 0.6s 0.2s infinite alternate"}}></div>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#3B82F6",animation:"fadeIn 0.6s 0.4s infinite alternate"}}></div>
            </div>
          )}
          
          {result && !loading && (
            <div style={{marginTop:8,background:"rgba(6,214,160,0.05)",border:"1px solid rgba(6,214,160,0.2)",borderRadius:12,padding:16}}>
              <div style={{display:"flex",alignItems:"center",gap:8,color:"#06D6A0",fontSize:13,fontWeight:700,marginBottom:12}}>
                <span style={{fontSize:16}}>✅</span> Plan bereit zum Anwenden
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
                <button style={{...s.secBtn,padding:"10px",fontSize:12}} onClick={()=>setResult(null)}>Verwerfen</button>
                <button style={{...s.primaryBtn,padding:"10px",fontSize:12,background:"#06D6A0"}} onClick={()=>onApply(result)}>Woche füllen</button>
              </div>
            </div>
          )}
        </div>
        
        {/* Input */}
        <div style={{padding:20,background:"#0D0D0F",borderTop:"1px solid #1E1E24"}}>
          <div style={{display:"flex",gap:10}}>
            <textarea 
              style={{...s.inp,flex:1,minHeight:48,maxHeight:120,resize:"none",padding:"12px 16px"}} 
              placeholder="Deine Wünsche..." 
              value={prompt} 
              onChange={e=>setPrompt(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();generate();}}}
            />
            <button 
              style={{width:48,height:48,borderRadius:10,background:prompt.trim()?"#3B82F6":"#1A1A1F",border:"none",color:"#fff",cursor:prompt.trim()?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}
              onClick={generate}
              disabled={!prompt.trim() || loading}
            >
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen(){
  const [mode,setMode]=useState("login"); // "login" | "register"
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [showPw,setShowPw]=useState(false);

  const AUTH_ERRORS={
    "auth/invalid-email":"Ungültige E-Mail-Adresse.",
    "auth/user-not-found":"Kein Konto mit dieser E-Mail gefunden.",
    "auth/wrong-password":"Falsches Passwort.",
    "auth/email-already-in-use":"Diese E-Mail ist bereits registriert.",
    "auth/weak-password":"Passwort zu schwach (mind. 6 Zeichen).",
    "auth/too-many-requests":"Zu viele Versuche. Bitte warte kurz.",
    "auth/invalid-credential":"E-Mail oder Passwort falsch.",
  };

  // Warte bis Firebase wirklich bereit ist (max 10 Sekunden)
  const waitForFirebase = () => new Promise((res, rej) => {
    const check = (n) => {
      if(window.firebaseCreateUser && window.firebaseSignIn && window.firebaseAuth){
        res();
      } else if(n <= 0){
        rej(new Error("Firebase konnte nicht geladen werden. Bitte Seite neu laden (F5)."));
      } else {
        setTimeout(()=>check(n-1), 200);
      }
    };
    check(50); // 50 × 200ms = 10 Sekunden
  });

  const handleSubmit=async()=>{
    if(!email||!password)return setError("Bitte alle Felder ausfüllen.");
    if(mode==="register"&&!name)return setError("Bitte deinen Namen eingeben.");
    setLoading(true);setError("");
    try{
      await waitForFirebase();
      if(mode==="register"){
        const cred = await window.firebaseCreateUser(window.firebaseAuth, email, password);
        const [firstName, ...rest] = name.split(" ");
        const lastName = rest.join(" ");
        const initialUserData = { ...defaultUser, firstName, lastName, email };
        
        if(window.firebaseUpdateProfile) await window.firebaseUpdateProfile(cred.user, {displayName:name});
        
        // Explicitly set initial user data in Firestore for the new user
        const uid = cred.user.uid;
        await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "fitforge", `${uid}_user`), { value: initialUserData });
        // Also set into localStorage so it displays correctly immediately
        localStorage.setItem(`ff_${uid}_user`, JSON.stringify(initialUserData));
      } else {
        await window.firebaseSignIn(window.firebaseAuth, email, password);
      }
    } catch(e){
      setError(AUTH_ERRORS[e.code]||"Fehler: "+e.message);
    }
    setLoading(false);
  };

  const inp={width:"100%",background:"#111114",border:"1px solid #2A2A30",borderRadius:11,padding:"13px 16px",color:"#F0EDE8",fontSize:15,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"};

  return(
    <div style={{minHeight:"100vh",background:"#0D0D0F",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'DM Sans',sans-serif"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap');input:focus{border-color:#FF6B35!important;outline:none;}`}</style>

      <div style={{width:"100%",maxWidth:420}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:8}}>
            <svg width="32" height="32" fill="#FF6B35" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            <span style={{fontFamily:"'Syne',sans-serif",fontSize:32,fontWeight:800,color:"#F0EDE8",letterSpacing:"-1px"}}>FitForge</span>
          </div>
          <p style={{color:"#666",fontSize:14,margin:0}}>{mode==="login"?"Willkommen zurück!":"Erstelle dein Konto"}</p>
        </div>

        {/* Card */}
        <div style={{background:"#111114",border:"1px solid #1E1E24",borderRadius:20,padding:32,boxShadow:"0 24px 64px rgba(0,0,0,0.5)"}}>
          {/* Mode toggle */}
          <div style={{display:"flex",background:"#0D0D0F",borderRadius:12,padding:4,marginBottom:28,gap:4}}>
            {["login","register"].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,background:mode===m?"#FF6B35":"transparent",border:"none",borderRadius:9,padding:"9px",color:mode===m?"#fff":"#888",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s"}}>
                {m==="login"?"Einloggen":"Registrieren"}
              </button>
            ))}
          </div>

          {mode==="register"&&(
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#666",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Name</label>
              <input style={inp} placeholder="Max Mustermann" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>
            </div>
          )}

          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#666",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>E-Mail</label>
            <input style={inp} type="email" placeholder="max@beispiel.de" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>
          </div>

          <div style={{marginBottom:error?16:24}}>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#666",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Passwort</label>
            <div style={{position:"relative"}}>
              <input style={{...inp,paddingRight:48}} type={showPw?"text":"password"} placeholder={mode==="register"?"Mind. 6 Zeichen":"••••••••"} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>
              <button onClick={()=>setShowPw(v=>!v)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:"#666",cursor:"pointer",fontSize:16,padding:0,display:"flex"}}>
                {showPw?"🙈":"👁️"}
              </button>
            </div>
          </div>

          {error&&<div style={{background:"#2A1A1A",border:"1px solid #4A2A2A",color:"#FCA5A5",borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:18}}>{error}</div>}

          <button onClick={handleSubmit} disabled={loading} style={{width:"100%",background:loading?"#333":"linear-gradient(135deg,#FF6B35,#FF8C60)",border:"none",borderRadius:11,padding:"14px",color:"#fff",fontSize:16,fontWeight:700,cursor:loading?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.2s"}}>
            {loading?<><div style={{width:18,height:18,border:"2px solid rgba(255,255,255,0.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/> Laden...</>
            :mode==="login"?"⚡ Einloggen":"🚀 Konto erstellen"}
          </button>

          <p style={{textAlign:"center",color:"#555",fontSize:12,marginTop:20,marginBottom:0}}>
            {mode==="login"?"Noch kein Konto? ":"Bereits registriert? "}
            <button onClick={()=>{setMode(mode==="login"?"register":"login");setError("");}} style={{background:"transparent",border:"none",color:"#FF6B35",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>
              {mode==="login"?"Jetzt registrieren":"Hier einloggen"}
            </button>
          </p>
        </div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
    </div>
  );
}
