<script>
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyBHcrBR0fWYVDkdWWAoVfvMEaN0CeoB52M",
      authDomain: "mircos-app.firebaseapp.com",
      projectId: "mircos-app",
      storageBucket: "mircos-app.firebasestorage.app",
      messagingSenderId: "192709665118",
      appId: "1:192709665118:web:73e2bb1c9bc552bbbf2fcf"
    };

    firebase.initializeApp(firebaseConfig);
    const _auth = firebase.auth();
    const _db   = firebase.firestore();
    const _stor = firebase.storage();

    // Auth helpers
    window.firebaseAuth = _auth;
    window.firebaseCreateUser = (auth, email, pw) => _auth.createUserWithEmailAndPassword(email, pw);
    window.firebaseSignIn    = (auth, email, pw) => _auth.signInWithEmailAndPassword(email, pw);
    window.firebaseSignOut   = () => _auth.signOut();
    window.firebaseUpdateProfile = (user, data) => user.updateProfile(data);
    window.firebaseOnAuthStateChanged = (cb) => _auth.onAuthStateChanged(cb);

    // Firestore helpers
    window.firebaseDb  = _db;
    window.firebaseDoc = (db, ...path) => {
      let ref = _db;
      for(let i=0; i<path.length; i++){
        ref = i%2===0 ? ref.collection(path[i]) : ref.doc(path[i]);
      }
      return ref;
    };
    window.firebaseGetDoc = (ref) => ref.get().then(snap => ({
      exists: () => snap.exists === true,
      data:   () => snap.data() || {}
    }));
    window.firebaseSetDoc = (ref, data) => ref.set(data);
    window.firebaseOnSnapshot = (ref, cb, err) => ref.onSnapshot(cb, err);

    // Storage helpers
    window.firebaseStorage        = _stor;
    window.firebaseRef            = (stor, path) => _stor.ref(path);
    window.firebaseUploadBytes    = (ref, file) => ref.put(file);
    window.firebaseGetDownloadURL = (ref) => ref.getDownloadURL();
    window.firebaseDeleteObject   = (ref) => ref.delete();

    // Signal ready
    window.firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
    if(window.dbg) dbg('✅ Firebase bereit!', '#0f0');
  } catch(e) {
    console.warn("Firebase init failed:", e.message);
    if(window.dbg) dbg('❌ Firebase Fehler: ' + e.message, '#f55');
    window.firebaseReady = false;
  }
</script>

<script>
  const dbg = (msg, color) => {
    const d = document.getElementById('fb-debug');
    if(d){ const line = document.createElement('div'); line.style.color = color||'#0f0'; line.textContent = new Date().toLocaleTimeString() + ' » ' + msg; d.appendChild(line); d.scrollTop=d.scrollHeight; }
    console.log(msg);
  };
  window.dbg = dbg;
  window.onerror = (msg,src,line,col,err) => {
    dbg('JS ERROR: '+msg+' ('+src+':'+line+':'+col+')', '#f55');
    if(err && err.stack) dbg('STACK: '+err.stack.split('\n').slice(0,3).join(' | '), '#f88');
    return false;
  };
  window.addEventListener('unhandledrejection', e => {
    dbg('PROMISE ERROR: '+(e.reason?.message||e.reason||'unbekannt'), '#f55');
    if(e.reason?.stack) dbg('STACK: '+e.reason.stack.split('\n').slice(0,3).join(' | '), '#f88');
  });
  dbg('Seite geladen - warte auf Firebase...');
</script>
<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef } = React;

const MediaDisplay = ({src, style, className, onClick}) => {
  if (!src) return null;
  const isVideo = src.toLowerCase().includes("video") || src.toLowerCase().endsWith(".mp4") || src.toLowerCase().endsWith(".webm") || src.toLowerCase().endsWith(".mov") || src.startsWith("data:video");
  if (isVideo) {
    return (
      <video src={src} style={style} className={className} onClick={onClick} autoPlay muted loop playsInline />
    );
  }
  return <img src={src} style={style} className={className} onClick={onClick} loading="lazy" />;
};

// ── Firebase helpers (user-scoped) ────────────────────────────────────────────
const getUid = () => window.firebaseAuth?.currentUser?.uid || null;

const fbGet = async (key, fallback) => {
  try {
    const uid = getUid();
    if (window.firebaseDb && uid) {
      const snap = await window.firebaseGetDoc(window.firebaseDoc(window.firebaseDb, "users", uid, "fitforge", key));
      if (snap.exists()) {
        const val = snap.data().value;
        localStorage.setItem("ff_" + key, JSON.stringify(val)); // Sync to local
        return val;
      }
    }
    const r = localStorage.getItem("ff_" + key);
    return r ? JSON.parse(r) : fallback;
  } catch {
    try { const r = localStorage.getItem("ff_" + key); return r ? JSON.parse(r) : fallback; } catch { return fallback; }
  }
};

const fbSet = async (key, value) => {
  try {
    localStorage.setItem("ff_" + key, JSON.stringify(value));
    const uid = getUid();
    if (window.firebaseDb && uid) {
      await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "users", uid, "fitforge", key), { value });
    }
  } catch(e) { console.error("fbSet error:", e); }
};

// Firebase Storage upload – returns download URL (falls back to base64)
const uploadToStorage = async (file, path) => {
  try {
    const uid = getUid();
    if (!window.firebaseStorage || !uid) throw new Error("Storage not ready or not signed in");
    const fullPath = `fitforge/${path}`;
    const storageRef = window.firebaseRef(window.firebaseStorage, fullPath);
    await window.firebaseUploadBytes(storageRef, file);
    return await window.firebaseGetDownloadURL(storageRef);
  } catch(e) {
    console.warn("Storage upload fallback to base64:", e.message);
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.readAsDataURL(file);
    });
  }
};

// Delete from Storage
const deleteFromStorage = async (path) => {
  try {
    const uid = getUid();
    if (!window.firebaseStorage || !uid) return;
    const storageRef = window.firebaseRef(window.firebaseStorage, `users/${uid}/${path}`);
    await window.firebaseDeleteObject(storageRef);
  } catch(e) { console.warn("deleteFromStorage:", e.message); }
};

function genNotifs(data,user){const n=[],t=new Date(),ti=t.getDay()===0?6:t.getDay()-1,tn=FULL_WEEKDAYS[ti],tmn=FULL_WEEKDAYS[(ti+1)%7];data.plans.forEach(p=>{if(p.days.includes(tn))n.push({id:`today-${p.id}`,type:"training",title:"Training heute! 💪",body:`${p.name} steht heute an!`,read:false,ts:Date.now()-3e5});if(p.days.includes(tmn))n.push({id:`tmrw-${p.id}`,type:"reminder",title:"Training morgen 📅",body:`${p.name} steht morgen auf dem Plan!`,read:false,ts:Date.now()-36e5});});const last=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];if(last){const d=Math.floor((t-new Date(last.date))/864e5);if(d>=3)n.push({id:"rest",type:"warning",title:"Lange Pause 😴",body:`Letztes Training vor ${d} Tagen!`,read:false,ts:Date.now()-18e5});}if(data.workouts.length>=5)n.push({id:`mile-${data.workouts.length}`,type:"achievement",title:"Meilenstein 🏆",body:`${data.workouts.length} Trainings – weiter so!`,read:true,ts:Date.now()-864e5});return n;}
let _chartId=0;
function LineChart({points,color="#FF6B35",height=80}){
  const id=useRef(`lc${++_chartId}`).current;
  if(!points||points.length<2)return<div style={{color:"#555",fontSize:13,padding:"20px 0",textAlign:"center"}}>Noch nicht genug Daten</div>;
  const W=500,H=height,pad=12;
  const vals=points.map(v=>isFinite(v)?v:0);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const xs=vals.map((_,i)=>pad+(i/(vals.length-1))*(W-pad*2));
  const ys=vals.map(v=>H-pad-((v-mn)/rng)*(H-pad*2));
  const d=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area=`${d} L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block"}} preserveAspectRatio="none">
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map((x,i)=><circle key={i} cx={x.toFixed(1)} cy={ys[i].toFixed(1)} r="4" fill={color} stroke="#111114" strokeWidth="2"/>)}
    </svg>
  );
}
function BarChart({bars,color="#FF6B35",height=90}){
  if(!bars||!bars.length)return null;
  const W=500,H=height,pad=4,gap=6;
  const mx=Math.max(...bars.map(b=>b.v),1);
  const bw=(W-pad*2-gap*(bars.length-1))/bars.length;
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",height:H+20,display:"block"}}>
      {bars.map((b,i)=>{
        const bh=b.v>0?Math.max((b.v/mx)*(H-pad),4):0;
        const x=pad+i*(bw+gap),y=H-bh;
        return(<g key={i}><rect x={x} y={y} width={bw} height={bh} rx="4" fill={color} opacity="0.82"/><text x={x+bw/2} y={H+15} textAnchor="middle" fontSize="11" fill="#555">{b.l}</text></g>);
      })}
    </svg>
  );
}
function DonutChart({value,max,color="#FF6B35",size=80,label=""}){const r=30,circ=2*Math.PI*r,pct=Math.min(value/Math.max(max,1),1),dash=pct*circ;return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><svg width={size} height={size} viewBox="0 0 80 80"><circle cx="40" cy="40" r={r} fill="none" stroke="#1E1E24" strokeWidth="8"/><circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform="rotate(-90 40 40)" style={{transition:"stroke-dasharray 0.5s"}}/><text x="40" y="44" textAnchor="middle" fontSize="12" fontWeight="800" fill="#F0EDE8" fontFamily="Syne,sans-serif">{Math.round(pct*100)}%</text></svg>{label&&<div style={{fontSize:10,color:"#666",textAlign:"center",maxWidth:70}}>{label}</div>}</div>);}

    if(!authUser) return;

        const [d,u,p,n,lib,wp] = await Promise.all([
          fbGet("data", defaultData),

    };

    return ()=>window.removeEventListener("resize",handleResize);
  },[]);

  useEffect(()=>{
    if(!loaded && authUser && hasCachedData){
       // If we have cached data, we can consider the "initial" state loaded for UI purposes
       setLoaded(true);
    }
  },[authUser, hasCachedData, loaded]);


  const lastSyncRef = useRef({});

  // ── Auth state listener & Real-time Listeners ─────────────────────────────
  useEffect(() => {
    let unsubs = [];
    let cancelled = false;

    const setupListeners = (fbUser) => {
      if (cancelled) return;
      setAuthUser(fbUser);
      setAuthLoading(false);

      if (fbUser) {
        if (window.dbg) dbg('👤 Nutzer eingeloggt: ' + fbUser.email, '#0f0');
        const uid = fbUser.uid;
        const syncKeys = [
          { key: "data", setter: setData, df: defaultData },
          { key: "user", setter: setUser, df: defaultUser },
          { key: "prs", setter: setPrs, df: defaultPRs },
          { key: "nutrition", setter: setNutrition, df: {} },
          { key: "library", setter: setLibrary, df: [] },
          { key: "weekPlans", setter: setWeekPlans, df: {} }
        ];

        let pendingInitial = syncKeys.length;

        syncKeys.forEach(({ key, setter, df }) => {
          const ref = window.firebaseDoc(window.firebaseDb, "users", uid, "fitforge", key);
          const unsub = window.firebaseOnSnapshot(ref, (snap) => {
            if (cancelled) return;
            
            if (snap.exists()) {
              const cloudVal = snap.data().value;
              const cloudStr = JSON.stringify(cloudVal);
              
              // Only update state if cloud data differs from current local state
              // This is crucial to prevent "echo" loops and UI jitter
              if (cloudStr !== lastSyncRef.current[key]) {
                if (window.dbg && !lastSyncRef.current[key]) dbg(`📥 ${key} geladen`, '#0ff');
                localStorage.setItem("ff_" + key, cloudStr);
                lastSyncRef.current[key] = cloudStr;
                setter(cloudVal);
              }
            } else {
              if (window.dbg) dbg(`ℹ️ ${key} neu/leer auf Cloud`, '#aaa');
              // If not found in cloud, we keep what's in LocalStorage (set via useState init)
              // and it will be pushed to cloud automatically once loaded=true
            }

            pendingInitial--;
            if (pendingInitial <= 0 && !loaded) {
              if (window.dbg) dbg('🚀 Echtzeit-Synchronisierung bereit!', '#0f0');
              setLoaded(true);
              setLastSync(new Date());
            }
          }, (err) => {
            if (window.dbg) dbg(`❌ Snapshot Fehler (${key}): ${err.message}`, '#f55');
            // On error, we still try to proceed
            pendingInitial--;
            if (pendingInitial <= 0) setLoaded(true);
          });
          unsubs.push(unsub);
        });
      } else {
        if (window.dbg) dbg('🚪 Nutzer ausgeloggt', '#ff0');
        setLoaded(false);
        unsubs.forEach(fn => fn());
        unsubs = [];
      }
    };

    const attachAuth = () => {
      if (cancelled) return;
      if (window.firebaseOnAuthStateChanged) {
        window.firebaseOnAuthStateChanged(setupListeners);
      } else {
        setTimeout(attachAuth, 100);
      }
    };

    const onReady = () => attachAuth();
    window.addEventListener('firebaseReady', onReady);
    if (window.firebaseReady) attachAuth();

    // Safety timeout
    const t = setTimeout(() => {
      if (!cancelled && authLoading) {
        setAuthLoading(false);
        setLoaded(false);
      }
    }, 10000);

    return () => {
      cancelled = true;
      window.removeEventListener('firebaseReady', onReady);
      clearTimeout(t);
      unsubs.forEach(fn => fn());
    };
  }, []);

  // ── Sync to Firestore on local change (debounced) ────────────────────────
  const debRef = useRef({});
  const syncToCloud = (key, val) => {
    if (!authUser || !loaded) return;
    const valStr = JSON.stringify(val);
    
    // VERY IMPORTANT: Skip if this change just came FROM the cloud
    if (valStr === lastSyncRef.current[key]) return;

    clearTimeout(debRef.current[key]);

      if (window.dbg) dbg(`📤 Speicher ${key} in Cloud...`, '#ff0');

function Stats({data,prs,nutrition,user}){
  const [range,setRange]=useState(30);
  const [err,setErr]=useState(null);
  const safeW=Array.isArray(data?.workouts)?data.workouts:[];
  const safePrs=prs&&typeof prs==="object"?prs:{};
  const safeNut=nutrition&&typeof nutrition==="object"?nutrition:{};
  const cutoff=new Date(Date.now()-range*864e5);
  const filtered=safeW.filter(w=>{try{return new Date(w.date)>=cutoff;}catch{return false;}}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const safeVol=w=>{try{return(w.exercises||[]).reduce((a,e)=>a+(e.sets||[]).reduce((b,s)=>b+(+s.weight||0)*(+s.reps||0),0),0);}catch{return 0;}};
  const volData=filtered.map(w=>safeVol(w));
  const durData=filtered.map(w=>isFinite(w.duration)?+w.duration:0);
  const wpw=Array.from({length:8},(_,i)=>{const ws=new Date(Date.now()-(7-i)*7*864e5),we=new Date(Date.now()-(6-i)*7*864e5);return{v:safeW.filter(w=>{try{const d=new Date(w.date);return d>=ws&&d<we;}catch{return false;}}).length,l:`W${i+1}`};});
  const calTrend=Array.from({length:14},(_,i)=>{const d=new Date(Date.now()-(13-i)*864e5).toISOString().split("T")[0];const v=safeNut[d]?.calories;return isFinite(v)?+v:0;});
  const allEx=safeW.flatMap(w=>(w.exercises||[]).map(e=>String(e.name||"").toLowerCase()));
  const groups={Push:["bankdrücken","schulterdrücken","trizeps","dips"],Pull:["klimmzüge","rudern","bizeps","latzug"],Legs:["kniebeugen","beinpresse","kreuzheben","ausfallschritte"],Core:["planks","crunches","sit-ups"]};
  const gc=Object.entries(groups).map(([name,exs])=>({name,count:allEx.filter(n=>exs.some(e=>n.includes(e))).length}));
  const gcMax=Math.max(...gc.map(g=>g.count),1);
  const totalW=safeW.length,totalD=safeW.reduce((a,w)=>a+(isFinite(w.duration)?+w.duration:0),0),totalVK=Math.round(safeW.reduce((a,w)=>a+safeVol(w),0)/1000),avgD=totalW?Math.round(totalD/totalW):0,prC=Object.keys(safePrs).length;
  const clrs=["#FF6B35","#00D9C0","#A78BFA","#FFD166"];
  return(<div style={s.page}>
    <div style={s.pageHead}><div><h1 style={s.pageTitle}>Statistiken</h1><p style={s.pageSub}>Dein Fortschritt auf einen Blick</p></div><div style={{display:"flex",gap:8}}>{[7,30,90].map(d=><button key={d} style={{...s.secBtn,padding:"7px 14px",fontSize:12,...(range===d?{background:"#FF6B35",color:"#fff",borderColor:"#FF6B35"}:{})}} onClick={()=>setRange(d)}>{d}T</button>)}</div></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:22}}>
      {[[totalW,"Trainings","#FF6B35"],[`${totalD}min`,"Gesamt-Zeit","#00D9C0"],[`${totalVK}k kg`,"Volumen","#A78BFA"],[`${avgD}min`,"Ø Dauer","#FFD166"],[prC,"PRs","#06D6A0"]].map(([v,l,c],i)=>(
        <div key={i} style={{...s.card,padding:"18px",textAlign:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,color:"#666",marginTop:5}}>{l}</div></div>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
      <div style={s.card}><h3 style={{...s.cardTitle,marginBottom:14}}>Trainingsvolumen (kg)</h3><LineChart points={volData} color="#FF6B35" height={100}/></div>
      <div style={s.card}><h3 style={{...s.cardTitle,marginBottom:14}}>Trainingsdauer (min)</h3><LineChart points={durData} color="#00D9C0" height={100}/></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
      <div style={s.card}><h3 style={{...s.cardTitle,marginBottom:14}}>Trainings pro Woche</h3><BarChart bars={wpw} color="#A78BFA" height={90}/></div>
      <div style={s.card}><h3 style={{...s.cardTitle,marginBottom:14}}>Kalorien – 14 Tage</h3><LineChart points={calTrend} color="#FFD166" height={100}/></div>
    </div>

    
  </div>);}
function Nutrition({nutrition,setNutrition,user,notify}){
  const [selDate,setSelDate]=useState(todayStr());
  const [showAdd,setShowAdd]=useState(false);
  const [meal,setMeal]=useState({name:"",calories:"",protein:"",carbs:"",fat:"",mealType:"Frühstück"});
  const [search,setSearch]=useState("");
  const [apiResults,setApiResults]=useState([]);
  const [apiLoading,setApiLoading]=useState(false);
  const [searchMode,setSearchMode]=useState("quick"); // "quick" or "api"
  const dayData=nutrition[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[]};

  const searchOpenFoodFacts=async(query)=>{
    if(!query||query.length<3)return;
    setApiLoading(true);
    try{
      const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=10&fields=product_name,nutriments,quantity,brands`);
      const data=await res.json();
      const results=(data.products||[]).filter(p=>p.product_name&&p.nutriments).map(p=>({
        name:`${p.product_name}${p.brands?" ("+p.brands+")":""}`,
        calories:Math.round(p.nutriments["energy-kcal_100g"]||p.nutriments["energy-kcal"]||0),
        protein:Math.round((p.nutriments.proteins_100g||0)*10)/10,
        carbs:Math.round((p.nutriments.carbohydrates_100g||0)*10)/10,
        fat:Math.round((p.nutriments.fat_100g||0)*10)/10,
        quantity:p.quantity||"100g"
      })).filter(p=>p.calories>0);
      setApiResults(results);
    }catch(e){console.error(e);}
    setApiLoading(false);
  };

  useEffect(()=>{
    if(searchMode==="api"&&search.length>=3){
      const t=setTimeout(()=>searchOpenFoodFacts(search),600);
      return()=>clearTimeout(t);
    }
  },[search,searchMode]);
  const calGoal=user.calorieGoal||2500,protGoal=user.proteinGoal||150,carbGoal=Math.round(calGoal*0.5/4),fatGoal=Math.round(calGoal*0.3/9);
  const addMeal=()=>{if(!meal.name||!meal.calories)return notify("Name und Kalorien ausfüllen","error");const entry={...meal,id:Date.now(),calories:parseInt(meal.calories)||0,protein:parseFloat(meal.protein)||0,carbs:parseFloat(meal.carbs)||0,fat:parseFloat(meal.fat)||0};setNutrition(n=>{const d=n[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[]};return{...n,[selDate]:{calories:d.calories+entry.calories,protein:d.protein+entry.protein,carbs:d.carbs+entry.carbs,fat:d.fat+entry.fat,meals:[...d.meals,entry]}};});notify(`${meal.name} hinzugefügt! ✅`);setMeal({name:"",calories:"",protein:"",carbs:"",fat:"",mealType:"Frühstück"});setShowAdd(false);};
  const quickAdd=food=>{setNutrition(n=>{const d=n[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[]};return{...n,[selDate]:{calories:d.calories+food.calories,protein:d.protein+food.protein,carbs:d.carbs+food.carbs,fat:d.fat+food.fat,meals:[...d.meals,{...food,id:Date.now(),mealType:"Sonstige"}]}};});notify(`${food.name} hinzugefügt!`);};
  const delMeal=id=>{setNutrition(n=>{const d=n[selDate];if(!d)return n;const rm=d.meals.find(m=>m.id===id);if(!rm)return n;return{...n,[selDate]:{calories:Math.max(0,d.calories-rm.calories),protein:Math.max(0,d.protein-rm.protein),carbs:Math.max(0,d.carbs-rm.carbs),fat:Math.max(0,d.fat-rm.fat),meals:d.meals.filter(m=>m.id!==id)}};});notify("Eintrag gelöscht");};
  const mealGroups=["Frühstück","Mittagessen","Abendessen","Snack","Sonstige"];
  const filtered=COMMON_FOODS.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));
  return(<div style={s.page}>
    <div style={s.pageHead}><div><h1 style={s.pageTitle}>Ernährung</h1><p style={s.pageSub}>Kalorien & Makros tracken</p></div><div style={{display:"flex",gap:12,alignItems:"center"}}><input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{...s.inp,width:"auto",padding:"8px 12px"}}/><button style={s.primaryBtn} onClick={()=>setShowAdd(o=>!o)}>{IC.plus} Hinzufügen</button></div></div>
    <div style={{...s.card,marginBottom:22}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><h3 style={s.cardTitle}>Makros</h3><div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:"#FF6B35"}}>{dayData.calories}<span style={{fontSize:12,color:"#666",fontWeight:400}}> / {calGoal} kcal</span></div></div>
      <div style={{height:9,background:"#1A1A1F",borderRadius:5,overflow:"hidden",marginBottom:18}}><div style={{height:"100%",width:`${Math.min(dayData.calories/calGoal*100,100)}%`,background:"#FF6B35",borderRadius:5,transition:"width 0.4s"}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
        {[["Protein",dayData.protein||0,protGoal,"g","#00D9C0"],["Kohlenhydrate",dayData.carbs||0,carbGoal,"g","#FFD166"],["Fett",dayData.fat||0,fatGoal,"g","#A78BFA"]].map(([label,val,goal,unit,color])=>(
          <div key={label} style={{background:"#0D0D0F",borderRadius:11,padding:"13px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{fontSize:12,fontWeight:600,color}}>{label}</span><span style={{fontSize:11,color:"#666"}}>{Math.round(val)}/{goal}{unit}</span></div><div style={{height:5,background:"#1A1A1F",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(val/goal*100,100)}%`,background:color,borderRadius:3,transition:"width 0.4s"}}/></div></div>
        ))}
      </div>
    </div>
    {showAdd&&<div style={{...s.card,marginBottom:20,border:"1px solid #2A2A30"}} className="fadeIn">
      <h3 style={{...s.cardTitle,marginBottom:16}}>Mahlzeit hinzufügen</h3>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:11,marginBottom:11}}>
        <div style={s.fg}><label style={s.lbl}>Name</label><input style={s.inp} value={meal.name} onChange={e=>setMeal(m=>({...m,name:e.target.value}))} placeholder="z.B. Hähnchenbrust" autoFocus/></div>
        <div style={s.fg}><label style={s.lbl}>Mahlzeit</label><select style={s.inp} value={meal.mealType} onChange={e=>setMeal(m=>({...m,mealType:e.target.value}))}>{mealGroups.map(mg=><option key={mg}>{mg}</option>)}</select></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:14}}>
        {[["Kalorien","calories","#FF6B35"],["Protein (g)","protein","#00D9C0"],["Carbs (g)","carbs","#FFD166"],["Fett (g)","fat","#A78BFA"]].map(([label,key,color])=>(
          <div key={key} style={s.fg}><label style={{...s.lbl,color}}>{label}</label><input style={s.inp} type="number" value={meal[key]} onChange={e=>setMeal(m=>({...m,[key]:e.target.value}))} placeholder="0"/></div>
        ))}
      </div>

    </div>}

      {searchMode==="api"&&apiLoading&&<div style={{textAlign:"center",padding:"20px",color:"#888",fontSize:13}}>🔍 Suche in Open Food Facts...</div>}

      {searchMode==="quick"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:9}}>{filtered.map((food,i)=>(<div key={i} style={{background:"#0D0D0F",borderRadius:9,padding:"11px 13px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid #1E1E24"}}><div><div style={{fontWeight:600,fontSize:12,marginBottom:2}}>{food.name}</div><div style={{fontSize:10,color:"#888"}}>{food.calories} kcal · {food.protein}g P</div></div><button style={{...s.primaryBtn,padding:"5px 10px",fontSize:11}} onClick={()=>quickAdd(food)}>{IC.plus}</button></div>))}</div>}
    </div>
  </div>);}
function Plans({data,setData,onNew,onEdit,notify}){

        {(plan.types||[]).map(t=><span key={t} style={{fontSize:9,background:TYPE_COLORS[t]+"15",color:TYPE_COLORS[t],borderRadius:7,padding:"2px 8px",fontWeight:800}}>{t}</span>)}
      </div>

      <div style={{fontSize:11,color:"#555",fontWeight:700}}>{data.workouts.filter(w=>w.planId===plan.id).length} Trainings absolviert</div>
      <div style={{position:"absolute",top:13,right:13,display:"flex",gap:5}}><button className="cardIconBtn" style={s.cardIconBtn} onClick={()=>onEdit({...plan,exercises:exs})}>{IC.edit}</button><button className="cardIconBtn" style={{...s.cardIconBtn,color:"#EF476F88"}} onClick={()=>del(plan.id)}>{IC.trash}</button></div>

    <div style={s.newPlanCard} onClick={onNew} className="planCard"><div style={{color:"#444",display:"flex"}}>{IC.plus}</div><span style={{color:"#666",fontSize:13}}>Neuen Plan erstellen</span></div></div>
  </div>);}
function LogWorkout({data,setData,notify,prs,onSavePR,library}){
  const [step,setStep]=useState(1);
  const [planId,setPlanId]=useState(data.plans[0]?.id||null);
  const [date,setDate]=useState(todayStr());
  const [exercises,setExercises]=useState([]);
  const [curEx,setCurEx]=useState(0);
  const [curRound,setCurRound]=useState(1);
  const [totalRounds,setTotalRounds]=useState(1);
  const [totalSets,setTotalSets]=useState(1);
  const [repeatRounds,setRepeatRounds]=useState(false);
  const [timer,setTimer]=useState(0);
  const [running,setRunning]=useState(false);
  const [sets,setSets]=useState({});
  const [showInfo,setShowInfo]=useState(false);
  const [startTime,setStartTime]=useState(null);
  const [endTime,setEndTime]=useState(null);
  const timerRef=useRef(null);

  useEffect(()=>{
    const plan=data.plans.find(p=>p.id===parseInt(planId));
    if(plan){
      // LIVE SYNC: Merge plan exercises with latest library data
      const exs=(plan.exercises||[]).map(e=>{
        const exObj = typeof e==="string"?{name:e,photo:null,reps:""}:e;
        // Find latest library entry
        const libMatch = library.find(l => l.id === exObj.libId || (l.name === exObj.name && l.name));
        
        if (libMatch) {
          return {
            ...exObj,
            photo: libMatch.thumbnail || exObj.photo,
            description: libMatch.description,
            // Only update track-prefs if they aren't explicitly override in plan? 
            // Actually, the user wants "Live" behavior, so let's prefer lib if not customized in plan.
            trackSets: exObj.trackSets ?? libMatch.trackSets ?? true,
            trackReps: exObj.trackReps ?? libMatch.trackReps ?? true,
            trackWeight: exObj.trackWeight ?? libMatch.trackWeight ?? true,
            trackKcal: exObj.trackKcal ?? libMatch.trackKcal ?? false,
            trackKm: exObj.trackKm ?? libMatch.trackKm ?? false,
            trackIncline: exObj.trackIncline ?? libMatch.trackIncline ?? false,
            trackTempo: exObj.trackTempo ?? libMatch.trackTempo ?? false,
            // Defaults (sets/reps) - prefer lib if plan values are empty
            // Prioritize library values for live sync as requested
            sets: libMatch.sets || exObj.sets || 1,
            reps: libMatch.reps || exObj.reps || "",
            weight: libMatch.weight || exObj.weight || "",
            kcal: libMatch.kcal || exObj.kcal || "",
            km: libMatch.km || exObj.km || "",
            incline: libMatch.incline || exObj.incline || "",
            tempo: libMatch.tempo || exObj.tempo || ""

          };
        }
        return exObj;
      });
      
      setExercises(exs);
      const initSets={};
      exs.forEach((ex,i)=>{
        const count = parseInt(ex.sets) || 1;
        const sarr = [];
        for(let j=0; j<count; j++){
          sarr.push({reps:ex.reps||"", weight:ex.weight||"", incline:ex.incline||"", tempo:ex.tempo||"", preset:true});
        }
        initSets[i] = sarr;
      });
      setSets(initSets);
    }
  },[planId, library]);

  useEffect(()=>{
    if(running){timerRef.current=setInterval(()=>setTimer(t=>t+1),1000);}
    else{clearInterval(timerRef.current);}
    return()=>clearInterval(timerRef.current);
  },[running]);

  const fmtTimer=t=>{const m=Math.floor(t/60),s=t%60;return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;};
  const addSet=ei=>setSets(s=>({...s,[ei]:[...(s[ei]||[]),{reps:"",weight:""}]}));
  const updSet=(ei,si,k,v)=>setSets(s=>{const n=JSON.parse(JSON.stringify(s));if(n[ei]&&n[ei][si]){n[ei][si][k]=v;n[ei][si].preset=false;}return n;});

  const goNext=()=>{
    if(curEx<exercises.length-1){
      setCurEx(i=>i+1);
    } else if(repeatRounds && curRound < totalRounds){
      // Wrap around for next round
      setCurEx(0);
      setCurRound(r=>r+1);
      notify(`Durchgang ${curRound+1} gestartet! 💪`);
    } else {
      setStep(3);
      setRunning(false);
      const now = new Date();
      setEndTime(now.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}));
    }
  };

  const delSet=(ei,si)=>setSets(s=>{const n={...s};if(n[ei]){n[ei]=n[ei].filter((_,i)=>i!==si);}return n;});
  const toggleSetDone=(ei,si)=>setSets(s=>{const n=JSON.parse(JSON.stringify(s));if(n[ei]&&n[ei][si]){n[ei][si].done=!n[ei][si].done;}return n;});

  const save=()=>{
    const plan=data.plans.find(p=>p.id===parseInt(planId));
    
    // Filter out invalid sets (no reps) and empty exercises
    const parsed=exercises.map((ex,ei)=>{
      const sArr = sets[ei] || [];
      const valid = sArr.filter(s => s.done && (parseInt(s.reps) > 0 || parseFloat(s.kcal) > 0 || parseFloat(s.km) > 0));

      return {
        name: ex.name,
        sets: valid.map(s => ({
          reps: parseInt(s.reps) || 0,
          weight: parseFloat(s.weight) || 0,
          kcal: parseFloat(s.kcal) || 0,
          km: parseFloat(s.km) || 0,
          incline: s.incline || "",
          tempo: s.tempo || ""
        }))
      };
    }).filter(ex => ex.sets.length > 0);


    if(parsed.length === 0) return notify("Keine Sätze zum Speichern gefunden!", "error");

    parsed.forEach(ex=>{
      const best=ex.sets.reduce((b,s)=>s.weight*s.reps>b.weight*b.reps?s:b,{reps:0,weight:0});
      if(best.weight>0) onSavePR(ex.name,best.weight,best.reps);
    });

    setData(d=>({...d,workouts:[{
      id:Date.now(),
      planId:parseInt(planId),
      name:plan?.name||"Training",
      date,
      duration:Math.round(timer/60),
      note:"",
      photo:null,
      exercises:parsed,
      startTime,
      endTime
    },...d.workouts]}));

    notify("Training gespeichert! 💪");
    setStep(1);setTimer(0);setRunning(false);setCurEx(0);setCurRound(1);setStartTime(null);setEndTime(null);
  };

  const plan=data.plans.find(p=>p.id===parseInt(planId));
  const curExData=exercises[curEx];
  const allExSets = sets[curEx] || [];
  const curSets = repeatRounds 
    ? allExSets.slice((curRound - 1) * totalSets, curRound * totalSets)
    : allExSets;

  return(<div style={s.page}>
    <div style={s.pageHead}><div><h1 style={s.pageTitle}>Training starten</h1><p style={s.pageSub}>Schritt {step} von 3</p></div></div>
    <div style={s.stepBar}>{[1,2,3].map(n=>(<div key={n} style={{display:"flex",alignItems:"center",flex:1}}><div style={{...s.stepDot,...(step>=n?s.stepOn:{})}}>{step>n?IC.check:n}</div>{n<3&&<div style={{flex:1,height:2,background:step>n?"#FF6B35":"#1E1E24",transition:"background 0.3s"}}/>}</div>))}</div>
    <div style={s.logCard}>

      {/* STEP 1 - Plan & Datum */}
      {step===1&&<div className="fadeIn">
        <h3 style={s.logTitle}>Plan & Datum</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
          <div style={s.fg}><label style={s.lbl}>Trainingsplan</label>
            <select style={s.inp} value={planId||""} onChange={e=>setPlanId(e.target.value)}>
              <option value="">Kein Plan</option>
              {data.plans.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        </div>

        {/* Repeat toggle & Config */}
        <div style={{background:"#0D0D0F",borderRadius:12,padding:"14px 18px",marginBottom:20,border:"1px solid #1E1E24"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:repeatRounds?14:0}}>
            <div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>Durchgang wiederholen</div>
              <div style={{fontSize:12,color:"#666"}}>Alle Übungen mehrfach durchlaufen</div>
            </div>
            <div style={{...s.toggle,...(repeatRounds?s.toggleOn:{})}} onClick={()=>setRepeatRounds(r=>!r)}>
              <div style={{...s.thumb,...(repeatRounds?s.thumbOn:{})}}/>
            </div>
          </div>
          {repeatRounds&&<div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:10,paddingTop:12,borderTop:"1px solid #1A1A1F"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <label style={{fontSize:12,fontWeight:700,color:"#aaa"}}>Anzahl Durchgänge:</label>
              <input type="number" min="1" max="10" style={{...s.inp,width:60,padding:"6px 10px",textAlign:"center"}} value={totalRounds} onChange={e=>setTotalRounds(Math.max(1, parseInt(e.target.value)||1))}/>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <label style={{fontSize:12,fontWeight:700,color:"#aaa"}}>Sätze pro Übung:</label>
              <input type="number" min="1" max="10" style={{...s.inp,width:60,padding:"6px 10px",textAlign:"center"}} value={totalSets} onChange={e=>setTotalSets(Math.max(1, parseInt(e.target.value)||1))}/>
            </div>
          </div>}
        </div>

        {plan&&<div style={{background:"#0D0D0F",borderRadius:12,padding:16,marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.5px"}}>Übungen im Plan:</div>
          {(exercises||[]).map((e,i)=>{
            return(<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<exercises.length-1?"1px solid #1A1A1F":"none"}}>
            {e.photo?<MediaDisplay src={e.photo} style={{width:36,height:36,borderRadius:8,objectFit:"contain",background:"#000",flexShrink:0}}/>:<div style={{width:36,height:36,borderRadius:8,background:"#1A1A1F",display:"flex",alignItems:"center",justifyContent:"center",color:"#555",flexShrink:0}}>{IC.dumbbell}</div>}


            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600}}>{e.name}</div>
              <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
                {e.trackReps!==false && <span style={{fontSize:10,color:"#FF6B35",fontWeight:700}}>{e.reps||0} Wdh.</span>}
                {e.trackWeight!==false && <span style={{fontSize:10,color:"#A78BFA",fontWeight:700}}>{e.weight||0} kg</span>}
                {e.trackKcal && <span style={{fontSize:10,color:"#FF6B6B",fontWeight:700}}>{e.kcal||0} kcal</span>}
                {e.trackKm && <span style={{fontSize:10,color:"#4CC9F0",fontWeight:700}}>{e.km||0} km</span>}
                {e.trackIncline && <span style={{fontSize:10,color:"#FFD166",fontWeight:700}}>{e.incline||0}% Steig.</span>}
                {e.trackTempo && <span style={{fontSize:10,color:"#EF476F",fontWeight:700}}>{e.tempo||0} T</span>}
              </div>
            </div>
          </div>);})}
        </div>}
        <button style={s.primaryBtn} onClick={()=>{
          if(!planId)return notify("Bitte Plan auswählen","error");
          
          const rounds = repeatRounds ? totalRounds : 1;
          const setsPerEx = repeatRounds ? totalSets : (plan.exercises[0]?.sets || 1);
          
          const newSets = {};
          exercises.forEach((ex, i) => {
            const allSets = [];
            const count = repeatRounds ? (totalRounds * totalSets) : (parseInt(ex.sets) || 1);
            for(let s=0; s<count; s++){
              allSets.push({
                 reps: ex.reps || "",
                 weight: ex.weight || "",
                 kcal: ex.kcal || "",
                 km: ex.km || "",
                 incline: ex.incline || "",
                 tempo: ex.tempo || "",
                 preset: true

              });
            }
            newSets[i] = allSets;
          });
          setSets(newSets);

          setStep(2);
          setRunning(true);
          setStartTime(new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}));
        }}>▶ Training starten</button>
      </div>}

      {/* STEP 2 - Training mit Timer */}
      {step===2&&<div className="fadeIn">
        {/* Timer */}
        <div style={{textAlign:"center",marginBottom:22,padding:"20px",background:"#0D0D0F",borderRadius:16,border:"1px solid #1E1E24",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            {repeatRounds&&<div style={{fontSize:12,color:"#888",marginBottom:4,fontWeight:700,textTransform:"uppercase"}}>Durchgang {curRound}</div>}
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:46,fontWeight:800,color:"#FF6B35",letterSpacing:2}}>{fmtTimer(timer)}</div>
          </div>
          <button style={{...s.primaryBtn,background:running?"#EF476F":"#06D6A0",padding:"14px 22px",fontSize:16}} onClick={()=>setRunning(r=>!r)}>
            {running?"⏸":"▶"}
          </button>
        </div>

        {/* Exercise progress dots */}
        <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:16}}>
          {exercises.map((_,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:i===curEx?"#FF6B35":i<curEx?"#06D6A0":"#2A2A30",transition:"all 0.3s"}}/>)}
        </div>

        {curExData&&<div>
          {/* Big exercise image */}
          <div style={{width:"100%",height:200,borderRadius:16,overflow:"hidden",marginBottom:16,background:"#0D0D0F",border:"1px solid #1E1E24",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            {curExData.photo
              ?<img src={curExData.photo} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
              :<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,color:"#2A2A30"}}>
                <svg width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1"><path d="M6.5 6.5h11M6.5 17.5h11"/><rect x="2" y="5" width="3" height="14" rx="1.5"/><rect x="19" y="5" width="3" height="14" rx="1.5"/><path d="M5 12h14"/></svg>
                <span style={{fontSize:13}}>Kein Bild hinterlegt</span>
              </div>
            }
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.85))",padding:"20px 16px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div style={{flex:1, marginRight:10}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff"}}>{curExData.name}</div>
                <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
                  {curExData.trackSets!==false&&<span style={{fontSize:11,color:"#00D9C0",fontWeight:700,background:"#00D9C015",padding:"2px 8px",borderRadius:6}}>{curExData.sets||0} Sätze</span>}
                  {curExData.trackReps!==false&&<span style={{fontSize:11,color:"#FF6B35",fontWeight:700,background:"#FF6B3515",padding:"2px 8px",borderRadius:6}}>{curExData.reps||0} Wdh</span>}
                  {curExData.trackWeight!==false&&<span style={{fontSize:11,color:"#A78BFA",fontWeight:700,background:"#A78BFA15",padding:"2px 8px",borderRadius:6}}>{curExData.weight||0} kg</span>}
                  {curExData.trackKcal===true&&<span style={{fontSize:11,color:"#FF6B6B",fontWeight:700,background:"#FF6B6B15",padding:"2px 8px",borderRadius:6}}>{curExData.kcal||0} kcal</span>}
                  {curExData.trackKm===true&&<span style={{fontSize:11,color:"#4CC9F0",fontWeight:700,background:"#4CC9F015",padding:"2px 8px",borderRadius:6}}>{curExData.km||0} km</span>}
                  {curExData.trackIncline===true&&<span style={{fontSize:11,color:"#FFD166",fontWeight:700,background:"#FFD16615",padding:"2px 8px",borderRadius:6}}>{curExData.incline||0}%</span>}
                  {curExData.trackTempo===true&&<span style={{fontSize:11,color:"#EF476F",fontWeight:700,background:"#EF476F15",padding:"2px 8px",borderRadius:6}}>{curExData.tempo||"T"}</span>}
                </div>
              </div>
              <button style={{background:"#FF6B35",border:"none",borderRadius:"50%",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",cursor:"pointer",boxShadow:"0 4px 12px rgba(255,107,53,0.4)",flexShrink:0}} onClick={()=>setShowInfo(true)}>
                <span style={{fontSize:20,fontWeight:800,fontFamily:"'Syne',sans-serif"}}>i</span>
              </button>
            </div>
          </div>


          {showInfo&&<div style={s.overlay2} onClick={()=>setShowInfo(false)}>
            <div style={{...s.modal,maxWidth:400}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                <h3 style={s.modalTitle}>{curExData.name}</h3>
                <button onClick={()=>setShowInfo(false)} style={s.iconBtnS}>{IC.x}</button>
              </div>
              <div style={{maxHeight:300,overflowY:"auto",paddingRight:5}}>
                <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Beschreibung / Anleitung</div>
                <div style={{fontSize:14,color:"#aaa",lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                  {/* Try to find description from library if available, else use what's in the plan */}
                  {library.find(l=>l.id===curExData.libId||l.name===curExData.name)?.description || "Keine Beschreibung verfügbar."}
                </div>
              </div>
              <button style={{...s.primaryBtn,width:"100%",marginTop:20}} onClick={()=>setShowInfo(false)}>Schließen</button>
            </div>
          </div>}

          <div style={s.exBlock}>
            <div style={{...s.setsH, gridTemplateColumns: `34px ${[curExData.trackReps!==false,curExData.trackWeight!==false,curExData.trackKcal===true,curExData.trackKm===true,curExData.trackIncline===true,curExData.trackTempo===true].filter(Boolean).map(()=>"1fr").join(" ")} 80px`}}>
              <span>Satz</span>
              {curExData.trackReps!==false&&<span>Wdh</span>}
              {curExData.trackWeight!==false&&<span>kg</span>}
              {curExData.trackKcal===true&&<span>kcal</span>}
              {curExData.trackKm===true&&<span>km</span>}
              {curExData.trackIncline===true&&<span>%</span>}
              {curExData.trackTempo===true&&<span>T</span>}
              <span style={{textAlign:"right"}}></span>
            </div>

            {curSets.map((set, siRel) => {
              const siGlobal = repeatRounds ? (curRound - 1) * totalSets + siRel : siRel;
              const rowStyle = set.done ? {opacity: 0.4, transition: "all 0.3s"} : {transition: "all 0.3s"};
              const inpStyle = set.done ? {textDecoration: "line-through"} : {};
              
              return(
                <div key={siGlobal} style={{...s.setRow, ...rowStyle, gap: 8, alignItems: "center"}}>
                  <span style={{...s.setN, background: set.done ? "#06D6A0" : "#1A1A1F", color: set.done ? "#000" : "#888"}}>{siGlobal + 1}</span>
                  {curExData.trackReps!==false&&<input style={{...s.setInp, ...inpStyle, color:set.preset?"#FF6B35":"#F0EDE8", borderColor:set.preset?"#FF6B3566":"#2A2A30", fontWeight:set.preset?700:400}} type="number" value={set.reps} onChange={e=>updSet(curEx, siGlobal, "reps", e.target.value)} placeholder={curExData.reps||"0"} disabled={set.done}/>}
                  {curExData.trackWeight!==false&&<input style={{...s.setInp, ...inpStyle, color:set.preset?"#A78BFA":"#F0EDE8", borderColor:set.preset?"#A78BFA66":"#2A2A30", fontWeight:set.preset?700:400}} type="number" value={set.weight} onChange={e=>updSet(curEx, siGlobal, "weight", e.target.value)} placeholder={curExData.weight||"0"} disabled={set.done}/>}
                  {curExData.trackKcal===true&&<input style={{...s.setInp, ...inpStyle, color:"#FF6B6B"}} type="number" value={set.kcal||""} onChange={e=>updSet(curEx, siGlobal, "kcal", e.target.value)} placeholder={curExData.kcal||"kcal"} disabled={set.done}/>}
                  {curExData.trackKm===true&&<input style={{...s.setInp, ...inpStyle, color:"#4CC9F0"}} type="number" value={set.km||""} onChange={e=>updSet(curEx, siGlobal, "km", e.target.value)} placeholder={curExData.km||"km"} disabled={set.done}/>}
                  {curExData.trackIncline===true&&<input style={{...s.setInp, ...inpStyle, color:"#FFD166"}} type="text" value={set.incline||""} onChange={e=>updSet(curEx, siGlobal, "incline", e.target.value)} placeholder={curExData.incline||"%"} disabled={set.done}/>}
                  {curExData.trackTempo===true&&<input style={{...s.setInp, ...inpStyle, color:"#EF476F"}} type="text" value={set.tempo||""} onChange={e=>updSet(curEx, siGlobal, "tempo", e.target.value)} placeholder={curExData.tempo||"T"} disabled={set.done}/>}

                  
                  <div style={{display: "flex", gap: 4, marginLeft: "auto"}}>
                    <button style={{background: set.done ? "#06D6A0" : "transparent", border: `1px solid ${set.done ? "#06D6A0" : "#2A2A30"}`, color: set.done ? "#000" : "#06D6A0", borderRadius: 6, width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 14}} onClick={()=>toggleSetDone(curEx, siGlobal)}>
                      {IC.check}
                    </button>
                    {!set.done && !set.preset && <button style={{background:"transparent",border:"none",color:"#EF476F88",fontSize:22,cursor:"pointer",padding:"0 4px",display:"flex",alignItems:"center"}} onClick={()=>delSet(curEx, siGlobal)}>×</button>}
                  </div>
                </div>
              );
            })}
            {curExData.trackSets!==false && <button style={s.addSetBtn} onClick={()=>addSet(curEx)}>+ Satz</button>}
          </div>

          <div style={{display:"flex",gap:12,marginTop:14}}>
            {curEx>0&&<button style={s.secBtn} onClick={()=>setCurEx(i=>i-1)}>←</button>}
            <button style={{...s.primaryBtn,flex:1,background:(curEx===exercises.length-1 && (!repeatRounds || curRound === totalRounds))?"#06D6A0":"#FF6B35"}} onClick={goNext}>
              {curEx<exercises.length-1 ? "Nächste Übung →" : (repeatRounds && curRound < totalRounds) ? `Durchgang ${curRound+1} starten 🔄` : "✓ Fertig"}
            </button>
          </div>
          <button style={{width:"100%",marginTop:10,background:"transparent",border:"2px solid #EF476F",borderRadius:10,padding:"12px",color:"#EF476F",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={()=>{setStep(3);setRunning(false);setEndTime(new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}));}}>
            ⏹ Training beenden
          </button>
        </div>}
      </div>}

      {/* STEP 3 - Zusammenfassung */}
      {step===3&&<div className="fadeIn">
        <div style={{background:"#0D0D0F",borderRadius:14,padding:20,marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(80px, 1fr))",gap:16,marginBottom:16,paddingBottom:16,borderBottom:"1px solid #1E1E24"}}>
            <div style={{textAlign:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#FF6B35"}}>{fmtTimer(timer)}</div><div style={{fontSize:11,color:"#888"}}>Dauer</div></div>
            <div style={{textAlign:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#00D9C0"}}>{exercises.length}</div><div style={{fontSize:11,color:"#888"}}>Übungen</div></div>
            {(() => {
               let totalKcal = 0, totalKm = 0;
               exercises.forEach((_,ei) => {
                 (sets[ei]||[]).filter(s=>s.done).forEach(s=>{
                   totalKcal += parseFloat(s.kcal)||0;
                   totalKm += parseFloat(s.km)||0;
                 });
               });
               return <>
                 {totalKcal > 0 && <div style={{textAlign:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#FF6B6B"}}>{totalKcal}</div><div style={{fontSize:11,color:"#888"}}>kcal</div></div>}
                 {totalKm > 0 && <div style={{textAlign:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#4CC9F0"}}>{totalKm.toFixed(1)}</div><div style={{fontSize:11,color:"#888"}}>km</div></div>}
               </>;
            })()}
          </div>

          <div style={{maxHeight:400,overflowY:"auto"}}>
            {exercises.map((ex,i)=>{
              const sArr=sets[i]||[];
              const validSets=sArr.filter(s=>s.done && (parseInt(s.reps)>0 || parseFloat(s.kcal)>0 || parseFloat(s.km)>0));
              const exVol=validSets.reduce((a,s) => a + (parseInt(s.reps)||0)*(parseFloat(s.weight)||0),0);
              const eKcal = validSets.reduce((a,s)=>a+(parseFloat(s.kcal)||0),0);
              const eKm = validSets.reduce((a,s)=>a+(parseFloat(s.km)||0),0);
              if(validSets.length===0) return null;
              
              return(<div key={i} style={{padding:"20px 0",borderBottom:i<exercises.length-1?"1px solid #1A1A1F":"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div style={{fontWeight:800,fontSize:17,color:"#F0EDE8"}}>{ex.name}</div>
                  <div style={{display:"flex",gap:8}}>
                    {exVol > 0 && <div style={{fontSize:11,fontWeight:800,color:"#A78BFA",background:"#A78BFA15",padding:"4px 10px",borderRadius:8}}>{exVol}kg</div>}
                    {eKcal > 0 && <div style={{fontSize:11,fontWeight:800,color:"#FF6B6B",background:"#FF6B6B15",padding:"4px 10px",borderRadius:8}}>{eKcal}kcal</div>}
                    {eKm > 0 && <div style={{fontSize:11,fontWeight:800,color:"#4CC9F0",background:"#4CC9F015",padding:"4px 10px",borderRadius:8}}>{eKm.toFixed(1)}km</div>}
                  </div>

                </div>


                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {repeatRounds ? (
                    Array.from({length: totalRounds}).map((_, rIdx) => {
                      const rSets = sArr.slice(rIdx * totalSets, (rIdx + 1) * totalSets).filter(s => s.done && (parseInt(s.reps) > 0 || parseFloat(s.kcal) > 0 || parseFloat(s.km) > 0));
                      if (rSets.length === 0) return null;
                      return (
                        <div key={rIdx} style={{display:"flex",alignItems:"center",gap:12,background:"#0D0D0F",padding:"8px 12px",borderRadius:10,border:"1px solid #1A1A1F",marginBottom:4}}>
                          <div style={{fontSize:10,fontWeight:800,color:"#666",textTransform:"uppercase",width:80}}>Durchg. {rIdx + 1}</div>
                          <div style={{flex:1,display:"flex",gap:10,flexWrap:"wrap"}}>
                            {rSets.map((s, si) => (
                              <div key={si} style={{display:"flex",gap:4,fontSize:13,alignItems:"baseline"}}>
                                {ex.trackReps!==false&&<><span style={{color:"#FF6B35",fontWeight:700}}>{s.reps}</span><span style={{color:"#444",fontSize:9}}>Wdh</span></>}
                                {ex.trackWeight!==false&&<span style={{color:"#A78BFA",fontWeight:700,marginLeft:2}}>{s.weight}kg</span>}
                                {ex.trackKcal===true&&<span style={{color:"#FF6B6B",fontWeight:700,marginLeft:2}}>{s.kcal}kcal</span>}
                                {ex.trackKm===true&&<span style={{color:"#4CC9F0",fontWeight:700,marginLeft:2}}>{s.km}km</span>}
                                {ex.trackIncline===true&&<span style={{color:"#FFD166",fontWeight:700,marginLeft:2}}>{s.incline}%</span>}
                                {ex.trackTempo===true&&<span style={{color:"#EF476F",fontWeight:700,marginLeft:2}}>{s.tempo}</span>}

                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })
                  ) : (
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {validSets.map((s, si) => (
                        <div key={si} style={{background:"#1A1A1F",padding:"8px 12px",borderRadius:10,display:"flex",gap:8,fontSize:13,border:"1px solid #2A2A30",alignItems:"baseline"}}>
                          {ex.trackSets!==false&&<span style={{color:"#666",fontSize:10,fontWeight:800}}>{si + 1}</span>}
                          {ex.trackReps!==false&&<div style={{display:"flex",gap:3}}><span style={{color:"#FF6B35",fontWeight:700}}>{s.reps}</span><span style={{color:"#444",fontSize:9}}>Wdh</span></div>}
                          {ex.trackWeight!==false&&<span style={{color:"#A78BFA",fontWeight:700}}>{s.weight}kg</span>}
                          {ex.trackKcal===true&&<span style={{color:"#FF6B6B",fontWeight:700}}>{s.kcal}kcal</span>}
                          {ex.trackKm===true&&<span style={{color:"#4CC9F0",fontWeight:700}}>{s.km}km</span>}
                          {ex.trackIncline===true&&<span style={{color:"#FFD166",fontWeight:700}}>{s.incline}%</span>}
                          {ex.trackTempo===true&&<span style={{color:"#EF476F",fontWeight:700}}>{s.tempo}</span>}

                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>);
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:12}}>
          <button style={s.secBtn} onClick={()=>{setStep(2);setRunning(true);}}>← Zurück</button>
          <button style={{...s.primaryBtn,flex:1}} onClick={save}>💾 Training speichern</button>
        </div>
      </div>}
    </div>
  </div>);}

function History({data,setData,selWO,setSelWO,notify,library}){
  const sorted=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const del=id=>{setData(d=>({...d,workouts:d.workouts.filter(w=>w.id!==id)}));setSelWO(null);notify("Training gelöscht");};
  
  if(selWO){
    const w=data.workouts.find(x=>x.id===selWO);
    if(!w){setSelWO(null);return null;}
    const plan=data.plans.find(p=>p.id===w.planId);
    const vol=w.exercises.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(s.done!==false?(s.weight||0)*(s.reps||0):0),0),0);

    
    return(
      <div style={selWO?{...s.page,paddingTop:20}:{...s.page}} className="fadeIn">
        <button style={s.backBtn} onClick={()=>setSelWO(null)}>← Zurück</button>
        <div style={s.wDetail}>
          {w.photo&&<img src={w.photo} alt="w" style={{width:"100%",height:210,objectFit:"cover",borderRadius:13,marginBottom:22}}/>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,margin:0}}>{w.name}</h1>
            <div style={{fontSize:12,fontWeight:800,color:"#A78BFA",background:"#A78BFA15",padding:"4px 10px",borderRadius:8}}>{vol}kg Gesamt</div>
          </div>
          <div style={{color:"#888",fontSize:13,display:"flex",gap:10,alignItems:"center",marginBottom:22}}>
            <span>📅 {new Date(w.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}</span>
            {plan&&<span style={{borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,background:plan.color+"20",color:plan.color}}>{plan.name}</span>}
          </div>
          
          <div style={{display:"flex",background:"#0D0D0F",borderRadius:16,overflow:"hidden",marginBottom:26,border:"1px solid #1E1E24"}}>
            {[
              [`${w.duration} min`, "Dauer", "#FF6B35"],
              [w.exercises.length, "Übungen", "#00D9C0"],
              [`${w.startTime||"--:--"} - ${w.endTime||"--:--"}`, "Zeitraum", "#F0EDE8"]
            ].map(([v,l,c],i)=>(
              <div key={i} style={{flex:1,padding:18,textAlign:"center",borderRight:i<2?"1px solid #1E1E24":"none"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:11,color:"#666",marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>
          
          {w.note&&<div style={{color:"#aaa",fontStyle:"italic",fontSize:14,marginBottom:22,padding:16,background:"#0D0D0F",borderRadius:14,border:"1px solid #1E1E24"}}>„{w.note}"</div>}
          
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {w.exercises.map((ex,i)=>{
              const eVol = ex.sets.reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0);
              const eKcal = ex.sets.reduce((a,s)=>a+(parseFloat(s.kcal)||0),0);
              const eKm = ex.sets.reduce((a,s)=>a+(parseFloat(s.km)||0),0);
              
              const libEx = library?.find(l => l.name === ex.name);
              const tr = libEx ? libEx.trackReps !== false : ex.sets.some(s => parseInt(s.reps) > 0);
              const tw = libEx ? libEx.trackWeight !== false : ex.sets.some(s => parseFloat(s.weight) > 0);
              const tk = libEx ? libEx.trackKcal : ex.sets.some(s => parseFloat(s.kcal) > 0);
              const tm = libEx ? libEx.trackKm : ex.sets.some(s => parseFloat(s.km) > 0);
              const ti = libEx ? libEx.trackIncline : ex.sets.some(s => s.incline);
              const tt = libEx ? libEx.trackTempo : ex.sets.some(s => s.tempo);

              let gtc = "40px";
              if(tr) gtc += " 1fr";
              if(tw) gtc += " 1fr";
              if(tk) gtc += " 1fr";
              if(tm) gtc += " 1fr";
              if(ti) gtc += " 1fr";
              if(tt) gtc += " 1fr";

              return(
                <div key={i} style={{...s.exBlock,background:"#0D0D0F",border:"1px solid #1E1E24",padding:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontWeight:800,fontSize:16}}>{ex.name}</div>
                    <div style={{display:"flex",gap:6}}>
                      {eVol > 0 && <div style={{fontSize:10,fontWeight:700,color:"#666",background:"#1A1A1F",padding:"3px 8px",borderRadius:6}}>{eVol}kg</div>}
                      {eKcal > 0 && <div style={{fontSize:10,fontWeight:700,color:"#FF6B6B",background:"#FF6B6B15",padding:"3px 8px",borderRadius:6}}>{eKcal} kcal</div>}
                      {eKm > 0 && <div style={{fontSize:10,fontWeight:700,color:"#4CC9F0",background:"#4CC9F015",padding:"3px 8px",borderRadius:6}}>{eKm.toFixed(1)} km</div>}
                    </div>
                  </div>
                  <div style={{...s.setsH,color:"#555",gridTemplateColumns:gtc,marginBottom:8}}>
                    <span>Satz</span>
                    {tr && <span style={{textAlign:"center"}}>Wdh</span>}
                    {tw && <span style={{textAlign:"center"}}>kg</span>}
                    {tk && <span style={{textAlign:"center"}}>kcal</span>}
                    {tm && <span style={{textAlign:"center"}}>km</span>}
                    {ti && <span style={{textAlign:"center"}}>%</span>}
                    {tt && <span style={{textAlign:"center"}}>T</span>}
                  </div>
                  {ex.sets.map((set,si)=>(
                    <div key={si} style={{...s.setRow,gridTemplateColumns:gtc,marginBottom:6}}>
                      <span style={{...s.setN,width:26,height:26}}>{si+1}</span>
                      {tr && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FF6B35",fontWeight:700}}>{set.reps || 0}</span>}
                      {tw && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#A78BFA",fontWeight:700}}>{set.weight || 0}</span>}
                      {tk && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FF6B6B",fontWeight:700}}>{set.kcal || 0}</span>}
                      {tm && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#4CC9F0",fontWeight:700}}>{set.km || 0}</span>}
                      {ti && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FFD166",fontWeight:700}}>{set.incline || "-"}</span>}
                      {tt && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#EF476F",fontWeight:700}}>{set.tempo || "-"}</span>}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
          
          <button style={{background:"transparent",border:"1px solid #2A2A30",color:"#EF476F88",borderRadius:12,padding:"12px 22px",cursor:"pointer",display:"flex",gap:8,alignItems:"center",marginTop:30,width:"100%",justifyContent:"center",fontSize:14,fontWeight:600}} onClick={()=>del(w.id)}>
            {IC.trash} Training aus Verlauf löschen
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={s.page}>
      <div style={s.pageHead}>
        <div><h1 style={s.pageTitle}>Verlauf</h1><p style={s.pageSub}>{data.workouts.length} abgeschlossene Trainings</p></div>
      </div>

function RecipesPage({notify}){
  const [recipes,setRecipes]=useState(()=>{try{const r=localStorage.getItem("ff_recipes");return r?JSON.parse(r):DEFAULT_RECIPES;}catch{return DEFAULT_RECIPES;}});
  const [selRecipe,setSelRecipe]=useState(null);
  const [shoppingList,setShoppingList]=useState([]);
  const [showShopping,setShowShopping]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState("Alle");
  const [apiRecipes,setApiRecipes]=useState([]);
  const [apiLoading,setApiLoading]=useState(false);
  const [searchMode,setSearchMode]=useState("local");

  const searchOpenFoodRecipes=async(query)=>{
    if(!query||query.length<3)return;
    setApiLoading(true);
    try{
      const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments,quantity,brands,ingredients_text`);
      const data=await res.json();
      const results=(data.products||[]).filter(p=>p.product_name&&p.nutriments).map(p=>({
        id:"api_"+Date.now()+Math.random(),
        name:p.product_name+(p.brands?" ("+p.brands+")":""),
        kcal:Math.round(p.nutriments["energy-kcal_100g"]||0),
        protein:Math.round((p.nutriments.proteins_100g||0)*10)/10,
        carbs:Math.round((p.nutriments.carbohydrates_100g||0)*10)/10,
        fat:Math.round((p.nutriments.fat_100g||0)*10)/10,
        time:15,category:"Sonstige",
        ingredients:p.ingredients_text?[{name:p.ingredients_text.substring(0,200),amount:p.quantity||"100g"}]:[{name:"Siehe Verpackung",amount:p.quantity||"100g"}],
        steps:["Produkt nach Anleitung zubereiten."],
        tags:["Open Food Facts"]
      })).filter(p=>p.kcal>0);
      setApiRecipes(results);
    }catch(e){console.error(e);}
    setApiLoading(false);
  };

  useEffect(()=>{
    if(searchMode==="api"&&search.length>=3){
      const t=setTimeout(()=>searchOpenFoodRecipes(search),600);
      return()=>clearTimeout(t);
    }
  },[search,searchMode]);
  const [checkedItems,setCheckedItems]=useState({});
  const [newRecipe,setNewRecipe]=useState({name:"",kcal:"",protein:"",carbs:"",fat:"",time:"",category:"Frühstück",ingredients:[{name:"",amount:""}],steps:[""],tags:""});

  useEffect(()=>localStorage.setItem("ff_recipes",JSON.stringify(recipes)),[recipes]);

  const cats=["Alle","Frühstück","Mittagessen","Abendessen","Snack"];
  const filtered=searchMode==="api"?apiRecipes:recipes.filter(r=>(filterCat==="Alle"||r.category===filterCat)&&(r.name.toLowerCase().includes(search.toLowerCase())||r.tags?.some(t=>t.toLowerCase().includes(search.toLowerCase()))));

  const addToShopping=(recipe,portions=1)=>{
    const items=recipe.ingredients.map(ing=>({id:Date.now()+Math.random(),name:ing.name,amount:ing.amount,recipe:recipe.name,checked:false,portions}));
    setShoppingList(l=>{
      const existing=[...l];
      items.forEach(item=>{
        const found=existing.findIndex(e=>e.name.toLowerCase()===item.name.toLowerCase());
        if(found>=0){existing[found]={...existing[found],amount:`${existing[found].amount} + ${item.amount}`};}
        else{existing.push(item);}
      });
      return existing;
    });
