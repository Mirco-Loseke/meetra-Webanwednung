          <div style={{display:"flex", gap: 8, background:"#111114", padding: 4, borderRadius: 10, border: "1px solid #1E1E24", width: isMobile ? "100%" : "auto", justifyContent: isMobile ? "center" : "flex-end"}}>
            <button style={{...s.secBtn,border:"none",padding:"6px 14px",fontSize:11,flex: isMobile ? 1 : "initial",background:activeTab==="track"?"#FF6B35":"transparent",color:activeTab==="track"?"#fff":"#888"}} onClick={()=>setActiveTab("track")}>Tracking</button>
            <button style={{...s.secBtn,border:"none",padding:"6px 14px",fontSize:11,flex: isMobile ? 1 : "initial",background:activeTab==="wissen"?"#FF6B35":"transparent",color:activeTab==="wissen"?"#fff":"#888"}} onClick={()=>setActiveTab("wissen")}>Wissen</button>
          </div>
          {activeTab==="track" && (
            <div style={{display:"flex", gap: 8, width: isMobile ? "100%" : "auto"}}>

                <button style={{background:searchMode==="fav"?"#FF6B35":"#1A1A1F",border:`1px solid ${searchMode==="fav"?"#FF6B35":"#2A2A30"}`,borderRadius:8,padding:"6px 12px",color:searchMode==="fav"?"#fff":"#888",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif", flexShrink: 0}} onClick={()=>setSearchMode("fav")}>⭐ Favoriten</button>
                <button style={{background:searchMode==="api"?"#FF6B35":"#1A1A1F",border:`1px solid ${searchMode==="api"?"#FF6B35":"#2A2A30"}`,borderRadius:8,padding:"6px 12px",color:searchMode==="api"?"#fff":"#888",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif", flexShrink: 0}} onClick={()=>{setSearchMode("api");setApiResults([]);}}>🌍 OFF</button>

                <div>

                  <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
                    {DEFAULT_RECIPES.filter(r => (localStorage.getItem(`ff_fav_recipe_${r.id}`) === "true") && r.name.toLowerCase().includes(search.toLowerCase())).map(recipe => (
                      <div key={recipe.id} style={{...s.card, padding: 12, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                        <div style={{flex:1, minWidth:0}}>
                          <div style={{fontWeight:700,fontSize:13,marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{recipe.name}</div>
                          <div style={{fontSize:11,color:"#FF6B35",fontWeight:700}}>{recipe.kcal} kcal</div>

                        <button style={{...s.primaryBtn,padding:"6px 10px",fontSize:12}} onClick={()=>quickAdd({name:recipe.name, calories:recipe.kcal, protein:recipe.protein||0, carbs:recipe.carbs||0, fat:recipe.fat||0})}>{IC.plus}</button>
                      </div>
                    ))}
                    {DEFAULT_RECIPES.filter(r => localStorage.getItem(`ff_fav_recipe_${r.id}`) === "true").length === 0 && <div style={{color:"#444",fontSize:12,fontStyle:"italic"}}>Keine gefunden.</div>}
                  </div>
                </div>
              </div>
            )}
            
            {searchMode==="api"&&apiLoading&&<div style={{textAlign:"center",padding:"24px",color:"#666",fontSize:13}}>🔍 Suche aktiv...</div>}
            {searchMode==="api"&&!apiLoading&&apiResults.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>{apiResults.map((food,i)=>(
              <div key={i} style={{...s.card, padding: 12, display:"flex", justifyContent:"space-between", alignItems:"center", gap: 12}}>
                <div style={{width:44,height:44,borderRadius:8,background:"#1A1A1F",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {food.imageUrl ? <img src={food.imageUrl} style={{width:"100%",height:"100%",objectFit:"contain"}} alt="food"/> : <span style={{fontSize:20}}>🥗</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:12,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{food.name}</div>
                  <div style={{display:"flex",gap:8,fontSize:10,flexWrap:"wrap"}}>
                    <span style={{color:"#FF6B35",fontWeight:700}}>{food.calories} kcal</span>
                    <span style={{color:"#00D9C0"}}>{food.protein}g P</span>
                    {food.quantity && <span style={{color:"#555"}}>({food.quantity})</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button style={{background:"transparent",border:"none",color:isFav(food)?"#FFD166":"#2A2A30",cursor:"pointer",padding:4}} onClick={()=>toggleFav(food)}>{IC.star}</button>
                  <button style={{...s.primaryBtn,padding:"6px 10px",fontSize:12}} onClick={()=>quickAdd(food)}>{IC.plus}</button>
                </div>
              </div>
            ))}</div>}
            
            {searchMode==="quick"&&<div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill,minmax(240px,1fr))",gap:8}}>{filtered.map((food,i)=>(
              <div key={i} style={{...s.card, padding: 12, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <div style={{flex:1, minWidth:0, marginRight:10}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{food.name}</div>
                  <div style={{fontSize:11,color:"#666"}}>{food.calories} kcal · {food.protein}g P</div>
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button style={{background:"transparent",border:"none",color:isFav(food)?"#FFD166":"#2A2A30",cursor:"pointer"}} onClick={()=>toggleFav(food)}>{IC.star}</button>
                  <button style={{...s.primaryBtn,padding:"6px 10px",fontSize:11}} onClick={()=>quickAdd(food)}>{IC.plus}</button>
                </div>
              </div>
            ))}</div>}
          </div>
        </>
      ) : (
        <div className="fadeIn">
          <div style={{...s.card, marginBottom:20, padding: isMobile ? 16 : 22}}>
            <h3 style={s.cardTitle}>Nährstoff-Wissen</h3>
            <p style={{fontSize:13, color:"#666", marginBottom:16}}>Wichtige Informationen für deinen Fortschritt</p>
            <input 
              style={{...s.inp, fontSize: 13}} 
              placeholder="Thema suchen..." 
              value={knowledgeSearch}
              onChange={e => setKnowledgeSearch(e.target.value)}
            />
          </div>
          
          <div style={{display:"grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill, minmax(280px, 1fr))", gap:14}}>
            {filteredKnowledge.map(k => (
              <div key={k.id} style={{...s.card, padding:16, display:"flex", gap:14, border:"1px solid #1E1E24"}} className="hoverCard">
                <div style={{fontSize:28, background:"#1A1A1F", width:56, height:56, borderRadius:14, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
                  {k.icon}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:16, fontWeight:800, marginBottom:8}}>{k.title}</div>
                  <div style={{fontSize:12, color:"#aaa", lineHeight:1.5}}>{k.text}</div>
                </div>
              </div>
            ))}
            {filteredKnowledge.length === 0 && <div style={{gridColumn:"1/-1", textAlign:"center", padding:40, color:"#444"}}>Keine Einträge für "{knowledgeSearch}" gefunden.</div>}
          </div>
        </div>
      )}
    </div>
  );
}
function Plans({data,setData,onNew,onEdit,notify}){

    <div style={s.plansGrid}>{data.plans.map(plan=>{
      const exs=plan.exercises.map(e=>typeof e==="string"?{name:e,photo:null}:e);
      return(<div key={plan.id} style={{...s.planCard,borderTopColor:plan.color}} className="planCard">
      <div style={{width:42,height:42,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14,background:plan.color+"20",color:plan.color}}>{IC.dumbbell}</div>
      <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,margin:"0 0 14px",letterSpacing:"-0.5px"}}>{plan.name}</h3>
      
      <div style={{marginBottom:14}}>
        <div style={{fontSize:9,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}}>Muskelgruppen</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
          {(plan.muscles||[]).map(m=><span key={m} style={{fontSize:9,background:MUSCLE_COLORS[m]+"15",color:MUSCLE_COLORS[m],borderRadius:7,padding:"2px 8px",fontWeight:800}}>{m}</span>)}
        </div>
        <div style={{fontSize:9,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}}>Trainingsart</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {(plan.types||[]).map(t=><span key={t} style={{fontSize:9,background:TYPE_COLORS[t]+"15",color:TYPE_COLORS[t],borderRadius:7,padding:"2px 8px",fontWeight:800}}>{t}</span>)}
        </div>
      </div>

      <div style={{display:"flex",gap:5,marginBottom:14}}>{WEEKDAYS.map((d,i)=><span key={d} style={{...s.dayChip,...(plan.days.includes(FULL_WEEKDAYS[i])?{background:plan.color,color:"#fff"}:{})}}>{d}</span>)}</div>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>{exs.slice(0,4).map((ex,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:7}}>{ex.photo?<img src={ex.photo} alt={ex.name} style={{width:36,height:36,borderRadius:7,objectFit:"contain",flexShrink:0,background:"#1A1A1F"}}/>:<div style={{width:36,height:36,borderRadius:7,background:"#1A1A1F",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#444"}}>{IC.image}</div>}<span style={{fontSize:11,color:"#aaa"}}>{ex.name}</span></div>))}{exs.length>4&&<span style={{fontSize:11,color:"#555",paddingLeft:31}}>+{exs.length-4} weitere</span>}</div>
      <div style={{fontSize:11,color:"#555",fontWeight:700}}>{data.workouts.filter(w=>w.planId===plan.id).length} Trainings absolviert</div>
      <div style={{position:"absolute",top:13,right:13,display:"flex",gap:5}}><button className="cardIconBtn" style={s.cardIconBtn} onClick={()=>onEdit({...plan,exercises:exs})}>{IC.edit}</button><button className="cardIconBtn" style={{...s.cardIconBtn,color:"#EF476F88"}} onClick={()=>del(plan.id)}>{IC.trash}</button></div>
    </div>);})}
    <div style={s.newPlanCard} onClick={onNew} className="planCard"><div style={{color:"#444",display:"flex"}}>{IC.plus}</div><span style={{color:"#666",fontSize:13}}>Neuen Plan erstellen</span></div></div>
  </div>);}

function LogWorkout({data,setData,notify,prs,onSavePR,library,activeWorkout,setActiveWorkout,isMobile}){
  const [step,setStep]=useState(activeWorkout?.step || 1);
  const [planId,setPlanId]=useState(activeWorkout?.planId || data.plans[0]?.id || null);
  const [date,setDate]=useState(activeWorkout?.date || todayStr());
  const [exercises,setExercises]=useState(activeWorkout?.exercises || []);
  const [curEx,setCurEx]=useState(activeWorkout?.curEx || 0);
  const [curRound,setCurRound]=useState(activeWorkout?.curRound || 1);
  const [totalRounds,setTotalRounds]=useState(activeWorkout?.totalRounds || "");
  const [totalSets,setTotalSets]=useState(activeWorkout?.totalSets || "");
  const [repeatRounds,setRepeatRounds]=useState(activeWorkout?.repeatRounds || false);
  const [timer,setTimer]=useState(activeWorkout?.timer || 0);
  const [running,setRunning]=useState(activeWorkout?.running || false);
  const [sets,setSets]=useState(activeWorkout?.sets || {});
  const [showInfo,setShowInfo]=useState(false);
  const [showEndModal, setShowEndModal] = useState(false);
  const [startTime,setStartTime]=useState(activeWorkout?.startTime || null);
  const [endTime,setEndTime]=useState(activeWorkout?.endTime || null);
  const [hiitConfig, setHiitConfig] = useState(null);
  const [exTimer, setExTimer] = useState(0);
  const [exTimerActive, setExTimerActive] = useState(false);
  const [lastCurEx, setLastCurEx] = useState(curEx);
  const [hiitMode, setHiitMode] = useState(activeWorkout?.hiitMode || false);
  const [hiitDurations, setHiitDurations] = useState(activeWorkout?.hiitDurations || {});
  const [showHiitConfig, setShowHiitConfig] = useState(false);
  const [selectedHiitVal, setSelectedHiitVal] = useState(null);
  const [hiitStatus, setHiitStatus] = useState(activeWorkout?.hiitStatus || {}); // Tracks actual seconds done per ex

  
  useEffect(() => {
    if (step > 1) {
      setActiveWorkout({ step, planId, date, exercises, curEx, curRound, totalRounds, totalSets, repeatRounds, timer, running, sets, startTime, endTime, exTimer, exTimerActive, hiitMode, hiitDurations });
    } else if (activeWorkout) { setActiveWorkout(null); }
  }, [step, planId, date, exercises, curEx, curRound, totalRounds, totalSets, repeatRounds, timer, running, sets, startTime, endTime, exTimer, exTimerActive, hiitMode, hiitDurations]);

  useEffect(() => { if (activeWorkout && activeWorkout.timer !== timer) setTimer(activeWorkout.timer); }, [activeWorkout?.timer]);

  // Audible alerts and timers
  useEffect(() => {
    if (!running) return;
    const t = setInterval(() => {
      setTimer(v => v + 1);
      if (exTimerActive && exTimer > 0) {
        setExTimer(v => {
          const next = v - 1;
          // Track actual seconds done
          setHiitStatus(s => ({...s, [curEx]: (s[curEx]||0) + 1}));
          
          if (next <= 0) {
            setExTimerActive(false);
            if (hiitMode) {
              playBeep(880, 0.6, 0.4);
              goNext();
            } else {
              playBeep(880, 0.4, 0.2);
            }
            return 0;
          }
          if (hiitMode && next <= 3) {
             playBeep(440, 0.1, 0.15);
          }
          return next;
        });
      }
    }, 1000);
    return () => clearInterval(t);
  }, [running, exTimerActive, exTimer, hiitMode, curEx]);

  useEffect(() => {
    if (step === 2 && curEx !== lastCurEx) {
      setLastCurEx(curEx);
      playBeep(660, 0.3, 0.1); // Mid beep for new exercise
      if (hiitMode && hiitDurations[curEx]) {
        setExTimer(hiitDurations[curEx]);
        setExTimerActive(true);
      } else if (exercises[curEx]?.hiitTimer?.enabled) {
        setExTimer(exercises[curEx].hiitTimer.duration || 30);
        setExTimerActive(false);
      }
    }
    if (step === 3) {
      playBeep(880, 1.2, 0.2); // Success sound
    }
  }, [curEx, step, exercises, hiitMode, hiitDurations]);

  useEffect(()=>{
    const plan=data.plans.find(p=>p.id===parseInt(planId));
    if(plan){
      const exs=(plan.exercises||[]).map(e=>{
        const exObj = typeof e==="string"?{name:e}:e;
        const libMatch = library.find(l => l.id === exObj.libId || l.name === exObj.name);
        if (libMatch) {
          return { ...exObj, photo: libMatch.thumbnail, description: libMatch.description, hiitTimer: libMatch.hiitTimer, 
            trackSets: exObj.trackSets ?? libMatch.trackSets ?? true, trackReps: exObj.trackReps ?? libMatch.trackReps ?? true,
            trackWeight: exObj.trackWeight ?? libMatch.trackWeight ?? true, trackKcal: libMatch.trackKcal, trackKm: libMatch.trackKm,
            trackIncline: libMatch.trackIncline, trackTempo: libMatch.trackTempo,
            sets: libMatch.sets || exObj.sets || 1, reps: libMatch.reps || exObj.reps || "", weight: libMatch.weight || exObj.weight || "" };
        }
        return exObj;
      });
      setExercises(exs);
      const initSets={};
      exs.forEach((ex,i)=>{
        const count = parseInt(ex.sets) || 1;
        initSets[i] = Array.from({length:count}, ()=>({reps:ex.reps||"", weight:ex.weight||"", preset:true}));
      });
      setSets(initSets);
    }
  },[planId, library]);

  const fmtTimer=t=>{const m=Math.floor(t/60),s=t%60;return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;};
  const updSet=(ei,si,k,v)=>setSets(s=>{const n=JSON.parse(JSON.stringify(s));if(n[ei]&&n[ei][si]){n[ei][si][k]=v;n[ei][si].preset=false;}return n;});
  const goNext=()=>{
    if(curEx<exercises.length-1) setCurEx(i=>i+1);
    else if(repeatRounds && curRound < (parseInt(totalRounds) || 1)){ setCurEx(0); setCurRound(r=>r+1); notify(`Durchgang ${curRound+1} gestartet! 💪`); }
    else { setStep(3); setRunning(false); setEndTime(new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})); }
  };
  const toggleSetDone=(ei,si)=>{
    setSets(s=>{
      const n=JSON.parse(JSON.stringify(s));
      if(n[ei]&&n[ei][si]) {
        n[ei][si].done=!n[ei][si].done;
        if (n[ei][si].done) playBeep(880, 0.4, 0.1); // Short high beep for set done
      }
      return n;
    });
  };

  const save=()=>{
    const plan=data.plans.find(p=>p.id===parseInt(planId));
    const parsed=exercises.map((ex,ei)=>{
      if (hiitMode) {
        const dur = hiitStatus[ei] || 0;
        if (dur === 0) return null;
        return { name: ex.name, duration: dur, isHiit: true };
      }
      const sArr = sets[ei] || [];
      const valid = sArr.filter(s => s.done && (parseInt(s.reps)>0 || parseFloat(s.weight)>0 || parseFloat(s.kcal)>0 || parseFloat(s.km)>0));
      return valid.length > 0 ? { name: ex.name, sets: valid } : null;
    }).filter(Boolean);
    
    if(parsed.length === 0) return notify("Keine Fortschritte zum Speichern!", "error");
    
    if (!hiitMode) {
      parsed.forEach(ex=>{
        const best=ex.sets.reduce((b,s)=>s.weight*s.reps>b.weight*b.reps?s:b,{reps:0,weight:0});
        if(best.weight>0) onSavePR(ex.name,best.weight,best.reps);
      });
    }

    setData(d=>({...d,workouts:[{ id:Date.now(), planId:parseInt(planId), name:plan?.name||"Training", date, duration:Math.round(timer/60), exercises:parsed, startTime, endTime, hiitMode },...d.workouts]}));
    notify("Training gespeichert! 💪");
    setStep(1);setTimer(0);setRunning(false);setCurEx(0);setCurRound(1);setStartTime(null);setEndTime(null); setActiveWorkout(null); setHiitStatus({});
  };

  const plan=data.plans.find(p=>p.id===parseInt(planId));
  const curExData=exercises[curEx];
  const curSets = repeatRounds ? (sets[curEx]||[]).slice((curRound-1)*(parseInt(totalSets)||1), curRound*(parseInt(totalSets)||1)) : (sets[curEx]||[]);

  return(<div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding}}>
    <div style={s.pageHead}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", width:"100%"}}>
        <div><h1 style={{...s.pageTitle, fontSize: isMobile ? 26 : 32}}>Training starten</h1><p style={s.pageSub}>Schritt {step} von 3</p></div>
      </div>
    </div>
    <div style={{...s.stepBar, gap: isMobile ? 4 : 8}}>{[1,2,3].map(n=>(<div key={n} style={{display:"flex",alignItems:"center",flex:1}}><div style={{...s.stepDot, width: isMobile ? 32 : 40, height: isMobile ? 32 : 40, fontSize: isMobile ? 12 : 14, ...(step>=n?s.stepOn:{})}}>{step>n?IC.check:n}</div>{n<3&&<div style={{flex:1,height:2,background:step>n?"#FF6B35":"#1E1E24",transition:"background 0.3s"}}/>}</div>))}</div>
    <div style={plan ? {...s.logCard, position: "relative", borderTop: `6px solid ${plan.color}`, borderRight: "none", borderBottom: "none", borderLeft: "none", paddingTop: 46, padding: isMobile ? 16 : 24} : {...s.logCard, padding: isMobile ? 16 : 24}}>
      {plan && <div style={{position: "absolute", top: 0, left: 24, background: plan.color, padding: "4px 14px", borderRadius: "0 0 10px 10px", color: "#000", fontSize: 11, fontWeight: 900, textTransform: "uppercase"}}>{plan.name}</div>}

      {step===1&&<div className="fadeIn">
        <h3 style={s.logTitle}>Plan & Datum</h3>
        <div style={{display:"flex", gap:14, marginBottom:20, alignItems: "flex-end"}}>
          <div style={{flex: 1, minWidth: 0}}>
            <label style={s.lbl}>Trainingsplan</label>
            <select className="customSelect" style={{...s.inp, display: "block", height: 44, width: "100%", borderColor: plan?.color || "#2A2A30", color: plan?.color || "#F0EDE8", background: plan ? `${plan.color}15` : "#0D0D0F"}} value={planId||""} onChange={e=>setPlanId(e.target.value)}>
              <option value="">Kein Plan</option>
              {data.plans.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div style={{flex: 1, minWidth: 0}}>
            <label style={s.lbl}>Datum</label>
            <input style={{...s.inp, display: "block", height: 44, width: "100%", minWidth: 0}} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>
        </div>

        <div style={{display:"flex", gap:10, marginBottom:20}}>
          <button 
            style={{flex: 1, height: 74, borderRadius: 16, background: repeatRounds ? "#3B82F615" : "#0D0D0F", border: `2px solid ${repeatRounds ? "#3B82F6" : "#1E1E24"}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, transition: "0.3s", cursor: "pointer"}}
            onClick={() => setRepeatRounds(!repeatRounds)}
          >
            <span style={{color: repeatRounds ? "#3B82F6" : "#444", display: "flex"}}>{IC.repeat}</span>
            <span style={{fontSize: 11, fontWeight: 900, color: repeatRounds ? "#3B82F6" : "#666", textTransform: "uppercase", letterSpacing: 0.5}}>Wiederholen</span>
          </button>
          <button 
            style={{flex: 1, height: 74, borderRadius: 16, background: hiitMode ? "#FFD16615" : "#0D0D0F", border: `2px solid ${hiitMode ? "#FFD166" : "#1E1E24"}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, transition: "0.3s", cursor: "pointer"}}
            onClick={() => setHiitMode(!hiitMode)}
          >
            <span style={{color: hiitMode ? "#FFD166" : "#444", display: "flex"}}>{IC.bolt}</span>
            <span style={{fontSize: 11, fontWeight: 900, color: hiitMode ? "#FFD166" : "#666", textTransform: "uppercase", letterSpacing: 0.5}}>HIIT Modus</span>
          </button>
        </div>

        {(repeatRounds || hiitMode) && (
          <div style={{background: "#0D0D0F", borderRadius: 16, padding: 18, border: "1px solid #1A1A1F", marginBottom: 20, animation: "slideDown 0.3s ease"}}>
            {repeatRounds && (
              <div style={{display: "flex", flexDirection: "column", gap: 12, marginBottom: hiitMode ? 18 : 0}}>
                <div style={{display: "flex", justifyContent: "space-between", alignItems: "center"}}>
                  <label style={{fontSize: 12, fontWeight: 800, color: "#aaa"}}>Anzahl Durchgänge</label>

                </div>
                <div style={{display: "flex", justifyContent: "space-between", alignItems: "center"}}>
                  <label style={{fontSize: 12, fontWeight: 800, color: "#aaa"}}>Sätze pro Übung</label>
                  <input type="number" style={{...s.inp, width: 70, padding: "8px 10px", textAlign: "center", background: "#1A1A1F", color: "#3B82F6", border: "1px solid #3B82F622"}} value={totalSets} onFocus={e=>e.target.select()} onChange={e=>setTotalSets(e.target.value)} placeholder="1"/>
                </div>
              </div>
            )}
            {repeatRounds && hiitMode && <div style={{height: 1, background: "#1A1A1F", margin: "12px 0"}}/>}
            {hiitMode && (
              <div>
                <div style={{fontSize: 11, fontWeight: 900, color: "#666", textTransform: "uppercase", marginBottom: 10}}>Standard Intervalle (Sekunden)</div>
                <div style={{display: "flex", flexWrap: "wrap", gap: 6}}>
                  {[20, 30, 45, 60, 90, 120].map(sVal => (
                    <button 
                      key={sVal} 
                      className={selectedHiitVal === sVal ? "hiit-glow" : ""}
                      style={{flex: 1, minWidth: 50, padding: "8px 0", borderRadius: 8, background: selectedHiitVal === sVal ? "rgba(255, 209, 102, 0.2)" : "#FFD16608", border: selectedHiitVal === sVal ? "1px solid #FFD166" : "1px solid #FFD1661A", color: "#FFD166", fontSize: 10, fontWeight: 800, transition: "0.2s"}} 
                      onClick={() => {
                        const nx = {}; 
                        exercises.forEach((_,idx) => nx[idx] = sVal); 
                        setHiitDurations(nx);
                        setSelectedHiitVal(sVal);
                      }}
                    >{sVal}s</button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {plan&&<div style={{background:"#0D0D0F",borderRadius:12,padding:16,marginBottom:20,border:"1px solid #1A1A1F"}}>
          {exercises.map((e,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<exercises.length-1?"1px solid #1A1A1F":"none"}}>
            {hiitMode && (
              <div style={{position:"relative", display:"flex", alignItems:"center"}}>
                <input style={{width:54, height:44, background: "#FFD16608", color: "#FFD166CC", padding: "4px 4px 4px 4px", borderRadius: 10, fontSize: 10, fontWeight: 800, border: "1px solid #FFD1661F", textAlign: "center", outline: "none"}} value={hiitDurations[i]||""} onFocus={e=>e.target.select()} onChange={val=>{setHiitDurations({...hiitDurations,[i]:parseInt(val.target.value)||0});}} placeholder="30"/>
                <span style={{position:"absolute", right:4, bottom:4, fontSize:8, color:"#FFD16666", pointerEvents:"none"}}>sek</span>
              </div>
            )}
            <div style={{width:44,height:44,background:"#1A1A1F",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
              {e.photo ? <img src={e.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : IC.dumbbell}
            </div>
            <div style={{flex:1, display:"flex", justifyContent:"space-between", alignItems:"center", gap: 10, minWidth:0}}>
              <div style={{fontSize:14, fontWeight:700, color:"#F0EDE8", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{e.name}</div>
              <div style={{display:"flex", gap:6, alignItems:"center", flexShrink: 0}}>
                {e.reps !== undefined && (
                  <div style={{position:"relative", display:"flex", alignItems:"center"}}>
                    <input style={{width:68, background: "#FF6B3508", color: "#FF6B35CC", padding: "4px 34px 4px 6px", borderRadius: 8, fontSize: 10, fontWeight: 800, border: "1px solid #FF6B351F", textAlign: "left", outline: "none"}} value={e.reps||""} onFocus={e=>e.target.select()} onChange={val=>{const nx=[...exercises];nx[i].reps=val.target.value;setExercises(nx);}} placeholder="10"/>
                    <span style={{position:"absolute", right:6, fontSize:9, color:"#FF6B3566", pointerEvents:"none", fontWeight:800}}>WDH</span>
                  </div>
                )}
                {e.weight !== undefined && (
                  <div style={{position:"relative", display:"flex", alignItems:"center"}}>
                    <input style={{width:68, background: "#A78BFA08", color: "#A78BFACC", padding: "4px 24px 4px 6px", borderRadius: 8, fontSize: 10, fontWeight: 800, border: "1px solid #A78BFA1F", textAlign: "left", outline: "none"}} value={e.weight||""} onFocus={e=>e.target.select()} onChange={val=>{const nx=[...exercises];nx[i].weight=val.target.value;setExercises(nx);}} placeholder="10"/>
                    <span style={{position:"absolute", right:6, fontSize:9, color:"#A78BFA66", pointerEvents:"none", fontWeight:800}}>kg</span>
                  </div>
                )}
              </div>
            </div>
          </div>))}
        </div>}
        <button style={s.primaryBtn} onClick={()=>{
          if(!planId) return notify("Plan wählen","error");
          const rounds = repeatRounds ? (parseInt(totalRounds)||1) : 1;
          const setsPerEx = repeatRounds ? (parseInt(totalSets)||1) : 1;
          const ns = {};
          exercises.forEach((ex,i)=>{ 
            const count = repeatRounds? (rounds*setsPerEx) : (parseInt(ex.sets)||1);
            ns[i] = Array.from({length:count}, ()=>({ reps: ex.reps||"", weight: ex.weight||"", preset: true }));
          });
          setSets(ns); setStep(2); setRunning(true); setTimer(0); setStartTime(new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}));
          if (hiitMode && hiitDurations[0]) {
            setExTimer(hiitDurations[0]);
            setExTimerActive(true);
          }
          playBeep(440, 0.8, 0.15);
          setTimeout(() => playBeep(554, 0.8, 0.15), 200);
        }}>▶ Training starten</button>

        {showHiitConfig && (
          <div style={s.overlay2} onClick={() => setShowHiitConfig(false)}>
            <div style={{...s.modal, maxWidth: 450, padding: 25}} onClick={e => e.stopPropagation()}>
              <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20}}>
                <h3 style={{...s.modalTitle, margin: 0}}>HIIT Konfiguration</h3>
                <button style={{background: "transparent", border: "none", color: "#666", cursor: "pointer"}} onClick={() => setShowHiitConfig(false)}>{IC.x}</button>
              </div>
              
              <div style={{background: "#0D0D0F", padding: 16, borderRadius: 12, border: "1px solid #1E1E24", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center"}}>
                <div>
                  <div style={{fontWeight: 800, fontSize: 15, color: "#fff"}}>HIIT Modus</div>
                  <div style={{fontSize: 12, color: "#666"}}>Übergänge und Timer automatisieren</div>
                </div>
                <div style={{...s.toggle, ...(hiitMode ? s.toggleOn : {})}} onClick={() => setHiitMode(!hiitMode)}>
                  <div style={{...s.thumb, ...(hiitMode ? s.thumbOn : {})}}/>
                </div>
              </div>

              <div style={{fontSize: 11, fontWeight: 800, color: "#666", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12}}>Übungszeiten (Sekunden)</div>
              <div style={{display: "flex", flexDirection: "column", gap: 10, maxHeight: 300, overflowY: "auto", paddingRight: 4, marginBottom: 20}}>
                {exercises.map((ex, i) => (
                  <div key={i} style={{display: "flex", alignItems: "center", gap: 12, background: "#0D0D0F", padding: 12, borderRadius: 10, border: "1px solid #1A1A1F"}}>
                    <div style={{width: 32, height: 32, borderRadius: 8, background: "#1A1A1F", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", flexShrink: 0}}>
                      {ex.photo ? <img src={ex.photo} style={{width: "100%", height: "100%", objectFit: "cover"}}/> : IC.dumbbell}
                    </div>
                    <div style={{flex: 1, minWidth: 0}}>
                      <div style={{fontSize: 13, fontWeight: 700, color: "#aaa", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis"}}>{ex.name}</div>
                      <div style={{display:"flex", gap:4, marginTop: 4}}>
                        <div style={{background: "#3B82F610", color: "#3B82F6", padding: "2px 6px", borderRadius: 6, fontSize: 9, fontWeight: 800}}>
                          {ex.sets} Sätze
                        </div>
                        {ex.reps && (
                          <div style={{background: "#FF6B3510", color: "#FF6B35", padding: "2px 6px", borderRadius: 6, fontSize: 9, fontWeight: 800}}>
                            {ex.reps} WDH
                          </div>
                        )}
                        {ex.weight && (
                          <div style={{background: "#A78BFA10", color: "#A78BFA", padding: "2px 6px", borderRadius: 6, fontSize: 9, fontWeight: 800}}>
                            {ex.weight} kg
                          </div>
                        )}
                      </div>
                    </div>
                    <input 
                      type="number" 
                      style={{...s.inp, width: 60, padding: "6px 8px", textAlign: "center", border: "1px solid #FF6B3544"}} 
                      value={hiitDurations[i] || ""} 
                      onChange={e => setHiitDurations({...hiitDurations, [i]: parseInt(e.target.value) || 0})} 
                      placeholder="30"
                    />
                  </div>
                ))}
              </div>
              
              <button style={{...s.primaryBtn, width: "100%"}} onClick={() => setShowHiitConfig(false)}>Konfiguration speichern</button>
            </div>
          </div>
        )}
      </div>}

      {step===2&&<div className="fadeIn">
        <div style={{marginBottom:18, display:"flex", gap:10}}>
          <div style={{flex:1, padding:"10px 14px", background:"#0D0D0F", borderRadius:16, border:"1px solid #1E1E24", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer"}} onClick={()=>setRunning(r=>!r)}>
            <div style={{display:"flex", alignItems:"center", gap:8}}>
              <div style={{fontFamily:"'Syne',sans-serif", fontSize:26, fontWeight:800, color:"#FF6B35", letterSpacing:1}}>{fmtTimer(timer)}</div>
              <div style={{color:"#FF6B35", display:"flex"}}>{running ? <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>}</div>
            </div>
          </div>
          
          {hiitMode && !exTimerActive && (
            <button 
              className="hiit-glow"
              style={{...s.primaryBtn, flex: 1, background: "rgba(255, 209, 102, 0.15)", border: "2px solid #FFD166", color: "#FFD166", height: 50, fontFamily: "'Syne', sans-serif", fontSize: 14, letterSpacing: 1}} 
              onClick={() => {
                playBeep(440, 0.1, 0.1);
                setTimeout(() => playBeep(440, 0.1, 0.1), 300);
                setTimeout(() => playBeep(440, 0.1, 0.1), 600);
                setTimeout(() => { playBeep(880, 0.3, 0.3); setExTimerActive(true); }, 900);
              }}
            >
              HIIT START ⚡
            </button>
          )}

          {(hiitMode || curExData.hiitTimer?.enabled) && exTimerActive && (
            <HiitTimer controlledTime={exTimer} controlledActive={exTimerActive} isMobile={isMobile}/>
          )}
        </div>

        {curExData && <>
          {hiitMode && curEx < exercises.length - 1 && (
            <div style={{fontSize: 10, fontWeight: 900, color: "#666", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 8, display: "flex", alignItems: "center", gap: 8}}>
              <span>Als nächstes:</span>
              <span style={{color: "#FFD166"}}>{exercises[curEx + 1].name}</span>
            </div>
          )}
          <div style={{fontFamily:"'Syne',sans-serif",fontSize: isMobile ? 22 : 26, fontWeight:800,color:"#fff",marginBottom:12}}>{curExData.name}</div>
          <div style={{width:"100%",height: isMobile ? 180 : 220, borderRadius:20,overflow:"hidden",marginBottom:16,background:"#0D0D0F",border:"1px solid #1E1E24",position:"relative", boxShadow: "0 10px 30px rgba(0,0,0,0.3)"}}>
            {curExData.photo?<img src={curExData.photo} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#333"}}>{IC.dumbbell}</div>}
            <button style={{position:"absolute",bottom:12,right:12,background:"rgba(255,107,33,0.9)",borderRadius:"50%",width:36,height:36,border:"none",color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800}} onClick={()=>setShowInfo(true)}>i</button>
          </div>

          {showInfo&&<div style={s.overlay2} onClick={()=>setShowInfo(false)}>
            <div style={{...s.modal,maxWidth:400, borderRadius: 24}} onClick={e=>e.stopPropagation()}>
              <h3 style={{...s.modalTitle, color: plan?.color || "#FF6B35"}}>{curExData.name}</h3>
              <div style={{fontSize:14,color:"#aaa",lineHeight:1.6,margin:"20px 0"}}>{curExData.description || "Keine Anleitung verfügbar."}</div>
              <button style={{...s.primaryBtn, width: "100%"}} onClick={()=>setShowInfo(false)}>Verstanden</button>
            </div>
          </div>}

          {!hiitMode && (
            <>
              <div style={{marginBottom:15,borderBottom:"1px solid #1E1E24",paddingBottom:10,display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:800,color:"#666"}}>
                <span>Satz <span style={{color:"fff"}}>{curSets.filter(s=>s.done).length+1}</span> / <span style={{color:"fff"}}>{curSets.length}</span></span>
                <span>{repeatRounds ? <span style={{color:"fff"}}>Durchgang {curRound}</span> : ""}</span>
                <span>Übung <span style={{color:"fff"}}>{curEx+1}</span> / <span style={{color:"fff"}}>{exercises.length}</span></span>
              </div>

              {curSets.map((set, siRel) => {
                const siGlobal = repeatRounds ? (curRound-1)*(parseInt(totalSets)||1)+siRel : siRel;
                const hasMany = curSets.length > 1;
                return (
                  <div key={siGlobal} style={{display:"grid", gridTemplateColumns: hasMany ? "34px 1fr 1fr 40px" : "34px 1fr 1fr", gap:10, alignItems:"center", marginBottom:12, background: set.done?"#06D6A010":"#0D0D0F", padding:12, borderRadius:14, border:`1px solid ${set.done?"#06D6A033":"#1E1E24"}`}}>
                    <div style={{...s.setN, background:set.done?"#06D6A0":"#1F1F24", color:set.done?"#000":"#666"}}>{siGlobal+1}</div>
                    <div style={{position:"relative", display:"flex", alignItems:"center"}}>
                      <input style={{...s.setInp, width:"100%", color: "#FF6B35", background: "#FF6B3508", border: "1px solid #FF6B351F", borderRadius: 8, textAlign: "left", paddingRight: 34}} type="number" value={set.reps} onFocus={e=>e.target.select()} onChange={e=>updSet(curEx, siGlobal, 'reps', e.target.value)} placeholder="0"/>
                      <span style={{position:"absolute", right:8, fontSize:9, color:"#FF6B3566", pointerEvents:"none", fontWeight:800}}>WDH</span>
                    </div>
                    <div style={{position:"relative", display:"flex", alignItems:"center"}}>
                      <input style={{...s.setInp, width:"100%", color: "#A78BFA", background: "#A78BFA08", border: "1px solid #A78BFA1F", borderRadius: 8, textAlign: "left", paddingRight: 28}} type="number" value={set.weight} onFocus={e=>e.target.select()} onChange={e=>updSet(curEx, siGlobal, 'weight', e.target.value)} placeholder="0"/>
                      <span style={{position:"absolute", right:8, fontSize:9, color:"#A78BFA66", pointerEvents:"none", fontWeight:800}}>kg</span>
                    </div>
                    {hasMany && (
                      <div style={{display:"flex",flexDirection:"column",gap:4}}>
                        <button style={{background:set.done?"#06D6A0":"transparent", border:`2px solid ${set.done?"#06D6A0":"#2A2A30"}`, color:set.done?"#000":"#06D6A0", borderRadius:8, height:34}} onClick={()=>toggleSetDone(curEx, siGlobal)}>{IC.check}</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </>
          )}
          
          <div style={{display:"flex", gap:10, marginTop:20}}>
            <button style={{...s.secBtn, flex: 1}} onClick={() => {
              if (curEx > 0) setCurEx(i => i - 1);
              else notify("Erste Übung erreicht", "info");
            }}>← Zurück</button>
            
            {!hiitMode && (
              curSets.length === 1 ? (
                <div style={{flex: 2, display: "flex", gap: 10}}>
                  {!curSets[0].done && (
                    <button 
                      style={{...s.primaryBtn, flex: 1, background: "#06D6A015", border: "2px solid #06D6A0", color: "#06D6A0"}} 
                      onClick={() => toggleSetDone(curEx, 0)}
                    >
                      Satz fertig ✓
                    </button>
                  )}
                  <button 
                    style={{...s.primaryBtn, flex: 1, background: "#FF6B3515", border: "2px solid #FF6B35", color: "#FF6B35"}} 
                    onClick={goNext}
                  >
                    {curEx < exercises.length - 1 ? "Nächste →" : "Fertig ✓"}
                  </button>
                </div>
              ) : (
                <button style={{...s.primaryBtn, flex: 2, background: "#06D6A015", border: "2px solid #06D6A0", color: "#06D6A0"}} onClick={goNext}>
                  {curEx < exercises.length - 1 ? "Nächste Übung →" : "Fertig ✓"}
                </button>
              )
            )}
            
            {hiitMode && (
               <button style={{...s.primaryBtn, flex: 2, background: "#FFD16615", border: "2px solid #FFD166", color: "#FFD166"}} onClick={goNext}>
                 Überspringen →
               </button>
            )}
          </div>
          <button style={{width:"100%",marginTop:15,background:"#EF476F15",border:"2px solid #EF476F",borderRadius:10,padding:12,color:"#EF476F"}} onClick={()=>setShowEndModal(true)}>⏹ Abbrechen</button>
        </>}

        {hiitConfig && (
          <div style={s.overlay2} onClick={()=>setHiitConfig(null)}>
            <div style={{...s.modal, maxWidth:360, padding:25, textAlign:"center"}} onClick={e=>e.stopPropagation()}>
              <h3 style={s.modalTitle}>HIIT Timer</h3>
              <HiitTimer duration={hiitConfig.duration} onFinish={()=>{hiitConfig.onFinish(); setHiitConfig(null);}} isMobile={isMobile}/>
              <button style={{...s.secBtn, marginTop:20, width:"100%"}} onClick={()=>setHiitConfig(null)}>Abbrechen</button>
            </div>
          </div>
        )}

        {showEndModal && (
          <div style={s.overlay2} onClick={()=>setShowEndModal(false)}>
            <div style={{...s.modal, maxWidth:380, padding:25, borderRadius: 24, textAlign: "center"}} onClick={e=>e.stopPropagation()}>
              <div style={{width: 64, height: 64, background: "#EF476F20", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", color: "#EF476F"}}><span style={{fontSize: 28}}>⏹</span></div>
              <h3 style={{...s.modalTitle, fontSize: 22, marginBottom: 10}}>Training beenden?</h3>
              <p style={{fontSize: 14, color: "#888", marginBottom: 25, lineHeight: 1.5}}>Möchtest du das aktuelle Training abbrechen oder vorzeitig mit den bisherigen Fortschritten speichern?</p>
              <div style={{display: "flex", flexDirection: "column", gap: 10}}>
                <button style={{...s.primaryBtn, background: "#06D6A015", border: "2px solid #06D6A0", color: "#06D6A0", fontSize: 13, padding: "10px", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", gap: 8}} onClick={save}>✓ Speichern & Beenden</button>
                <button style={{...s.primaryBtn, background: "#EF476F15", border: "2px solid #EF476F", color: "#EF476F", fontSize: 13, padding: "10px", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", gap: 8}} onClick={()=>{setStep(1); setTimer(0); setRunning(false); setShowEndModal(false); setActiveWorkout(null); notify("Training verworfen", "info");}}>🗑 Abbrechen & Löschen</button>
                <button style={{...s.secBtn, background: "#F0EDE810", border: "2px solid #F0EDE855", color: "#F0EDE8", fontSize: 13, marginTop: 5, padding: "10px", borderRadius: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6}} onClick={()=>setShowEndModal(false)}>← Zurück zum Training</button>
              </div>
            </div>
          </div>
        )}
      </div>}

      {step===3 && <div className="fadeIn">
        <div style={{background:"#0D0D0F",borderRadius:14,padding:20,textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:32,fontWeight:800,color:"#06D6A0",marginBottom:10}}>Geschafft! 🎉</div>
          <div style={{fontSize:14,color:"#888"}}>Dauer: {fmtTimer(timer)} | Übungen: {exercises.length}</div>
        </div>
        <button style={s.primaryBtn} onClick={save}>💾 Training speichern</button>
      </div>}
    </div>
  </div>);
}

function History({data,setData,selWO,setSelWO,notify,library,setWeeklyReport,isMobile}){
  const sorted=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const del=id=>{setData(d=>({...d,workouts:d.workouts.filter(w=>w.id!==id)}));setSelWO(null);notify("Training gelöscht");};
  
  const getWeekNumber = (d) => {
    const t = new Date(d.getTime());
    t.setHours(0, 0, 0, 0);
    t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
    const s = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
    return Math.ceil((((t - s) / 864e5) + 1) / 7);
  };
  
  const getWeekRange = (d) => {
    const t = new Date(d.getTime());
    const day = t.getDay() || 7;
    const mon = new Date(t.getTime());
    mon.setDate(t.getDate() - day + 1);
    const sun = new Date(t.getTime());
    sun.setDate(t.getDate() - day + 7);
    return `${mon.toLocaleDateString("de-DE", {day:"2-digit", month:"2-digit"})} - ${sun.toLocaleDateString("de-DE", {day:"2-digit", month:"2-digit"})}`;
  };

  const grouped = sorted.reduce((acc, w) => {
    const d = new Date(w.date);
    const wn = getWeekNumber(d);
    const yr = d.getFullYear();
    const key = `${yr}-W${wn}`;
    if (!acc[key]) acc[key] = { wn, yr, dateRange: getWeekRange(d), workouts: [] };
    acc[key].workouts.push(w);
    return acc;
  }, {});

  if(selWO){
    const w=data.workouts.find(x=>x.id===selWO);
    if(!w){setSelWO(null);return null;}
    const plan=data.plans.find(p=>p.id===w.planId);
    const vol = (w.exercises||[]).reduce((a,e) => {
      if (e.isHiit) return a; // HIIT has no weight volume
      return a + (e.sets||[]).reduce((b,s) => b + (s.done !== false ? (parseFloat(s.weight)||0) * (parseInt(s.reps)||0) : 0), 0);
    }, 0);

    
    return(
      <div style={selWO?{...s.page,paddingTop:20}:{...s.page}} className="fadeIn">

        <div style={{...s.wDetail, borderTop: `6px solid ${plan?.color || "#1E1E24"}`, position: "relative", marginTop:0}}>
          {plan && <div style={{position:"absolute", top:0, left:20, background:plan.color, padding:"4px 12px", borderRadius:"0 0 10px 10px", fontSize:10, fontWeight:900, color:"#000", textTransform:"uppercase"}}>{plan.name}</div>}

          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"flex-start",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:800,color:"#A78BFA",background:"#A78BFA15",padding:"4px 10px",borderRadius:8}}>{vol}kg Gesamt</div>
          </div>
          <div style={{color:"#888",fontSize:13,display:"flex",gap:10,alignItems:"center",marginBottom:18}}>
            <span>📅 {new Date(w.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}</span>
          </div>
          
          <div style={{display:"flex",background:"#0D0D0F",borderRadius:16,overflow:"hidden",marginBottom:26,border:"1px solid #1E1E24"}}>
            {[
              [`${w.duration} min`, "Dauer", "#FF6B35"],
              [(w.exercises||[]).length, "Übungen", "#00D9C0"],
              [w.hiitMode ? "HIIT" : "Klassik", "Modus", "#FFD166"],
              [`${w.startTime||"--:--"} - ${w.endTime||"--:--"}`, "Zeit", "#F0EDE8"]
            ].map(([v,l,c],i)=>(
              <div key={i} style={{flex:1,padding:isMobile?10:14,textAlign:"center",borderRight:i<3?"1px solid #1E1E24":"none"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:isMobile?14:18,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:"#666",marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>
          
          {w.note&&<div style={{color:"#aaa",fontStyle:"italic",fontSize:14,marginBottom:22,padding:16,background:"#0D0D0F",borderRadius:14,border:"1px solid #1E1E24"}}>„{w.note}"</div>}
          
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {(w.exercises||[]).map((ex,i)=>{
              if (ex.isHiit) {
                return (
                  <div key={i} style={{...s.exBlock,background:"#0D0D0F",border:"1px solid #FFD16644",padding:18}} className="hiit-glow">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:10,fontWeight:900,color:"#FFD166",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>⚡ HIIT Interval</div>

                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#FFD166"}}>{ex.duration}s</div>
                        <div style={{fontSize:10,color:"#666",fontWeight:700}}>GEHALTEN</div>
                      </div>
                    </div>
                  </div>

              }

              const eVol = (ex.sets||[]).reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0);
              const eKcal = (ex.sets||[]).reduce((a,s)=>a+(parseFloat(s.kcal)||0),0);
              const eKm = (ex.sets||[]).reduce((a,s)=>a+(parseFloat(s.km)||0),0);
              
              const libEx = library?.find(l => l.name === ex.name);
              const tr = libEx ? libEx.trackReps !== false : (ex.sets||[]).some(s => parseInt(s.reps) > 0);
              const tw = libEx ? libEx.trackWeight !== false : (ex.sets||[]).some(s => parseFloat(s.weight) > 0);
              const tk = libEx ? libEx.trackKcal : (ex.sets||[]).some(s => parseFloat(s.kcal) > 0);
              const tm = libEx ? libEx.trackKm : (ex.sets||[]).some(s => parseFloat(s.km) > 0);
              const ti = libEx ? libEx.trackIncline : (ex.sets||[]).some(s => s.incline);
              const tt = libEx ? libEx.trackTempo : (ex.sets||[]).some(s => s.tempo);

              let gtc = "40px";
              if(tr) gtc += " 1fr";
              if(tw) gtc += " 1fr";
              if(tk) gtc += " 1fr";
              if(tm) gtc += " 1fr";
              if(ti) gtc += " 1fr";
              if(tt) gtc += " 1fr";

              return(
                <div key={i} style={{...s.exBlock,background:"#0D0D0F",border:"1px solid #1E1E24",padding:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontWeight:800,fontSize:16}}>{ex.name}</div>
                    <div style={{display:"flex",gap:6}}>
                      {eVol > 0 && <div style={{fontSize:10,fontWeight:700,color:"#666",background:"#1A1A1F",padding:"3px 8px",borderRadius:6}}>{eVol}kg</div>}
                      {eKcal > 0 && <div style={{fontSize:10,fontWeight:700,color:"#FF6B6B",background:"#FF6B6B15",padding:"3px 8px",borderRadius:6}}>{eKcal} kcal</div>}
                      {eKm > 0 && <div style={{fontSize:10,fontWeight:700,color:"#4CC9F0",background:"#4CC9F015",padding:"3px 8px",borderRadius:6}}>{eKm.toFixed(1)} km</div>}

                  <div style={{...s.setsH,color:"#555",gridTemplateColumns:gtc,marginBottom:8}}>

                    {tk && <span style={{textAlign:"center"}}>kcal</span>}
                    {tm && <span style={{textAlign:"center"}}>km</span>}
                    {ti && <span style={{textAlign:"center"}}>%</span>}
                    {tt && <span style={{textAlign:"center"}}>T</span>}
                  </div>
                  {(ex.sets||[]).map((set,si)=>(
                    <div key={si} style={{...s.setRow,gridTemplateColumns:gtc,marginBottom:6}}>
                      <span style={{...s.setN,width:26,height:26}}>{si+1}</span>
                      {tr && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FF6B35",fontWeight:700}}>{set.reps || 0}</span>}
                      {tw && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#A78BFA",fontWeight:700}}>{set.weight || 0}</span>}
                      {tk && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FF6B6B",fontWeight:700}}>{set.kcal || 0}</span>}
                      {tm && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#4CC9F0",fontWeight:700}}>{set.km || 0}</span>}
                      {ti && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FFD166",fontWeight:700}}>{set.incline || "-"}</span>}
                      {tt && <span style={{background:"#1A1A1F",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#EF476F",fontWeight:700}}>{set.tempo || "-"}</span>}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
          
          <button style={{background:"transparent",border:"1px solid #2A2A30",color:"#EF476F88",borderRadius:12,padding:"12px 22px",cursor:"pointer",display:"flex",gap:8,alignItems:"center",marginTop:30,width:"100%",justifyContent:"center",fontSize:14,fontWeight:600}} onClick={()=>del(w.id)}>
            {IC.trash} Training aus Verlauf löschen
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding}}>
      <div style={s.pageHead}>
        <div><h1 style={{...s.pageTitle, fontSize: isMobile ? 26 : 32}}>Verlauf</h1><p style={s.pageSub}>{data.workouts.length} abgeschlossene Trainings</p></div>
      </div>
      {!sorted.length&&<div style={{textAlign:"center",padding:"80px 20px",color:"#555",border:"2px dashed #1E1E24",borderRadius:18}}>Noch keine Trainings aufgezeichnet.</div>}
      <div style={{display:"flex",flexDirection:"column",gap: isMobile ? 28 : 36}}>
        {Object.values(grouped).map((group, gi) => (
          <div key={gi} style={{background:"#0D0D0F", border:"1px solid #1E1E24", borderRadius:22, padding: isMobile ? 16 : 20, boxShadow:"0 8px 32px rgba(0,0,0,0.25)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingLeft:4,marginBottom:18, borderBottom:"1px solid #1E1E2450", paddingBottom:12}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <span style={{fontSize:24,fontWeight:900,fontFamily:"'Syne',sans-serif",color:"#F0EDE8"}}>KW {group.wn}</span>
                <span style={{fontSize:14,fontWeight:700,color:"#666"}}>({group.dateRange})</span>
              </div>
              <button 
                style={{...s.secBtn, padding:"8px 16px", fontSize:12, fontWeight:800, display:"flex", alignItems:"center", gap:8, border:"1px solid #FF6B3550", color:"#FF6B35", background:"#FF6B3510", borderRadius:12}}
                onClick={()=>setWeeklyReport(group)}
              >
                {IC.stats} Bericht
              </button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              {group.workouts.map(w=>{
                const plan=data.plans.find(p=>p.id===w.planId);
                return(
                  <div key={w.id} style={{...s.histCard,padding:18, border:"1px solid #1E1E24", borderLeft:`6px solid ${plan?.color || "#1E1E24"}`, background:plan?`${plan.color}08`:"#111114", flexDirection:"column", alignItems:"stretch"}} className="histCard" onClick={()=>setSelWO(w.id)}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:plan?.color || "#F0EDE8"}}>{w.name}</div>
                        {w.hiitMode && <div style={{display:"flex",color:"#FFD166",filter:"drop-shadow(0 0 5px rgba(255,209,102,0.5))"}} className="hiit-glow">{IC.bolt}</div>}
                      </div>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <div style={{display:"flex",gap:6,fontSize:12,fontWeight:800,color:"#888"}}>
                          <span>{w.startTime || "--"}</span>
                          <span style={{color:"#444"}}>-</span>
                          <span>{w.endTime || "--"}</span>
                        </div>
                        <span style={{fontSize:18,color:"#333",marginLeft:4}}>→</span>
                      </div>
                    </div>
                    
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
                      <div style={{textAlign:"center",padding:8,background:"#0D0D0F",borderRadius:10,border:"1px solid #1A1A1F"}}>
                        <div style={{fontSize:10,color:"#666",marginBottom:2,textTransform:"uppercase",fontWeight:700}}>Dauer</div>
                        <div style={{fontSize:13,fontWeight:800,color:"#FF6B35"}}>{w.duration} min</div>
                      </div>
                      <div style={{textAlign:"center",padding:8,background:"#0D0D0F",borderRadius:10,border:"1px solid #1A1A1F"}}>
                        <div style={{fontSize:10,color:"#666",marginBottom:2,textTransform:"uppercase",fontWeight:700}}>Übungen</div>
                        <div style={{fontSize:13,fontWeight:800,color:"#00D9C0"}}>
                          {w.exercises.length} {w.exercises.length === 1 ? 'Übung' : 'Übungen'}
                        </div>
                      </div>
                      <div style={{textAlign:"center",padding:8,background:"#0D0D0F",borderRadius:10,border:"1px solid #1A1A1F"}}>
                        <div style={{fontSize:10,color:"#666",marginBottom:2,textTransform:"uppercase",fontWeight:700}}>Datum</div>
                        <div style={{fontSize:11,fontWeight:800,color:"#F0EDE8"}}>{fmtDate(w.date)}</div>
                      </div>
                    </div>

                    {plan && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:6}}>
                      <div>
                        <div style={{fontSize:10,fontWeight:800,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Muskelgruppen</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {(plan.muscles||[]).map(m=>(
                            <span key={m} style={{fontSize:8,color:MUSCLE_COLORS[m],background:MUSCLE_COLORS[m]+"15",border:`1px solid ${MUSCLE_COLORS[m]}40`,borderRadius:8,padding:"3px 8px",fontWeight:800}}>
                              {m}
                            </span>
                          ))}
                        </div>
                      </div>
                      <div>
                        <div style={{fontSize:10,fontWeight:800,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Trainingsart</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {(plan.types||[]).map(t=>(
                            <span key={t} style={{fontSize:8,color:TYPE_COLORS[t],background:TYPE_COLORS[t]+"15",border:`1px solid ${TYPE_COLORS[t]}40`,borderRadius:8,padding:"3px 8px",fontWeight:800}}>
                              {t}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
function PRPage({prs,setPrs,notify}){
  const [exName,setExName]=useState(""),  [w,setW]=useState(""), [r,setR]=useState(""), [date,setDate]=useState(todayStr());
  const entries=Object.entries(prs).sort((a,b)=>a[0].localeCompare(b[0]));
  const save=()=>{if(!exName.trim()||!w||!r)return notify("Alle Felder ausfüllen","error");const key=exName.toLowerCase().trim();setPrs(p=>({...p,[key]:{name:exName.trim(),weight:parseFloat(w),reps:parseInt(r),date}}));notify(`PR für ${exName} gespeichert! 🏆`);setExName("");setW("");setR("");};
  const del=key=>{setPrs(p=>{const n={...p};delete n[key];return n;});notify("PR gelöscht");};
  return(<div style={s.page}><div style={s.pageHead}><div><h1 style={s.pageTitle}>Bestleistungen</h1><p style={s.pageSub}>Deine persönlichen Rekorde</p></div></div>
    <div style={{...s.card,marginBottom:26}}><h3 style={{...s.cardTitle,marginBottom:14}}>Neuen PR eintragen</h3><div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:11,alignItems:"end"}}><div style={s.fg}><label style={s.lbl}>Übung</label><input style={s.inp} value={exName} onChange={e=>setExName(e.target.value)} placeholder="Bankdrücken" onKeyDown={e=>e.key==="Enter"&&save()}/></div><div style={s.fg}><label style={s.lbl}>Gewicht (kg)</label><input style={s.inp} type="number" value={w} onChange={e=>setW(e.target.value)} placeholder="100"/></div><div style={s.fg}><label style={s.lbl}>Wdh.</label><input style={s.inp} type="number" value={r} onChange={e=>setR(e.target.value)} placeholder="5"/></div><div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/></div></div><button style={{...s.primaryBtn,marginTop:7}} onClick={save}>{IC.star} PR speichern</button></div>
    {!entries.length&&<div style={{textAlign:"center",padding:"50px 18px",color:"#555",background:"#111114",borderRadius:14,border:"1px solid #1E1E24"}}><div style={{fontSize:36,marginBottom:10}}>🏆</div>Noch keine Bestleistungen.</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:14}}>{entries.map(([key,pr])=>(<div key={key} style={{background:"#111114",border:"1px solid #1E1E24",borderRadius:14,padding:18,position:"relative"}} className="statCard"><div style={{fontSize:24,marginBottom:7}}>🏆</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,marginBottom:5}}>{pr.name||key}</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:"#FFD166"}}>{pr.weight}<span style={{fontSize:13,color:"#888",fontWeight:400}}>kg</span></div><div style={{color:"#888",fontSize:12,marginTop:3}}>{pr.reps} Wdh.</div><div style={{color:"#555",fontSize:10,marginTop:3}}>{pr.date&&fmtDate(pr.date)}</div><button className="cardIconBtn" style={{...s.cardIconBtn,position:"absolute",top:11,right:11,color:"#EF476F88"}} onClick={()=>del(key)}>{IC.trash}</button></div>))}</div>
  </div>);}
function PlanModal({data,setData,editPlan,onClose,notify,library=[]}){

    if(form.exercises.find(e=>e.libId===libEx.id))return notify("Übung bereits im Plan","error");
    setForm(f=>({...f,exercises:[...f.exercises,{
      name:libEx.name,
      photo:libEx.thumbnail||null,
      libId:libEx.id,
      muscles:libEx.muscles,
      types:libEx.types,
      sets:libEx.sets||"",
      reps:libEx.reps||"",
      weight:libEx.weight||"",
      incline:libEx.incline||"",
      tempo:libEx.tempo||"",
      trackSets:libEx.trackSets??true,
      trackReps:libEx.trackReps??true,
      trackWeight:libEx.trackWeight??true,
      trackIncline:libEx.trackIncline??false,
      trackTempo:libEx.trackTempo??false
    }]}));
    notify(`${libEx.name} hinzugefügt! 💪`);
  };
  const setExPhoto=async(idx,file)=>{
    if(!file)return;
    const url = await uploadToStorage(file, `plans/${Date.now()}_${file.name}`);
    setForm(f=>{
      const e=[...f.exercises];
      e[idx]={...e[idx],photo:url};
      return{...f,exercises:e};
    });
  };
  const save=()=>{if(!form.name)return notify("Bitte Namen eingeben","error");if(isEdit)setData(d=>({...d,plans:d.plans.map(p=>p.id===form.id?form:p)}));else setData(d=>({...d,plans:[...d.plans,{id:Date.now(),...form}]}));notify(isEdit?"Plan aktualisiert! ✅":"Plan erstellt! 🎉");onClose();};

  const libFiltered=(library||[]).filter(ex=>{

    const ts=!libFilterT.length||libFilterT.some(t=>ex.types?.includes(t));
    const ss=!libSearch||ex.name.toLowerCase().includes(libSearch.toLowerCase());
    return ms&&ts&&ss;
  });

  return(<>
    <div style={s.overlay2} onClick={onClose}><div style={{...s.modal,maxWidth:560,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()} className="dropIn">
    <h2 style={s.modalTitle}>{isEdit?"Plan bearbeiten":"Neuer Trainingsplan"}</h2>
    <div style={s.fg}><label style={s.lbl}>Name</label><input style={s.inp} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Push Pull Legs" autoFocus/></div>
    
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}}>
      <div style={s.fg}>
        <label style={s.lbl}>Muskelgruppen</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {MUSCLE_GROUPS.map(m=>(
            <button key={m} onClick={()=>setForm(f=>({...f,muscles:f.muscles?.includes(m)?f.muscles.filter(x=>x!==m):[...(f.muscles||[]),m]}))} style={{background:form.muscles?.includes(m)?MUSCLE_COLORS[m]+"22":"#0D0D0F",border:`1px solid ${form.muscles?.includes(m)?MUSCLE_COLORS[m]:"#2A2A30"}`,borderRadius:8,padding:"4px 10px",color:form.muscles?.includes(m)?MUSCLE_COLORS[m]:"#666",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>{m}</button>
          ))}
        </div>
      </div>
      <div style={s.fg}>
        <label style={s.lbl}>Trainingsart</label>

function WeeklyReportModal({report, onClose, data}) {
  const workouts = report.workouts;
  const totalW = workouts.length;
  const totalD = workouts.reduce((a,w)=>a+(parseInt(w.duration)||0),0);
  
  const getVol = w => (w.exercises||[]).reduce((a,e) => {
    if (e.isHiit) return a;
    return a + (e.sets||[]).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0);
  }, 0);
  const totalVol = workouts.reduce((a,w)=>a+getVol(w),0);
  const totalHiitSec = workouts.reduce((a,w)=>(w.exercises||[]).reduce((b,e)=>b+(e.isHiit?(e.duration||0):0),a),0);
  
  const muscleDistribution = {};
  const planCounts = {};
  const daysTrained = [];
  const WDS = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
  
  workouts.forEach(w => {
    const d = new Date(w.date);
    const dayName = WDS[d.getDay()];
    if(!daysTrained.includes(dayName)) daysTrained.push(dayName);
    
    planCounts[w.name] = (planCounts[w.name]||0) + 1;

    const plan = data.plans.find(p => p.id === w.planId);
    if(plan && plan.muscles) {
      plan.muscles.forEach(m => muscleDistribution[m] = (muscleDistribution[m]||0) + 1);
    }
  });
  
  const sortedMuscles = Object.entries(muscleDistribution).sort((a,b)=>b[1]-a[1]);
  const maxMuscle = Math.max(...Object.values(muscleDistribution), 1);

  const exportImage = () => {
    const el = document.getElementById("report-area");
    if(!window.html2canvas) return alert("Export-Bibliothek wird geladen...");
    html2canvas(el, {
      backgroundColor: "#0D0D0F",
      scale: 2,
      useCORS: true
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = `FitForge_Bericht_KW${report.wn}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  };

  return (
    <div style={s.overlay2} onClick={onClose}>
      <div style={{...s.modal, maxWidth:500, padding:0, background:"#0D0D0F", border:"1px solid #1E1E24", overflow:"hidden"}} onClick={e=>e.stopPropagation()} className="dropIn">
        <div id="report-area" style={{padding:24, background:"#0D0D0F"}}>
          <div style={{display:"flex", flexDirection:"column", alignItems:"center", textAlign:"center", marginBottom:30}}>
            <div style={{color:"#FF6B35", marginBottom:6, transform:"scale(1.5)"}}>{IC.bolt}</div>
            <div style={{fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:900, color:"#FF6B35", letterSpacing:1, marginBottom:16}}>FITFORGE</div>
            <h2 style={{...s.modalTitle, margin:0, fontSize:24}}>Wochenbericht KW {report.wn}</h2>
            <div style={{fontSize:13, color:"#666", marginTop:4}}>{report.dateRange} {report.yr}</div>
          </div>
          
          <div style={{display:"flex", gap:8, marginBottom:24}}>
            {WDS.map(day => {
              const active = daysTrained.includes(day);
              return (
                <div key={day} style={{
                  flex:1, height:40, borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:12, fontWeight:800, color:active?"#000":"#444", 
                  background:active?"#00D9C0":"#161618",
                  border:active?"none":"1px solid #1E1E24"
                }}>
                  {day}
                </div>
              );
            })}
          </div>

          <div style={{display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:8, marginBottom:24}}>
            {[
              [totalW, "Workouts", "#FF6B35"],
              [`${totalD}m`, "Gesamtzeit", "#00D9C0"],
              [`${Math.round(totalVol/1000)}k`, "Volumen (kg)", "#A78BFA"],
              [`${Math.floor(totalHiitSec/60)}m`, "HIIT Zeit", "#FFD166"]
            ].map(([v,l,c], i) => (
              <div key={i} style={{background:"#161618", padding:"12px 4px", borderRadius:16, textAlign:"center", border:"1px solid #1E1E24"}}>
                <div style={{fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:800, color:c}}>{v}</div>
                <div style={{fontSize:8, color:"#666", marginTop:4, textTransform:"uppercase", fontWeight:700}}>{l}</div>
              </div>
            ))}
          </div>

          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:24}}>
             <div>
               <h3 style={{fontSize:11, fontWeight:800, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:12}}>Trainingseinheiten</h3>
               <div style={{display:"flex", flexDirection:"column", gap:6}}>
                 {Object.entries(planCounts).map(([name, count]) => (
                   <div key={name} style={{fontSize:12, fontWeight:600, color:"#F0EDE8", background:"#161618", padding:"6px 10px", borderRadius:8, display:"flex", justifyContent:"space-between"}}>
                     <span>{name}</span>
                     <span style={{color:"#FF6B35"}}>{count}x</span>
                   </div>
                 ))}
               </div>
             </div>
             <div>
               <h3 style={{fontSize:11, fontWeight:800, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:12}}>Muskelgruppen</h3>
               <div style={{display:"flex", flexDirection:"column", gap:10}}>
                 {sortedMuscles.slice(0, 4).map(([name, count]) => (
                   <div key={name}>
                     <div style={{display:"flex", justifyContent:"space-between", fontSize:10, fontWeight:700, marginBottom:4}}>
                       <span style={{color:"#888"}}>{name}</span>
                       <span style={{color:"#00D9C0"}}>{count}x</span>
                     </div>
                     <div style={{height:4, background:"#1A1A1F", borderRadius:2, overflow:"hidden"}}>
                       <div style={{height:"100%", width:`${(count/maxMuscle*100)}%`, background:"#00D9C0", borderRadius:2}} />
                     </div>
                   </div>
                 ))}
               </div>
             </div>
          </div>
        </div>

        <div style={{display:"flex", gap:12, padding:20, background:"#161618", borderTop:"1px solid #1E1E24"}}>
          <button style={{...s.secBtn, flex:1, padding:14, fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", gap:8}} onClick={exportImage}>
            {IC.camera} Bild exportieren
          </button>
          <button style={{...s.primaryBtn, flex:1, padding:14, fontSize:13}} onClick={onClose}>
            Schließen
          </button>
        </div>
      </div>
    </div>
  );
}
function PhotoDetailModal({photo, onClose, isMobile}) {
  const [zoom, setZoom] = useState(1);
  const [pos, setPos] = useState({x:0, y:0});
  const [dragging, setDragging] = useState(false);
  const [start, setStart] = useState({x:0, y:0});
  const [initialDist, setInitialDist] = useState(null);

  const handleZoom = (delta) => {
    setZoom(prev => {
      const next = Math.min(Math.max(prev + delta, 1), 5);
      if (next === 1) setPos({x:0, y:0});
      return next;
    });
  };

  const handleStart = (e) => {
    if (e.touches && e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      setInitialDist(dist);
    } else {
      if (zoom <= 1) return;
      setDragging(true);
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      setStart({x: clientX - pos.x, y: clientY - pos.y});
    }
  };

  const handleMove = (e) => {
    if (e.touches && e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (initialDist) {
        const delta = (dist - initialDist) / 150;
        handleZoom(delta);
        setInitialDist(dist);
      }
    } else if (dragging) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      setPos({x: clientX - start.x, y: clientY - start.y});
    }
  };

  const handleEnd = () => {
    setDragging(false);
    setInitialDist(null);
  };

  const handleWheel = (e) => {
    if (e.ctrlKey) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.2 : 0.2;
      handleZoom(delta);
    }
  };

  useEffect(() => {
    const el = document.getElementById("photoWrapper");
    if (el) el.addEventListener("wheel", handleWheel, { passive: false });
    return () => { if (el) el.removeEventListener("wheel", handleWheel); };
  }, [zoom]);

  return (
    <div style={s.overlay2} onClick={e => e.target === e.currentTarget && onClose()} onMouseMove={handleMove} onMouseUp={handleEnd} onTouchMove={handleMove} onTouchEnd={handleEnd}>
      <div style={{position:"absolute", top:24, right:24, display:"flex", gap:12, zIndex:120}}>
        <button style={{...s.iconCircle, background:"rgba(0,0,0,0.6)", border:"1px solid rgba(255,255,255,0.1)", width:44, height:44, color:"#fff"}} onClick={() => handleZoom(0.5)}>{IC.plus}</button>
        <button style={{...s.iconCircle, background:"rgba(0,0,0,0.6)", border:"1px solid rgba(255,255,255,0.1)", width:44, height:44, color:"#fff"}} onClick={() => handleZoom(-0.5)}>{IC.minus}</button>
        <button style={{...s.iconCircle, background:"#EF476F", border:"none", color:"#fff", marginLeft:8, width:44, height:44, boxShadow:"0 4px 12px rgba(239,71,111,0.3)"}} onClick={onClose}>{IC.x}</button>
      </div>
      
      <div id="photoWrapper" style={{width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", cursor: zoom > 1 ? "grab" : "default"}}
           onMouseDown={handleStart} onTouchStart={handleStart}>
        <img 
          src={photo.url} 
          style={{
            maxWidth:"95%", 
            maxHeight:"95%", 
            objectFit:"contain", 
            transform: `translate(${pos.x}px, ${pos.y}px) scale(${zoom})`,
            transition: dragging ? "none" : "transform 0.2s cubic-bezier(0.16,1,0.3,1)",
            boxShadow: "0 20px 50px rgba(0,0,0,0.5)",
            borderRadius: 8
          }} 
          draggable="false"
        />
      </div>
      
      <div style={{position:"absolute", bottom:30, left:"50%", transform:"translateX(-50%)", background:"rgba(0,0,0,0.6)", backdropFilter:"blur(8px)", padding:"12px 24px", borderRadius:20, textAlign:"center", color:"#fff"}}>
        <div style={{fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15}}>{fmtDate(photo.date)}</div>
        <div style={{fontSize:11, color:"#FF6B35", fontWeight:700, textTransform:"uppercase", marginTop:2}}>{photo.tag}</div>
      </div>
    </div>
  );
}

function ProfilePage({user,setUser,notify}){
  const [form,setForm]=useState({...user});
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef();

  const handleAv=async e=>{
    const f=e.target.files[0];
    if(!f)return;
    setUploading(true);
    try{
      const url=await uploadToStorage(f,`avatar/${Date.now()}_${f.name}`);
      setForm(prev=>({...prev,avatar:url}));
      notify("Profilbild hochgeladen! 📸");
    }catch{
      // fallback to base64
      readFile(f).then(d=>setForm(prev=>({...prev,avatar:d})));
    }
    setUploading(false);
  };

  const save=()=>{setUser(form);notify("Profil gespeichert! ✅");};

  return(<div style={s.page}><div style={s.pageHead}><div><h1 style={s.pageTitle}>Mein Profil</h1><p style={s.pageSub}>Daten & Einstellungen</p></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
