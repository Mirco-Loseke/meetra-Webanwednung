<script>
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyBHcrBR0fWYVDkdWWAoVfvMEaN0CeoB52M",
      authDomain: "mircos-app.firebaseapp.com",
      projectId: "mircos-app",
      storageBucket: "mircos-app.firebasestorage.app",
      messagingSenderId: "192709665118",
      appId: "1:192709665118:web:73e2bb1c9bc552bbbf2fcf"
    };

    firebase.initializeApp(firebaseConfig);
    const _auth = firebase.auth();
    const _db   = firebase.firestore();
    const _stor = firebase.storage();

    // Auth helpers
    window.firebaseAuth = _auth;
    window.firebaseCreateUser = (auth, email, pw) => _auth.createUserWithEmailAndPassword(email, pw);
    window.firebaseSignIn    = (auth, email, pw) => _auth.signInWithEmailAndPassword(email, pw);
    window.firebaseSignOut   = () => _auth.signOut();
    window.firebaseUpdateProfile = (user, data) => user.updateProfile(data);
    window.firebaseOnAuthStateChanged = (cb) => _auth.onAuthStateChanged(cb);

    // Firestore helpers
    window.firebaseDb  = _db;
    window.firebaseDoc = (db, ...path) => {
      let ref = _db;
      for(let i=0; i<path.length; i++){
        ref = i%2===0 ? ref.collection(path[i]) : ref.doc(path[i]);
      }
      return ref;
    };
    window.firebaseGetDoc = (ref) => ref.get().then(snap => ({
      exists: () => snap.exists === true,
      data:   () => snap.data() || {}
    }));
    window.firebaseSetDoc = (ref, data) => ref.set(data);
    window.firebaseOnSnapshot = (ref, cb, err) => ref.onSnapshot(cb, err);

    // Storage helpers
    window.firebaseStorage        = _stor;
    window.firebaseRef            = (stor, path) => _stor.ref(path);
    window.firebaseUploadBytes    = (ref, file) => ref.put(file);
    window.firebaseGetDownloadURL = (ref) => ref.getDownloadURL();
    window.firebaseDeleteObject   = (ref) => ref.delete();

    // Signal ready
    window.firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
    if(window.dbg) dbg('✅ Firebase bereit!', '#0f0');
  } catch(e) {
    console.warn("Firebase init failed:", e.message);
    if(window.dbg) dbg('❌ Firebase Fehler: ' + e.message, '#f55');
    window.firebaseReady = false;
  }
</script>

<div id="fb-debug-container">
  <button id="fb-debug-toggle" onclick="toggleDebug()">

  </button>
  <div id="fb-debug"></div>
</div>

<script>
  function toggleDebug() {
    const c = document.getElementById('fb-debug-container');
    const a = document.getElementById('debug-arrow');
    c.classList.toggle('collapsed');
    a.textContent = c.classList.contains('collapsed') ? '▲' : '▼';
  }
  const dbg = (msg, color) => {
    const d = document.getElementById('fb-debug');
    if(d){ 
      const line = document.createElement('div'); 
      line.style.color = color||'#0f0'; 
      line.style.paddingBottom = '2px';
      line.textContent = new Date().toLocaleTimeString() + ' » ' + msg; 
      d.appendChild(line); 
      if (!document.getElementById('fb-debug-container').classList.contains('collapsed')) {
        d.scrollTop=d.scrollHeight; 
      }
    }
    console.log(msg);
  };
  window.dbg = dbg;
  window.onerror = (msg,src,line,col,err) => {
    dbg('JS ERROR: '+msg+' ('+src+':'+line+':'+col+')', '#f55');
    if(err && err.stack) dbg('STACK: '+err.stack.split('\n').slice(0,3).join(' | '), '#f88');
    return false;
  };
  window.addEventListener('unhandledrejection', e => {
    dbg('PROMISE ERROR: '+(e.reason?.message||e.reason||'unbekannt'), '#f55');
    if(e.reason?.stack) dbg('STACK: '+e.reason.stack.split('\n').slice(0,3).join(' | '), '#f88');
  });
  dbg('Seite geladen - warte auf Firebase...');
</script>
<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef } = React;

const MediaDisplay = ({src, style, className, onClick}) => {
  if (!src) return null;
  const isVideo = src.toLowerCase().includes("video") || src.toLowerCase().endsWith(".mp4") || src.toLowerCase().endsWith(".webm") || src.toLowerCase().endsWith(".mov") || src.startsWith("data:video");
  if (isVideo) {
    return (
      <video src={src} style={style} className={className} onClick={onClick} autoPlay muted loop playsInline />
    );
  }
  return <img src={src} style={style} className={className} onClick={onClick} loading="lazy" />;
};

// ── Firebase helpers (user-scoped) ────────────────────────────────────────────
const getUid = () => window.firebaseAuth?.currentUser?.uid || null;

const fbGet = async (key, fallback) => {
  try {
    const uid = getUid();
    if (window.firebaseDb && uid) {
      const snap = await window.firebaseGetDoc(window.firebaseDoc(window.firebaseDb, "fitforge", `${uid}_${key}`));
      if (snap.exists()) {
        const val = snap.data().value;
        localStorage.setItem(`ff_${uid}_${key}`, JSON.stringify(val));
        return val;
      }
    }
    // Only fallback to user-specific localStorage, NEVER to global ff_ keys
    const r = uid ? localStorage.getItem(`ff_${uid}_${key}`) : null;
    return r ? JSON.parse(r) : fallback;
  } catch (e) {
    const uid = getUid();
    const r = uid ? localStorage.getItem(`ff_${uid}_${key}`) : null;
    return r ? JSON.parse(r) : fallback;
  }
};

const fbSet = async (key, value) => {
  try {
    const uid = getUid();
    if (uid) localStorage.setItem(`ff_${uid}_${key}`, JSON.stringify(value));
    else localStorage.setItem("ff_" + key, JSON.stringify(value));

    if (window.firebaseDb && uid) {
      await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "fitforge", `${uid}_${key}`), { value });
    }
  } catch(e) { 
    console.error("fbSet error:", e);
    if(window.dbg) dbg(`❌ Cloud-Speicher Fehler: ${e.message}`, '#f55');
  }
};

// Firebase Storage upload – returns download URL (falls back to base64)
const uploadToStorage = async (file, path) => {
  try {
    const uid = getUid();
    if (!window.firebaseStorage || !uid) throw new Error("Storage not ready or not signed in");
    const fullPath = `fitforge/${path}`;
    const storageRef = window.firebaseRef(window.firebaseStorage, fullPath);
    await window.firebaseUploadBytes(storageRef, file);
    return await window.firebaseGetDownloadURL(storageRef);
  } catch(e) {
    console.warn("Storage upload fallback to base64:", e.message);
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.readAsDataURL(file);
    });
  }
};

// Delete from Storage
const deleteFromStorage = async (path) => {
  try {
    const uid = getUid();
    if (!window.firebaseStorage || !uid) return;
    const storageRef = window.firebaseRef(window.firebaseStorage, `fitforge/${uid}/${path}`);
    await window.firebaseDeleteObject(storageRef);
  } catch(e) { console.warn("deleteFromStorage:", e.message); }
};

let audioCtx = null;
const playBeep = (freq, duration, vol=0.1) => {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) { console.warn("Beep failed", e); }
};

function HiitTimer({duration, onFinish, isMobile, controlledTime, controlledActive}){
  const [internalTime, setInternalTime] = useState(duration);
  const [internalActive, setInternalActive] = useState(false);
  const itv = useRef();

  const timeLeft = controlledTime !== undefined ? controlledTime : internalTime;
  const active = controlledActive !== undefined ? controlledActive : internalActive;

  useEffect(() => {
    if (controlledTime !== undefined) return; // Prop-driven, skip internal logic
    if(active && timeLeft > 0){
      itv.current = setInterval(() => {
        setInternalTime(t => {
          const next = t - 1;
          if(next === 0) { 
            playBeep(880, 0.6, 0.4);
            clearInterval(itv.current);
            setInternalActive(false);
            if(onFinish) onFinish();
            return 0;
          }
          if(next <= 3) playBeep(660, 0.15, 0.2);
          return next;
        });
      }, 1000);
    } else {
      clearInterval(itv.current);
    }
    return () => clearInterval(itv.current);
  }, [active, controlledTime]);

  const toggle = () => {
    if (controlledTime !== undefined) return; // Prop-driven
    if(!active) {
      if(timeLeft <= 0) setInternalTime(duration);
      playBeep(440, 0.2, 0.2);
      setInternalActive(true);
    } else {
      setInternalActive(false);
    }
  };

  return (
    <div className="hiit-glow" style={{background:"#111114", border:"2px solid #FFD166", borderRadius:24, padding: isMobile ? 16 : 24, display:"flex", flexDirection:"column", gap: 14, width:"100%", textAlign:"center", marginBottom: 12}}>
      <div style={{fontSize: 9, fontWeight: 900, color: "#FFD166", textTransform:"uppercase", letterSpacing: 2, opacity: 0.7}}>HIIT Interval</div>
      <div style={{display:"flex", justifyContent:"center", alignItems:"baseline", gap:6, margin: "4px 0"}}>
        <div style={{fontFamily:"'Syne',sans-serif", fontSize: isMobile ? 54 : 64, fontWeight:800, color:"#FFD166", letterSpacing:-2, textShadow: "0 0 15px rgba(255, 209, 102, 0.3)"}}>
          {timeLeft}
        </div>
        <div style={{fontSize:14, fontWeight:800, color:"#FFD166", opacity: 0.5}}>SEK</div>
      </div>
      {controlledTime === undefined && (
        <div style={{display:"flex", gap:10}}>
          <button 
            style={{flex:1, height: 44, background: active ? "rgba(239, 71, 111, 0.1)" : "rgba(255, 209, 102, 0.1)", border: `2px solid ${active ? "#EF476F" : "#FFD166"}`, color: active ? "#EF476F" : "#FFD166", fontWeight:900, borderRadius:12, cursor:"pointer", fontSize: 13, transition: "0.2s"}}
            onClick={toggle}
          >
            {active ? "PAUSE" : "START"}
          </button>
        </div>
      )}
    </div>
  );
}

let _chartId=0;
function LineChart({points,color="#FF6B35",height=80}){
  const id=useRef(`lc${++_chartId}`).current;
  if(!points||points.length<2)return<div style={{color:"#555",fontSize:13,padding:"20px 0",textAlign:"center"}}>Noch nicht genug Daten</div>;
  const W=500,H=height,pad=12,padBottom=20;
  const vals=points.map(v=>isFinite(v)?v:0);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,current=vals[vals.length-1];
  
  const yPad = rng * 0.2; // 20% headroom
  const effMin = mn - yPad;
  const effMax = mx + yPad;
  const effRng = effMax - effMin || 1;

  const xs=vals.map((_,i)=>pad+(i/(vals.length-1))*(W-pad*2));
  const ys=vals.map(v=>H-pad-6-((v-effMin)/effRng)*(H-pad*2-6));
  const d=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area=`${d} L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  return(
    <div style={{width:"100%",height:H,position:"relative", marginBottom: 10}}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{overflow:"visible"}}>
        <defs>
          <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.4"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={area} fill={`url(#${id})`} />
        <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        
        {/* Value Labels & Dots */}
        {vals.map((v,i)=>(
          <g key={i}>
            <circle cx={xs[i]} cy={ys[i]} r="3" fill={color}/>
            <text x={xs[i]} y={ys[i]-8} textAnchor="middle" style={{fontSize:8, fill:"#888", fontWeight:700}}>{v.toFixed(1)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}
function BarChart({bars,color="#FF6B35",height=90}){
  if(!bars||!bars.length)return null;
  const W=500,H=height,pad=4,gap=6;
  const mx=Math.max(...bars.map(b=>b.v),1);
  const bw=(W-pad*2-gap*(bars.length-1))/bars.length;
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",height:H+20,display:"block"}}>
      {bars.map((b,i)=>{
        const bh=b.v>0?Math.max((b.v/mx)*(H-pad),4):0;
        const x=pad+i*(bw+gap),y=H-bh;
        return(<g key={i}><rect x={x} y={y} width={bw} height={bh} rx="4" fill={color} opacity="0.82"/><text x={x+bw/2} y={H+15} textAnchor="middle" fontSize="11" fill="#555">{b.l}</text></g>);
      })}
    </svg>
  );
}
function DonutChart({value,max,color="#FF6B35",size=80,label=""}){const r=30,circ=2*Math.PI*r,pct=Math.min(value/Math.max(max,1),1),dash=pct*circ;return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><svg width={size} height={size} viewBox="0 0 80 80"><circle cx="40" cy="40" r={r} fill="none" stroke="#1E1E24" strokeWidth="8"/><circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform="rotate(-90 40 40)" style={{transition:"stroke-dasharray 0.5s"}}/><text x="40" y="44" textAnchor="middle" fontSize="12" fontWeight="800" fill="#F0EDE8" fontFamily="Syne,sans-serif">{Math.round(pct*100)}%</text></svg>{label&&<div style={{fontSize:10,color:"#666",textAlign:"center",maxWidth:70}}>{label}</div>}</div>);}

const ls = (k, df) => { try { const r = localStorage.getItem("ff_" + k); const p = r ? JSON.parse(r) : null; return p !== null ? p : df; } catch { return df; } };

function FitForge(){
  const [view,setView]=useState("dashboard");
  const [data,setData]=useState(()=>ls("data", defaultData));
  const [user,setUser]=useState(()=>ls("user", defaultUser));
  const [prs,setPrs]=useState(()=>ls("prs", defaultPRs));
  const [nutrition,setNutrition]=useState(()=>ls("nutrition", {}));
  const [library,setLibrary]=useState(()=>ls("library", []));
  const [weekPlans,setWeekPlans]=useState(()=>ls("weekPlans", {}));
  const [favFoods,setFavFoods]=useState(()=>ls("favFoods", []));
  
  const [authUser,setAuthUser]=useState(null);
  const [isMobile,setIsMobile]=useState(window.innerWidth<=1024);
  const [sidebarOpen,setSidebarOpen]=useState(window.innerWidth>1024);

  const [authLoading,setAuthLoading]=useState(true);
  const [loaded,setLoaded]=useState(false);
  const [animK,setAnimK]=useState(0);
  const [logModal,setLogModal]=useState(false);
  const [planModal,setPlanModal]=useState(false);
  const [editPlan,setEditPlan]=useState(null);
  const [selWO,setSelWO]=useState(null);
  const [notifs,setNotifs]=useState([]);
  const [profileOpen,setProfileOpen]=useState(false);
  const [notifOpen,setNotifOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [showLoadingUI, setShowLoadingUI] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [weeklyReport, setWeeklyReport] = useState(null);
  
  // ── Active Workout Global State ───────────────────────────────────────────
  const [activeWorkout, setActiveWorkout] = useState(() => ls("active_workout", null));
  // Sync active workout to local storage
  useEffect(() => {
    if (activeWorkout) localStorage.setItem("ff_active_workout", JSON.stringify(activeWorkout));
    else localStorage.removeItem("ff_active_workout");
  }, [activeWorkout]);

  // Global Timer Loop for the active workout
  useEffect(() => {
    let itv;
    if (activeWorkout && activeWorkout.running && activeWorkout.step === 2) {
      const start = Date.now() - (activeWorkout.timer * 1000);
      itv = setInterval(() => {
        const nextSecs = Math.floor((Date.now() - start) / 1000);
        setActiveWorkout(prev => {
          if(!prev || !prev.running) return prev;
          if(prev.timer === nextSecs) return prev; // prevent unnecessary re-renders
          return {...prev, timer: nextSecs};
        });
      }, 1000);
    }
    return () => clearInterval(itv);
  }, [activeWorkout?.running, activeWorkout?.step]);
  const hasCachedData = data !== defaultData || library.length > 0 || Object.keys(prs).length > 2 || Object.keys(nutrition).length > 0;

  const syncCloud = async () => {
    if(!authUser) return;
    showToast("Synchronisierung läuft...", "info");
    try {
        const [d,u,p,n,lib,wp] = await Promise.all([
          fbGet("data", defaultData),
          fbGet("user", defaultUser),
          fbGet("prs",  defaultPRs),
          fbGet("nutrition", {}),
          fbGet("library", []),
          fbGet("weekPlans", {}),
        ]);
        setData(d); setUser(u); setPrs(p); setNutrition(n); setLibrary(lib); setWeekPlans(wp);
        setLastSync(new Date());
        showToast("Synchronisierung erfolgreich! 🔄");
    } catch(e) {
        showToast("Sync-Fehler: " + e.message, "error");
    }
  };

  useEffect(() => {
    if (authLoading) {
      const t = setTimeout(() => setShowLoadingUI(true), 600);
      return () => clearTimeout(t);
    } else {
      setShowLoadingUI(false);
    }
  }, [authLoading]);



  const [clk,setClk]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setClk(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{
    const handleResize=()=>{
      const mobile=window.innerWidth<=1024;
      setIsMobile(mobile);
      if(!mobile)setSidebarOpen(true);
    };
    window.addEventListener("resize",handleResize);
    return ()=>window.removeEventListener("resize",handleResize);
  },[]);

  // Data is loaded from LocalStorage immediately to show something to the user.
  // 'loaded' will be set to true only when we've established a real-time connection with Firestore.


  const lastSyncRef = useRef({});

  // ── Auth state listener & Real-time Listeners ─────────────────────────────
  useEffect(() => {
    let unsubs = [];
    let cancelled = false;

    const setupListeners = (fbUser) => {
      if (cancelled) return;
      setAuthUser(fbUser);
      setAuthLoading(false);

      if (fbUser) {
        const uid = fbUser.uid;
        if (window.dbg) dbg('👤 Nutzer eingeloggt: ' + fbUser.email, '#0f0');
        
        lastSyncRef.current = {};

        const privateKeys = [
          { key: "data", setter: setData, df: defaultData },
          { key: "user", setter: setUser, df: defaultUser },
          { key: "prs", setter: setPrs, df: defaultPRs },
          { key: "nutrition", setter: setNutrition, df: {} },
          { key: "weekPlans", setter: setWeekPlans, df: {} },
          { key: "favFoods", setter: setFavFoods, df: [] }
        ];

        // 1. Initial State Sync: Load user-specific cache OR Reset immediately
        privateKeys.forEach(({ key, setter, df }) => {
          const local = localStorage.getItem(`ff_${uid}_${key}`);
          if (local) {
             const parsed = JSON.parse(local);
             lastSyncRef.current[key] = local;
             setter(parsed);
          } else {
             // CRITICAL: If no cache for THIS user, clear any previous user's data
             setter(df);
             lastSyncRef.current[key] = JSON.stringify(df);
          }
        });

        // 2. Setup Private Realtime Listeners
        privateKeys.forEach(({ key, setter, df }) => {
          const ref = window.firebaseDoc(window.firebaseDb, "fitforge", `${uid}_${key}`);
          const unsub = window.firebaseOnSnapshot(ref, (snap) => {
            if (cancelled) return;
            if (snap.exists) {
              const cloudVal = snap.data().value;
              const cloudStr = JSON.stringify(cloudVal);
              if (cloudStr !== lastSyncRef.current[key]) {
                localStorage.setItem(`ff_${uid}_${key}`, cloudStr);
                lastSyncRef.current[key] = cloudStr;
                setter(cloudVal);
              }
            } else {
              // CRITICAL: Document does not exist in cloud (new user)
              // We must ensure the state is empty/default for this user.
              if (window.dbg) dbg(`ℹ️ ${key} leer in Cloud (Neuer Account)`, '#aaa');
              setter(df);
              lastSyncRef.current[key] = JSON.stringify(df);
              localStorage.removeItem(`ff_${uid}_${key}`);
            }
          });
          unsubs.push(unsub);
        });
      } else {
        if (window.dbg) dbg('🚪 Nutzer ausgeloggt', '#ff0');
        setLoaded(false);
        unsubs.forEach(fn => fn());
        unsubs = [];
        // Reset private state on logout
        setData(defaultData);
        setUser(defaultUser);
        setPrs(defaultPRs);
        setNutrition({});
        setWeekPlans({});
        setFavFoods([]);
        lastSyncRef.current = {};
      }

      // ── Shared Library Listener (Always active) ───────────────────────────
      const libRef = window.firebaseDoc(window.firebaseDb, "fitforge", "shared_library");
      const libUnsub = window.firebaseOnSnapshot(libRef, (snap) => {
        if (cancelled) return;
        if (snap.exists) {
            const libVal = snap.data().value;
            const libStr = JSON.stringify(libVal);
            if (libStr !== lastSyncRef.current["library"]) {
              if (window.dbg) dbg('📚 Gemeinsame Bibliothek geladen', '#0ff');
              localStorage.setItem("ff_library", libStr);
              lastSyncRef.current["library"] = libStr;
              setLibrary(libVal);
            }
        }
        if (!loaded && fbUser) setLoaded(true); // Signal ready when library is fetched
      }, (err) => {
        if (window.dbg) dbg('❌ Library Fehler: ' + err.message, '#f55');
        if (!loaded && fbUser) setLoaded(true);
      });
      unsubs.push(libUnsub);
    };

    const attachAuth = () => {
      if (cancelled) return;
      if (window.firebaseOnAuthStateChanged) {
        window.firebaseOnAuthStateChanged(setupListeners);
      } else {
        setTimeout(attachAuth, 100);
      }
    };

    const onReady = () => attachAuth();
    window.addEventListener('firebaseReady', onReady);
    if (window.firebaseReady) attachAuth();

    // Safety timeout: if after 15 seconds still no snapshots, assume ready to write
    const t = setTimeout(() => {
      if (!cancelled && authLoading) {
        setAuthLoading(false);
      }
      if (!cancelled && !loaded && authUser) {
        if (window.dbg) dbg('⚠️ Sync Timeout - starte Schreibmodus', '#f80');
        setLoaded(true);
      }
    }, 15000);

    return () => {
      cancelled = true;
      window.removeEventListener('firebaseReady', onReady);
      clearTimeout(t);
      unsubs.forEach(fn => fn());
    };
  }, []);

  // ── Sync to Firestore on local change (debounced) ────────────────────────
  const debRef = useRef({});
  const syncToCloud = (key, val) => {
    if (!authUser || !loaded) return;
    const valStr = JSON.stringify(val);
    
    // VERY IMPORTANT: Skip if this change just came FROM the cloud
    if (valStr === lastSyncRef.current[key]) return;

    clearTimeout(debRef.current[key]);
    debRef.current[key] = setTimeout(() => {
      if (window.dbg) dbg(`📤 Synchronisiere ${key}...`, '#ff0');
      fbSet(key, val).then(() => {
        // We set the ref AFTER the write initiated to ensure it matches incoming snapshots
        lastSyncRef.current[key] = valStr;
      });
    }, 300);
  };

  useEffect(() => { syncToCloud("data", data); }, [data, loaded]);
  useEffect(() => { syncToCloud("user", user); }, [user, loaded]);
  useEffect(() => { syncToCloud("prs", prs); }, [prs, loaded]);
  useEffect(() => { syncToCloud("nutrition", nutrition); }, [nutrition, loaded]);
  useEffect(() => { 
    // Library sync is shared
    if (!authUser || !loaded) return;
    const valStr = JSON.stringify(library);
    if (valStr === lastSyncRef.current["library"]) return;
    clearTimeout(debRef.current["library"]);
    debRef.current["library"] = setTimeout(() => {
      if (window.dbg) dbg(`📤 Synchronisiere shared library...`, '#0ff');
      window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "fitforge", "shared_library"), { value: library }).then(() => {
        lastSyncRef.current["library"] = valStr;
      });
    }, 500);
  }, [library, loaded]);
  useEffect(() => { syncToCloud("weekPlans", weekPlans); }, [weekPlans, loaded]);
  useEffect(() => { syncToCloud("favFoods", favFoods); }, [favFoods, loaded]);

  useEffect(()=>{setAnimK(k=>k+1);},[view]);
  useEffect(()=>{
    const gen=genNotifs(data,user);
    const stored=notifs.length?notifs:[];
    const ids=new Set(stored.map(n=>n.id));
    const merged=[...gen.filter(g=>!ids.has(g.id)),...stored].slice(0,20);
    setNotifs(merged);
  },[data.plans.length,data.workouts.length]);

  const unread=notifs.filter(n=>!n.read).length;
  const markAll=()=>setNotifs(n=>n.map(x=>({...x,read:true})));
  const markRead=id=>setNotifs(n=>n.map(x=>x.id===id?{...x,read:true}:x));
  const delNotif=id=>setNotifs(n=>n.filter(x=>x.id!==id));

  // ── Migration: Ausdauertraining -> Entspannung ──────────────────────────
  useEffect(() => {
    if (loaded && library && library.some(ex => (ex.types||[]).includes("Ausdauertraining"))) {
      if (window.dbg) dbg("🔄 Migriere Übungen: Ausdauertraining -> Entspannung", "#A78BFA");
      setLibrary(current => current.map(ex => ({
        ...ex,
        types: (ex.types||[]).map(t => t === "Ausdauertraining" ? "Entspannung" : t)
      })));
    }
  }, [library, loaded]);
  
  // ── Migration: Körpergewicht -> Gewichtshistorie ────────────────────────
  useEffect(() => {
    if (loaded && user.weight && (!data.weightHistory || data.weightHistory.length === 0)) {
       const val = parseFloat(user.weight);
       if (!isNaN(val)) {
         if (window.dbg) dbg("🔄 Migration: Körpergewicht in Historie übertragen", "#06D6A0");
         setData(d => ({...d, weightHistory: [{ date: todayStr(), value: val }]}));
       }
    }
  }, [loaded, user.weight]);

  if(showLoadingUI) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0D0D0F",flexDirection:"column",gap:16}}>
      <div style={{width:44,height:44,border:"3px solid #FF6B35",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:"#F0EDE8",fontSize:16,fontWeight:700,fontFamily:"'Syne',sans-serif",letterSpacing:"0.5px"}}>FitForge wird geladen...</div>
      <div style={{color:"#444",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>Sichere Verbindung wird hergestellt...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
    </div>
  );


  if(authLoading) return null;

  // ── Not authenticated – show login screen ─────────────────────────────────
  if(!authUser) return <AuthScreen />;

  // Note: 'loaded' now mainly signifies that the FIRST sync with Cloud is done.
  // Since we use Fast Load (LocalStorage), we can show the app even if loaded is false,
  // OR we show a subtle indicator. Let's show the app immediately if we have cached data.

  
  if(!loaded && !hasCachedData && authUser) return (
     <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0D0D0F",flexDirection:"column",gap:16}}>
        <div style={{width:44,height:44,border:"3px solid #FF6B35",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
        <div style={{color:"#F0EDE8",fontSize:16,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>Synchronisierung...</div>
        <div style={{color:"#444",fontSize:12}}>Deine Daten werden abgerufen</div>
     </div>
  );


  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const p=n=>String(n).padStart(2,"0");
  const WN=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
  const clkStr=WN[clk.getDay()]+" "+p(clk.getDate())+"."+p(clk.getMonth()+1)+"."+clk.getFullYear()+" | "+p(clk.getHours())+":"+p(clk.getMinutes())+":"+p(clk.getSeconds());
  const closeAll=()=>{setProfileOpen(false);setNotifOpen(false);};
  const activeEx = activeWorkout && activeWorkout.curEx !== undefined ? activeWorkout.exercises[activeWorkout.curEx] : null;
  const fmtTimer=t=>{const m=Math.floor(t/60),s=t%60;return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;};
  const totalVol=data.workouts.reduce((a,w)=>a+(w.exercises||[]).reduce((b,e)=>b+(e.isHiit?0:(e.sets||[]).reduce((c,s)=>c+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0)),0),0);
  const thisWeek=data.workouts.filter(w=>new Date(w.date)>=new Date(Date.now()-7*864e5));
  const streak=Math.min(thisWeek.length,7);
  const savePR=(exName,weight,reps)=>{const k=exName.toLowerCase().trim(),ex=prs[k],nv=weight*reps,ov=ex?(ex.weight*ex.reps):0;if(nv>ov){setPrs(p=>({...p,[k]:{name:exName,weight,reps,date:todayStr()}}));showToast(`🏆 Neuer PR: ${exName} – ${weight}kg × ${reps}!`);}};
  const getPR=n=>prs[n.toLowerCase().trim()];
  const today=todayStr();
  const todayNut = nutrition[today] || {calories:0,protein:0,carbs:0,fat:0,meals:[]};

  return (
    <div style={s.root}><style>{css}</style>

      {isMobile && sidebarOpen && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)",zIndex:95}} onClick={()=>setSidebarOpen(false)}/>}
      <aside style={{...s.sidebar, transform: sidebarOpen ? "translateX(0)" : "translateX(-100%)", transition: "transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)"}}>
        <div style={s.logo}><span style={{color:"#FF6B35",display:"flex"}}>{IC.bolt}</span><span style={s.logoTxt}>FitForge</span></div>
        <nav style={s.nav}>
          {[
            ["dashboard","Dashboard",IC.dashboard],
            ["log","Training starten",IC.log],
            ["plans","Trainingspläne",IC.plans],
            ["wochenplan","Wochenplan",IC.calendar],
            ["history","Verlauf",IC.history],
            ["library","Bibliothek",IC.library],
            ["stats","Statistiken",IC.stats],
            ["fortschritt","Fortschritt",IC.progress],
            ["nutrition","Ernährung",(<NutritionViewIcon favFoods={favFoods} nutrition={nutrition}/>)],
            ["recipes","Rezepte",IC.recipe],
            ["goals","Ziele",IC.goals]
          ].map(([id,label,icon])=>(
            <button key={id} style={{...s.navItem,...(view===id?s.navOn:{})}} onClick={()=>{setView(id);closeAll();if(isMobile)setSidebarOpen(false);}}><span style={{display:"flex",flexShrink:0}}>{icon}</span><span>{label}</span></button>
          ))}
        </nav>
        <div style={{paddingTop:20, display:"flex", flexDirection:"column", gap:10}}>
          <div style={s.streakCard}><span style={{color:"#fff",display:"flex"}}>{IC.fire}</span><div><div style={s.streakN}>{streak} Tage</div><div style={s.streakL}>Diese Woche</div></div></div>
          {lastSync && <div style={{fontSize:10, color:"#444", textAlign:"center", padding:"0 10px"}}>Cloud Sync: {lastSync.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>}
        </div>
      </aside>
      <main style={{...s.main, marginLeft: isMobile ? 0 : 236}}>
        <div style={s.topBar}>
          <div style={{display:"flex",alignItems:"center",gap:12, flex: 1, minWidth: 0}}>
            {isMobile && <button style={{...s.iconCircle, border:"none", background:"transparent", color:"#F0EDE8", flexShrink: 0}} onClick={()=>setSidebarOpen(o=>!o)}>{sidebarOpen ? IC.x : IC.menu}</button>}
            <div style={{...s.topGreet, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", minWidth: 0}}>{user.firstName?`Hey, ${user.firstName}! 👋`:"Hey, Athlet! 👋"}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12, flexShrink: 0}}>
            {!isMobile && <span style={{fontSize:13,fontWeight:600,color:"#F0EDE8",whiteSpace:"nowrap"}}>{clkStr}</span>}
            <div style={{position:"relative"}}>
              <button className="iconBtn" style={{...s.iconCircle,...(notifOpen?s.iconOn:{})}} onClick={()=>{setNotifOpen(o=>!o);setProfileOpen(false);}}>
                {IC.bell}{unread>0&&<span style={s.badge}>{unread}</span>}
              </button>
              {notifOpen&&<div style={{...s.dropdown, width: isMobile ? "min(350px, calc(100vw - 32px))" : 350, right: isMobile ? -10 : 0}} className="dropIn" onClick={e=>e.stopPropagation()}>
                <div style={s.ddHead}><span style={s.ddTitle}>Benachrichtigungen</span>{unread>0&&<button className="markAllBtn" onClick={markAll}>Alle lesen</button>}</div>
                <div style={{maxHeight:320,overflowY:"auto"}}>
                  {!notifs.length&&<div style={{padding:"36px 18px",textAlign:"center",color:"#555",fontSize:13}}>Alles erledigt 🎉</div>}
                  {notifs.map(n=>(<div key={n.id} style={{...s.nRow,...(n.read?{}:s.nRowU)}} className="notifRow" onClick={()=>markRead(n.id)}>
                    <div style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,background:"#1A1A1F"}}>{{training:"💪",reminder:"📅",warning:"⚠️",achievement:"🏆"}[n.type]||"🔔"}</div>
                    <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:12}}>{n.title}</div><div style={{color:"#888",fontSize:11,marginTop:2}}>{n.body}</div><div style={{color:"#555",fontSize:10,marginTop:2}}>{timeAgo(n.ts)}</div></div>
                    {!n.read&&<div style={{width:7,height:7,borderRadius:"50%",background:"#FF6B35",flexShrink:0,marginTop:4}}/>}
                    <button style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",padding:3,display:"flex"}} onClick={e=>{e.stopPropagation();delNotif(n.id);}}>{IC.x}</button>
                  </div>))}
                </div>
                {user.notificationsEnabled&&<div style={{padding:"10px 16px",background:"#0F0F11",borderTop:"1px solid #1E1E24",fontSize:11,color:"#666"}}>🔔 Erinnerungen um {user.reminderTime} Uhr</div>}
              </div>}
            </div>
            <div style={{position:"relative"}}>
              <button style={{...s.avatarBtn,...(profileOpen?s.avatarOn:{})}} onClick={()=>{setProfileOpen(o=>!o);setNotifOpen(false);}}>
                {user.avatar?<img src={user.avatar} alt="av" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={s.initials}>{getInitials(user)}</span>}
              </button>
              {profileOpen&&<div style={{...s.dropdown,width:250}} className="dropIn" onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 18px"}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#FF6B35,#FF8C60)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
                    {user.avatar?<img src={user.avatar} alt="av" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>:<span style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:"#fff"}}>{getInitials(user)}</span>}
                  </div>
                  <div style={{minWidth:0}}><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>{user.firstName||user.lastName?`${user.firstName} ${user.lastName}`.trim():"Kein Name"}</div><div style={{color:"#666",fontSize:11,marginTop:2}}>{user.email||"Keine E-Mail"}</div><div style={{color:"#FF6B35",fontSize:10,fontWeight:600,marginTop:2}}>{user.goal}</div></div>
                </div>
                <div style={{height:1,background:"#1E1E24",margin:"0 16px"}}/>
                <div style={{display:"flex",padding:"12px 16px",gap:14}}>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>{data.workouts.length}</span><span style={{color:"#666",fontSize:10}}>Trainings</span></div>
                  {user.weight&&<div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>{user.weight}kg</span><span style={{color:"#666",fontSize:10}}>Gewicht</span></div>}
                </div>
                <div style={{height:1,background:"#1E1E24",margin:"0 16px"}}/>
                <button className="profEditBtn" style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",color:"#aaa",cursor:"pointer",padding:"12px 16px",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>{setProfileOpen(false);setView("profile");}}>
                  {IC.edit} Profil bearbeiten
                </button>

                <div style={{padding:"8px 16px 6px",fontSize:10,color:"#444",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔑 {authUser?.email}</div>
                <button style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",color:"#EF476F",cursor:"pointer",padding:"10px 16px 14px",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}} onClick={async()=>{setProfileOpen(false);await window.firebaseSignOut();}}>
                  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                  Abmelden
                </button>
              </div>}
            </div>
          </div>
        </div>
        {(profileOpen||notifOpen)&&<div style={s.veil} onClick={closeAll}/>}
        {toast&&<div style={{...s.toast,...(toast.type==="error"?s.toastErr:{})}} className="dropIn">{toast.type==="success"?IC.check:IC.x} {toast.msg}</div>}
        <div key={animK} className="pageEnter">
          {view==="dashboard"&&<Dashboard data={data} user={user} onLog={()=>{setActiveWorkout(null); setView("log");}} onView={setView} streak={streak} totalVol={totalVol} thisWeek={thisWeek} todayNut={todayNut} isMobile={isMobile}/>}
          {view==="plans"&&<Plans data={data} setData={setData} onNew={()=>setPlanModal(true)} onEdit={p=>{setEditPlan(p);setPlanModal(true);}} notify={showToast} library={library}/>}
          {view==="library"&&<LibraryPage library={library} setLibrary={setLibrary} notify={showToast}/>}
          {view==="wochenplan"&&<WochenplanPage weekPlans={weekPlans} setWeekPlans={setWeekPlans} data={data} user={user} library={library} notify={showToast}/>}
          {view==="log"&&<LogWorkout data={data} setData={setData} notify={showToast} prs={prs} onSavePR={savePR} library={library} activeWorkout={activeWorkout} setActiveWorkout={setActiveWorkout} setView={setView} isMobile={isMobile}/>}
          {view==="history"&&<History data={data} setData={setData} selWO={selWO} setSelWO={setSelWO} notify={showToast} library={library} setWeeklyReport={setWeeklyReport} isMobile={isMobile}/>}
          {view==="stats"&&<Stats data={data} prs={prs} nutrition={nutrition} user={user}/>}
          {view==="fortschritt"&&<ProgressPage data={data} setData={setData} user={user} notify={showToast} isMobile={isMobile}/>}
          {view==="nutrition"&&<Nutrition nutrition={nutrition} setNutrition={setNutrition} user={user} notify={showToast} favFoods={favFoods} setFavFoods={setFavFoods} isMobile={isMobile}/>}
          {view==="recipes"&&<RecipesPage notify={showToast} isMobile={isMobile}/>}
          {view==="goals"&&<GoalsPage user={user} setUser={setUser} data={data} notify={showToast} isMobile={isMobile}/>}
          {view==="profile"&&<ProfilePage user={user} setUser={setUser} notify={showToast}/>}
        </div>
      </main>
      {logModal&&<QuickLogModal data={data} setData={setData} onClose={()=>setLogModal(false)} notify={showToast}/>}
      {planModal&&<PlanModal data={data} setData={setData} editPlan={editPlan} library={library} onClose={()=>{setPlanModal(false);setEditPlan(null);}} notify={showToast}/>}
      {weeklyReport&&<WeeklyReportModal report={weeklyReport} onClose={()=>setWeeklyReport(null)} data={data}/>}

      {/* ── Active Workout Floating Preview ───────────────────────────────── */}
      {activeWorkout && view !== 'log' && (
        <div style={{
          position:"fixed",
          bottom:22,
          right:22,
          zIndex:2000,
          background:"#1A1A1F",
          border:"1px solid #FF6B35",
          borderRadius:18,
          padding: "16px 20px",
          display:"flex",
          alignItems:"center",
          gap:14,
          boxShadow:"0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,107,53,0.1)",
          cursor:"pointer",
          backdropFilter:"blur(12px)",
        }} className="dropIn" onClick={()=>setView('log')}>
           <div style={{width:40,height:40,borderRadius:12,background:activeWorkout.running?"#FF6B3520":"#4442",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF6B35"}}>
             {activeWorkout.running ? (
               <div style={{width:16,height:16,border:"3px solid #FF6B35",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
             ) : IC.log}
           </div>
           <div>
             <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
               <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:"#FF6B35",letterSpacing:0.5}}>{fmtTimer(activeWorkout.timer)}</span>
               <span style={{fontSize:10,background:"#FF6B3520",color:"#FF6B35",padding:"1px 6px",borderRadius:6,fontWeight:800}}>{activeWorkout.running?"AKTIV":"PAUSE"}</span>
             </div>
             <div style={{fontSize:11,color:"#F0EDE8",fontWeight:700,maxWidth:140,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
               {activeEx ? activeEx.name : "Workout läuft..."}
             </div>
           </div>
           <div style={{width:32,height:32,borderRadius:"50%",background:"#2A2A30",display:"flex",alignItems:"center",justifyContent:"center",color:"#888",marginLeft:6}}>
             <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M9 5l7 7-7 7"/></svg>
           </div>
        </div>
      )}
    </div>
  );
}
function Dashboard({data,user,onLog,onView,streak,totalVol,thisWeek,todayNut,isMobile}){
  const last=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const today=new Date(),tn=FULL_WEEKDAYS[today.getDay()===0?6:today.getDay()-1];
  const todayPlan=data.plans.find(p=>p.days.includes(tn));
  const calGoal=parseInt(user.calorieGoal)||2500,protGoal=parseInt(user.proteinGoal)||150;
  const tnC = parseInt(todayNut.calories)||0, tnP = parseFloat(todayNut.protein)||0, tnCa = parseFloat(todayNut.carbs)||0, tnF = parseFloat(todayNut.fat)||0;
  return(<div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding}}>
    <div style={{...s.hero, height: isMobile ? 220 : 300, borderRadius: isMobile ? 16 : 20}}>
      <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=800&q=80" alt="gym" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(120deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.3) 100%)"}}/>
      <div style={{position:"absolute",inset:0,padding: isMobile ? 24 : 40,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
        <p style={{color:"rgba(255,255,255,0.7)",margin:"0 0 8px",fontSize: isMobile ? 12 : 14}}>{user.firstName?`Bereit, ${user.firstName}? 🔥`:"Guten Tag 👋"}</p>
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize: isMobile ? 28 : 40,fontWeight:800,margin:"0 0 14px",lineHeight:1.1,color:"#fff"}}>Bereit zum<br/>Trainieren?</h1>
        {todayPlan&&<div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.12)",backdropFilter:"blur(12px)",borderRadius:20,padding:"6px 14px",fontSize: isMobile ? 11 : 13,color:"#fff",marginBottom:18,width:"fit-content"}}><span style={{width:8,height:8,borderRadius:"50%",background:todayPlan.color,display:"inline-block"}}/> Heute: {todayPlan.name}</div>}
        <button style={{...s.heroBtn, padding: isMobile ? "8px 16px" : s.heroBtn.padding, fontSize: isMobile ? 13 : 14}} onClick={onLog}>{IC.plus} Training starten</button>
      </div>
    </div>
    <div style={{...s.statsRow, gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : s.statsRow.gridTemplateColumns}} className={isMobile ? "" : ""}>
      {[[data.workouts.length,"Trainings",IC.dumbbell,"#FF6B35"],[thisWeek.length,"Diese Woche",IC.fire,"#FFD166"],[`${streak}🔥`,"Streak",IC.trophy,"#00D9C0"],[`${Math.round((totalVol||0)/1000)}k kg`,"Volumen",IC.bolt,"#A78BFA"]].map(([v,l,ic,c],i)=>(
        <div key={i} style={{...s.statCard, padding: isMobile ? 12 : 16}} className="statCard">
          <div style={{color:c,display:"flex",marginBottom:8, transform: isMobile ? "scale(0.9)" : "none"}}>{ic}</div>
          <div style={{...s.statV, fontSize: isMobile ? 20 : 24}}>{v}</div>
          <div style={{...s.statL, fontSize: isMobile ? 10 : 11}}>{l}</div>
        </div>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr",gap:18,marginBottom:28}}>
      <div style={s.card}>
        <h2 style={{...s.secTitle,marginBottom:14}}>Diese Woche</h2>
        <div style={s.weekGrid}>{WEEKDAYS.map((day,i)=>{const full=FULL_WEEKDAYS[i],done=thisWeek.some(w=>{const d=new Date(w.date);return(d.getDay()===0?6:d.getDay()-1)===i;}),isToday=(today.getDay()===0?6:today.getDay()-1)===i,hasPlan=data.plans.some(p=>p.days.includes(full));return(<div key={day} style={{...s.dayCell,...(done?s.dayCellDone:{}),...(isToday?s.dayCellToday:{}), padding: isMobile ? "8px 2px" : "10px 4px"}}><span style={{fontSize:9,fontWeight:600,color:"#888"}}>{day}</span>{done&&<span style={{color:"#FF6B35",display:"flex", transform: "scale(0.8)"}}>{IC.check}</span>}{!done&&hasPlan&&<span style={{width:4,height:4,borderRadius:"50%",background:"#333"}}/>}</div>);})}</div>
      </div>
      <div style={s.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h2 style={s.secTitle}>Ernährung heute</h2></div>
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"center", gap: isMobile ? 8 : 0, overflowX: isMobile ? "auto" : "visible", paddingBottom: isMobile ? 8 : 0}}>
          <DonutChart value={tnC} max={calGoal} color="#FF6B35" size={isMobile ? 56 : 68} label={`${tnC} kcal`}/>
          <DonutChart value={tnP} max={protGoal} color="#00D9C0" size={isMobile ? 56 : 68} label={`${Math.round(tnP)}g Prot`}/>
          <DonutChart value={tnCa} max={Math.round(calGoal*0.5/4)} color="#FFD166" size={isMobile ? 56 : 68} label={`${Math.round(tnCa)}g Carb`}/>
          <DonutChart value={tnF} max={Math.round(calGoal*0.3/9)} color="#A78BFA" size={isMobile ? 56 : 68} label={`${Math.round(tnF)}g Fett`}/>
        </div>
      </div>
    </div>
    {last&&(<div><h2 style={s.secTitle}>Letztes Training</h2><div style={s.recentCard} className="recentCard" onClick={()=>onView("history")}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:700}}>{last.name}</div>{last.hiitMode && <div style={{display:"flex",color:"#FFD166"}} className="hiit-glow">{IC.bolt}</div>}</div><div style={{display:"flex",gap:4,color:"#666",fontSize:12,alignItems:"center", flexWrap:"wrap"}}>{IC.clock} {last.duration} Min · {last.exercises.length} Übungen · {fmtDate(last.date)}</div>{last.note&&<div style={{marginTop:8,color:"#aaa",fontSize:12,fontStyle:"italic"}}>„{last.note}"</div>}</div><div style={{fontSize:20,color:"#444", marginLeft: 10}}>→</div></div></div>)}
  </div>);}

const MEASUREMENT_TYPES = ["Bauchumfang (cm)", "Brustumfang (cm)", "Oberarm L (cm)", "Oberarm R (cm)", "Oberschenkel L (cm)", "Oberschenkel R (cm)", "Wade L (cm)", "Wade R (cm)"];

function ProgressPage({data,setData,user,notify,isMobile}){
  const [showAddWeight,setShowAddWeight]=useState(false);
  const [newWeight,setNewWeight]=useState(user.weight||"");
  const [weightDate,setWeightDate]=useState(todayStr());
  const [showUploadPhoto,setShowUploadPhoto]=useState(false);
  const [photoTag,setPhotoTag]=useState("Vorne");
  const [photoDate,setPhotoDate]=useState(todayStr());
  const [compareMode,setCompareMode]=useState(false);
  const [compareIds,setCompareIds]=useState([]);
  const [showAddMeasure,setShowAddMeasure]=useState(false);
  const [measureForm,setMeasureForm]=useState({date:todayStr(), values:{}});
  const [showHistory,setShowHistory]=useState(false);
  const [showMeasureDetails, setShowMeasureDetails] = useState(false);

  const weightHistory = data.weightHistory || [];
  const weightPoints = weightHistory.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(h=>h.value);
  const photos = data.photos || [];
  const measurements = data.measurements || [];
  
  const weightValues = weightHistory.map(h => h.value);
  const overallMax = weightValues.length ? Math.max(...weightValues) : "--";
  const overallMin = weightValues.length ? Math.min(...weightValues) : "--";

  const [activePhoto, setActivePhoto] = useState(null);

  const addWeight=()=>{
    const val=parseFloat(newWeight);
    if(isNaN(val)) return notify("Ungültiges Gewicht","error");
    const entry={date:weightDate, value:val};
    setData(d=>({...d, weightHistory:[...weightHistory.filter(h=>h.date!==weightDate), entry]}));
    notify("Gewicht gespeichert! ⚖️");
    setShowAddWeight(false);
  };

  const delWeight=(date)=>{
    setData(d=>({...d, weightHistory:d.weightHistory.filter(h=>h.date!==date)}));
    notify("Eintrag gelöscht");
  };

  const handlePhotoUpload=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    notify("Foto wird hochgeladen...");
    try {
      const url = await uploadToStorage(file, `${authUser.uid}/progress/${Date.now()}_${file.name}`);
      const newPhoto = { id: Date.now(), date: photoDate, url, tag: photoTag };
      setData(d=>({...d, photos:[newPhoto, ...(d.photos||[])]}));
      notify("Foto gespeichert! 📸");
      setShowUploadPhoto(false);
    } catch(err) {
      notify("Upload fehlgeschlagen","error");
    }
  };

  const delPhoto=(id)=>{
    setData(d=>({...d, photos:d.photos.filter(p=>p.id!==id)}));
    notify("Foto gelöscht");
  };

  const toggleCompare=(id)=>{
    if(compareIds.includes(id)) setCompareIds(curr=>curr.filter(x=>x!==id));
    else if(compareIds.length < 2) setCompareIds(curr=>[...curr, id]);
  };

  const saveMeasure=()=>{
    if(!measureForm.date) return notify("Datum fehlt","error");
    setData(d=>({...d, measurements:[{...measureForm, id:Date.now()}, ...(d.measurements||[])]}));
    notify("Maße gespeichert! 📏");
    setShowAddMeasure(false);
  };

  const delMeasure=(id)=>{
    setData(d=>({...d, measurements:d.measurements.filter(m=>m.id!==id)}));
    notify("Maße gelöscht");
  };

  return(<div style={s.page}>
    <div style={s.pageHead}>
      <div><h1 style={s.pageTitle}>Fortschritt</h1><p style={s.pageSub}>Verfolge deine körperliche Entwicklung</p></div>
      <div style={isMobile ? {display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, width: "100%"} : {display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center"}}>
        <button style={{...s.secBtn, flex: isMobile ? "none" : 0, padding: isMobile ? "12px 8px" : s.secBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6}} onClick={()=>setShowHistory(true)}>
          {IC.history} {isMobile && <span style={{fontSize: 13}}>Verlauf</span>}
        </button>
        <button style={{...s.secBtn, flex: isMobile ? "none" : 0, padding: isMobile ? "12px 8px" : s.secBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6, fontSize: isMobile ? 13 : 14}} onClick={()=>setCompareMode(!compareMode)}>
          {compareMode ? IC.x : "Vergleichen"}
        </button>
        {!isMobile && <div style={{width: 1, height: 24, background: "#1E1E24", margin: "0 4px"}}/>}
        <button style={{...s.secBtn, flex: isMobile ? "none" : 0, padding: isMobile ? "12px 8px" : s.secBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6, background: "#A78BFA15", borderColor: "#A78BFA30", color: "#A78BFA", fontSize: isMobile ? 13 : 14}} onClick={()=>setShowAddMeasure(true)}>
          {IC.ruler} Maße
        </button>
        <button style={{...s.primaryBtn, flex: isMobile ? "none" : 0, padding: isMobile ? "12px 8px" : s.primaryBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6, fontSize: isMobile ? 13 : 14}} onClick={()=>setShowAddWeight(true)}>
          {IC.plus} Gewicht
        </button>
      </div>
    </div>

    {compareMode && (
      <div style={{...s.card, marginBottom:22, border:"1px solid #FF6B35"}} className="dropIn">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={s.cardTitle}>Foto-Vergleich</h3>
          <div style={{fontSize:12,color:"#888"}}>Wähle 2 Fotos aus ({compareIds.length}/2)</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,minHeight:200}}>
          {compareIds.length < 2 ? (
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",justifyContent:"center",color:"#444",fontStyle:"italic"}}>Bitte wähle zwei Fotos aus der Galerie unten aus.</div>
          ) : (
            compareIds.map(id => {
              const p = photos.find(x=>x.id===id);
              return <div key={id} style={{position:"relative"}}>
                <img src={p.url} style={{width:"100%",height:300,objectFit:"cover",borderRadius:12}} onClick={() => setActivePhoto(p)}/>
                <div style={{position:"absolute",bottom:10,left:10,background:"rgba(0,0,0,0.7)",padding:"4px 8px",borderRadius:6,fontSize:11}}>{fmtDate(p.date)} ({p.tag})</div>
              </div>
            })
          )}
        </div>
      </div>
    )}

    <div style={{...s.card, marginBottom:22}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, paddingBottom:8, borderBottom:"1px solid #1E1E24"}}>
        <div style={{flex:1, textAlign:"left"}}>
          <div style={{fontSize:9, color:"#666", fontWeight:800, textTransform:"uppercase", letterSpacing:1}}>MAXIMUM</div>
          <div style={{fontSize:16, fontWeight:800, color:"#EF476F"}}>{overallMax}<span style={{fontSize:10, marginLeft:6}}>kg</span></div>
        </div>
        <div style={{flex:1, textAlign:"center"}}>
          <div style={{fontSize:10, color:"#888", fontWeight:700}}>AKTUELLES GEWICHT</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:"#00D9C0"}}>{weightPoints.length?weightPoints[weightPoints.length-1].toFixed(1):"--"}<span style={{fontSize:13,color:"#666",fontWeight:400,marginLeft:6}}>kg</span></div>
        </div>
        <div style={{flex:1, textAlign:"right"}}>
          <div style={{fontSize:9, color:"#666", fontWeight:800, textTransform:"uppercase", letterSpacing:1}}>MINIMUM</div>
          <div style={{fontSize:16, fontWeight:800, color:"#06D6A0"}}>{overallMin}<span style={{fontSize:10, marginLeft:6}}>kg</span></div>
        </div>
      </div>
      <LineChart points={weightPoints} color="#00D9C0" height={200}/>
      
      <div style={{marginTop:24,borderTop:"1px solid #1A1A1F",paddingTop:20}}>
          <div style={{fontSize:11,fontWeight:800,color:"#666",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Letzte Einträge</div>
          <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:8}}>
            {weightHistory.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map(h=>(
              <div key={h.date} style={{background:"#161618",padding:"10px 16px",borderRadius:12,border:"1px solid #1E1E24",minWidth:120,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:"#666"}}>{fmtShort(new Date(h.date))}</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#F0EDE8"}}>{h.value}<span style={{fontSize:11,color:"#666",marginLeft:6}}>kg</span></div>
                </div>
                <button style={{background:"transparent",border:"none",color:"#444",padding:4,cursor:"pointer"}} onClick={()=>delWeight(h.date)}>{IC.trash}</button>
              </div>
            ))}
            {!weightHistory.length && <div style={{fontSize:12,color:"#444",textAlign:"center",padding:10,width:"100%"}}>Noch keine Einträge</div>}
          </div>
      </div>
    </div>
    <div style={s.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h3 style={s.cardTitle}>Fotostrecke</h3>
        <button style={s.primaryBtn} onClick={()=>setShowUploadPhoto(true)}>{IC.camera} Foto hochladen</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
        {photos.map(p=>(
          <div key={p.id} style={{position:"relative",borderRadius:14,overflow:"hidden",aspectRatio:"3/4",border:compareIds.includes(p.id)?"3px solid #FF6B35":"1px solid #1E1E24", cursor: "pointer"}} onClick={() => compareMode ? toggleCompare(p.id) : setActivePhoto(p)}>
            <img src={p.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent,rgba(0,0,0,0.8))",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:10}}>
              <div style={{fontSize:11,fontWeight:700}}>{fmtDate(p.date)}</div>
              <div style={{fontSize:9,color:"#FF6B35",fontWeight:800,textTransform:"uppercase"}}>{p.tag}</div>
            </div>
            {!compareMode && <button style={{position:"absolute",top:8,right:8,background:"rgba(239,71,111,0.2)",border:"none",color:"#EF476F",width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();delPhoto(p.id)}}>{IC.trash}</button>}
            {compareMode && compareIds.includes(p.id) && <div style={{position:"absolute",top:8,right:8,background:"#FF6B35",color:"#000",width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900}}>{compareIds.indexOf(p.id)+1}</div>}
          </div>
        ))}
        {!photos.length && <div style={{gridColumn:"1/-1",padding:40,textAlign:"center",color:"#444",border:"2px dashed #1E1E24",borderRadius:14}}>Noch keine Fortschrittsfotos hochgeladen.</div>}
      </div>
    </div>

    {activePhoto && <PhotoDetailModal photo={activePhoto} onClose={() => setActivePhoto(null)} isMobile={isMobile} />}

    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:18,marginBottom:22,marginTop:22}}>
      <div style={s.card}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18}}>
          <div style={{display:"flex", alignItems:"center", gap:12}}>
            <h3 style={s.cardTitle}>Aktuelle Körpermaße</h3>
            <button 
              onClick={() => setShowMeasureDetails(!showMeasureDetails)}
              style={{background:showMeasureDetails?"#FF6B3515":"#1E1E24", border:"none", color:showMeasureDetails?"#FF6B35":"#888", padding:"4px 8px", borderRadius:6, fontSize:10, fontWeight:800, cursor:"pointer"}}
            >
              {showMeasureDetails ? "AUSBLENDEN" : "ANZEIGEN"}
            </button>
          </div>
          {measurements.length > 0 && <div style={{fontSize:11, background:"#A78BFA15", color:"#A78BFA", padding:"4px 10px", borderRadius:6, fontWeight:700}}>Stand: {fmtDate(measurements[0].date)}</div>}
        </div>
        
        {showMeasureDetails && (
          measurements.length > 0 ? (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:12}} className="dropIn">
              {Object.entries(measurements[0].values).map(([k,v])=>(
                <div key={k} style={{background:"#161618",padding:"12px 14px",borderRadius:12,border:"1px solid #1E1E24",display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{color:"#666",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{k.replace(" (cm)","")}</div>
                  <div style={{fontWeight:800,fontSize:18,color:"#F0EDE8"}}>{v}<span style={{fontSize:12,color:"#666",fontWeight:400}}> cm</span></div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{padding:"40px 0",textAlign:"center",color:"#444",fontSize:13,border:"2px dashed #1E1E24",borderRadius:14}}>Noch keine Maße eingetragen</div>
          )
        )}
      </div>
    </div>

    {/* Modals */}
    {showAddWeight && (
      <div style={s.overlay2} onClick={()=>setShowAddWeight(false)}>
        <div style={s.modal} onClick={e=>e.stopPropagation()}>
          <h2 style={s.modalTitle}>Gewicht loggen</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            <div style={s.fg}><label style={s.lbl}>Gewicht (kg)</label><input style={s.inp} type="number" step="0.1" value={newWeight} onChange={e=>setNewWeight(e.target.value)} autoFocus/></div>
            <div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={weightDate} onChange={e=>setWeightDate(e.target.value)}/></div>
          </div>
          <div style={{display:"flex",gap:11}}><button style={s.secBtn} onClick={()=>setShowAddWeight(false)}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={addWeight}>Speichern</button></div>
        </div>
      </div>
    )}

    {showUploadPhoto && (
      <div style={s.overlay2} onClick={()=>setShowUploadPhoto(false)}>
        <div style={s.modal} onClick={e=>e.stopPropagation()}>
          <h2 style={s.modalTitle}>Foto hochladen</h2>
          <div style={s.fg}><label style={s.lbl}>Ansicht</label><select style={s.inp} value={photoTag} onChange={e=>setPhotoTag(e.target.value)}>{["Vorne","Seite","Hinten","Bizeps","Beine","Waage"].map(t=>(<option key={t}>{t}</option>))}</select></div>
          <div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={photoDate} onChange={e=>setPhotoDate(e.target.value)}/></div>
          <div style={s.fg}><label style={s.lbl}>Bild auswählen</label><input type="file" accept="image/*" style={s.inp} onChange={handlePhotoUpload}/></div>
          <button style={{...s.secBtn,width:"100%",marginTop:10}} onClick={()=>setShowUploadPhoto(false)}>Abbrechen</button>
        </div>
      </div>
    )}

    {showAddMeasure && (
      <div style={s.overlay2} onClick={()=>setShowAddMeasure(false)}>
        <div style={{...s.modal, maxWidth:450}} onClick={e=>e.stopPropagation()}>
          <h2 style={s.modalTitle}>Körpermaße</h2>
          <div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={measureForm.date} onChange={e=>setMeasureForm({...measureForm, date:e.target.value})}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            {MEASUREMENT_TYPES.map(m => (
              <div key={m} style={s.fg}>
                <label style={s.lbl}>{m}</label>
                <input style={s.inp} type="number" step="0.1" value={measureForm.values[m]||""} onChange={e=>setMeasureForm({...measureForm, values:{...measureForm.values, [m]:e.target.value}})} placeholder="0"/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:11}}><button style={s.secBtn} onClick={()=>setShowAddMeasure(false)}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={saveMeasure}>Speichern</button></div>
        </div>
      </div>
    )}

    {showHistory && (
      <div style={s.overlay2} onClick={()=>setShowHistory(false)}>
        <div style={{...s.modal, maxWidth:550, maxHeight:"85vh", display:"flex", flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h2 style={s.modalTitle}>{IC.history} Fortschritts-Historie</h2>
            <button style={{...s.secBtn, padding:8}} onClick={()=>setShowHistory(false)}>{IC.x}</button>
          </div>
          <div style={{overflowY:"auto", flex:1, paddingRight:5, marginTop: 10}}>
            {(() => {
              const combined = [
                ...weightHistory.map(h => ({type:'weight', date:h.date, value:h.value})),
                ...photos.map(p => ({type:'photo', date:p.date, value:p.url, tag:p.tag, id:p.id})),
                ...measurements.map(m => ({type:'measurement', date:m.date, values:m.values, id:m.id}))
              ].sort((a,b) => new Date(b.date) - new Date(a.date));

              if(!combined.length) return <div style={{textAlign:"center",padding:40,color:"#444"}}>Noch keine Einträge vorhanden</div>;

              return combined.map((item, idx) => (
                <div key={idx} style={{display:"flex", gap:16, marginBottom:20, borderLeft:"2px solid #1E1E24", paddingLeft:16, position:"relative"}}>
                  <div style={{position:"absolute", left:-6, top:0, width:10, height:10, borderRadius:"50%", background:"#FF6B35", border:"2px solid #0D0D0F"}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11, fontWeight:800, color:"#666", marginBottom:6}}>{fmtDate(item.date)}</div>
                    {item.type === 'weight' ? (
                      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", background:"#161618", padding:12, borderRadius:12}}>
                        <div>
                          <div style={{fontSize:10, color:"#888", marginBottom:2}}>Gewichtseintrag</div>
                          <div style={{fontSize:16, fontWeight:800, color:"#00D9C0"}}>{item.value} kg</div>
                        </div>

                        </div>

                    )}

                </div>
              ));
            })()}
          </div>
        </div>
      </div>
    )}
  </div>
  );
}

function Stats({data,prs,nutrition,user}){
  const [range,setRange]=useState(30);
  const safeW=Array.isArray(data?.workouts)?data.workouts:[];
  const cutoff=range==="all"?new Date(0):new Date(Date.now()-range*864e5);
  const filtered=safeW.filter(w=>{try{return new Date(w.date)>=cutoff;}catch{return false;}}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  
  const safeVol=w=>{try{return(w.exercises||[]).reduce((a,e)=>a+(e.sets||[]).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0),0);}catch{return 0;}};
  const totalW=safeW.length,totalD=safeW.reduce((a,w)=>a+(isFinite(w.duration)?+w.duration:0),0),totalVK=Math.round(safeW.reduce((a,w)=>a+safeVol(w),0)/1000),avgD=totalW?Math.round(totalD/totalW):0;
  
  // Consistency over selected range
  let consistency = 0;
  if (filtered.length > 0) {
    // Determine the timespan in days
    let days = range === "all" ? ((Date.now() - new Date(filtered[0].date).getTime()) / 86400000) : range;
    days = Math.max(1, days); // Prevent division by zero
    const weeksActive = Math.max(1, days / 7); // Calculate how many weeks that is
    consistency = (filtered.length / weeksActive).toFixed(1);
  }

  // Muscle Distribution
  const muscleCounts = {};
  filtered.forEach(w => {
    const plan = data.plans.find(p => p.id === w.planId);
    if (plan && plan.muscles) {
      plan.muscles.forEach(m => {
        muscleCounts[m] = (muscleCounts[m] || 0) + 1;
      });
    }
  });
  const totalWorkoutsInRange = filtered.length;
  const sortedMuscles = Object.entries(muscleCounts).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
  const maxMuscleCount = Math.max(...sortedMuscles.map(m=>m.count),1);

  return(<div style={s.page}>
    <div style={s.pageHead}>
      <div><h1 style={s.pageTitle}>Statistiken</h1><p style={s.pageSub}>Absolvierte Trainings im Überblick</p></div>
      <div style={{display:"flex",gap:8}}>
        {[7,30,90].map(d=><button key={d} style={{...s.secBtn,padding:"7px 14px",fontSize:12,...(range===d?{background:"#FF6B35",color:"#fff",borderColor:"#FF6B35"}:{})}} onClick={()=>setRange(d)}>{d}T</button>)}
        <button style={{...s.secBtn,padding:"7px 14px",fontSize:12,...(range==="all"?{background:"#FF6B35",color:"#fff",borderColor:"#FF6B35"}:{})}} onClick={()=>setRange("all")}>Gesamt</button>
      </div>
    </div>
    
    <div className="res-grid-4-2" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
      {[[totalW,"Trainings","#FF6B35"],[`${totalD}min`,"Gesamt-Zeit","#00D9C0"],[`${totalVK}k kg`,"Volumen","#A78BFA"],[`${avgD}min`,"Ø Dauer","#FFD166"]].map(([v,l,c],i)=>(
        <div key={i} style={{...s.card,padding:"20px 10px",textAlign:"center",display:"flex",flexDirection:"column",justifyContent:"center"}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,fontWeight:700,color:"#666",marginTop:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{l}</div></div>
      ))}
    </div>

    <div style={s.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
        <div>
          <h3 style={{...s.cardTitle,marginBottom:6}}>Muskelgruppe</h3>
          <div style={{fontSize:11,color:"#666"}}>Basierend auf {totalWorkoutsInRange} Trainingseinheiten</div>
        </div>
        <div style={{fontSize:12,fontWeight:700,color:"#666"}}>Ø Einheiten / Woche: <span style={{color:"#A78BFA",fontSize:16}}>{consistency}</span></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:15,marginTop:10}}>
        {sortedMuscles.length > 0 ? sortedMuscles.map(m=>(
          <div key={m.name}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:700,marginBottom:6}}>
              <span style={{color:"#F0EDE8"}}>{m.name}</span>
              <span style={{color:"#FF6B35",background:"#FF6B3515",padding:"2px 8px",borderRadius:6}}>{m.count}x</span>
            </div>
            <div style={{height:8,background:"#1A1A1F",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(m.count/maxMuscleCount*100)}%`,background:"linear-gradient(90deg,#00D9C0,#00F2DC)",borderRadius:4,transition:"width 0.4s ease"}}/>
            </div>
          </div>
        )) : <div style={{padding:"40px 0",textAlign:"center",color:"#444",fontSize:13,border:"1px dashed #1E1E24",borderRadius:12}}>Keine Muskeldaten für diesen Zeitraum</div>}
      </div>
    </div>
  </div>
);
}
function Nutrition({nutrition,setNutrition,user,notify,favFoods,setFavFoods,isMobile}){
  const [selDate,setSelDate]=useState(todayStr());
  const [showAdd,setShowAdd]=useState(false);
  const [meal,setMeal]=useState({name:"",calories:"",protein:"",carbs:"",fat:"",mealType:"Frühstück"});
  const [search,setSearch]=useState("");
  const [apiResults,setApiResults]=useState([]);
  const [apiLoading,setApiLoading]=useState(false);
  const [searchMode,setSearchMode]=useState("quick"); 
  const [scanning,setScanning]=useState(false);
  const [activeTab, setActiveTab] = useState("track");
  const [knowledgeSearch, setKnowledgeSearch] = useState("");
  
  const isFav = f => favFoods.some(x => x.name.toLowerCase() === f.name.toLowerCase());
  const toggleFav = f => {
    if (isFav(f)) setFavFoods(curr => curr.filter(x => x.name.toLowerCase() !== f.name.toLowerCase()));
    else setFavFoods(curr => [...curr, f]);
  };

  const scannerRef = useRef(null);
  const dayData=(nutrition && nutrition[selDate])||{calories:0,protein:0,carbs:0,fat:0,meals:[]};

  const lookupBarcode = async (code) => {
    setApiLoading(true);
    setScanning(false);
    if(scannerRef.current) {
      try { await scannerRef.current.stop(); } catch(e) {}
      scannerRef.current = null;
    }
    
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,nutriments,brands,quantity`, {
        headers: { 'User-Agent': 'FitForge - Web - 1.0' }
      });
      const data = await res.json();
      if(data.status === 1 && data.product) {
        const p = data.product;
        const n = (p && p.nutriments) || {};
        const found = {
          name: `${p.product_name || "Unbekannt"}${p.brands ? " (" + p.brands + ")" : ""}`,
          calories: Math.round(n["energy-kcal_100g"] || n["energy-kcal"] || 0),
          protein: Math.round((n.proteins_100g || 0) * 10) / 10,
          carbs: Math.round((n.carbohydrates_100g || 0) * 10) / 10,
          fat: Math.round((n.fat_100g || 0) * 10) / 10,
          mealType: "Sonstige"
        };
        setMeal(found);
        setShowAdd(true);
        notify("Produkt gefunden! 🎯");
      } else {
        notify("Barcode nicht gefunden 🔍", "error");
      }
    } catch(e) {
      console.error(e);
      notify("Fehler bei der Abfrage", "error");
    }
    setApiLoading(false);
  };

  const startScanner = async () => {
    if(!window.Html5Qrcode) return notify("Scanner-Bibliothek lädt noch...", "error");
    setScanning(true);
    setTimeout(() => {
      try {
        const scanner = new window.Html5Qrcode("reader");
        scannerRef.current = scanner;
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };
        scanner.start({ facingMode: "environment" }, config, (text) => {
          lookupBarcode(text);
        }).catch(err => {
          console.error(err);
          setScanning(false);
          notify("Kamera-Fehler 📷", "error");
        });
      } catch(e) {
        setScanning(false);
        notify("Fehler beim Starten des Scanners", "error");
      }
    }, 100);
  };

  const stopScanner = async () => {
    if(scannerRef.current) {
      try { await scannerRef.current.stop(); } catch(e) {}
      scannerRef.current = null;
    }
    setScanning(false);
  };

  const searchOpenFoodFacts=async(query)=>{
    if(!query||query.length<3)return;
    setApiLoading(true);
    try{
      const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?action=process&search_terms=${encodeURIComponent(query)}&sort_by=unique_scans_n&page_size=50&json=1`, {
        headers: { 'User-Agent': 'FitForge-HealthApp/1.0 (https://fitforge.app)' }
      });
      if(!res.ok) throw new Error("API_ERROR");
      const data=await res.json();
      const results=(data.products||[]).filter(p=>p.product_name && p.nutriments).map(p=>({
        name:`${p.product_name}${p.brands?" ("+p.brands+")":""}`,
        calories:Math.round(p.nutriments["energy-kcal_100g"] || p.nutriments["energy-kcal"] || (p.nutriments["energy-kj_100g"] / 4.184) || 0),
        protein:Math.round((p.nutriments.proteins_100g||0)*10)/10,
        carbs:Math.round((p.nutriments.carbohydrates_100g||0)*10)/10,
        fat:Math.round((p.nutriments.fat_100g||0)*10)/10,
        quantity:p.quantity||"100g",
        imageUrl:p.image_url
      })).filter(p=>p.calories>0);
      setApiResults(results);
    }catch(e){
      console.error("OFF Search Error:", e);
      notify(e.message==="API_ERROR"?"OFF-Server gerade überlastet (429/503). Bitte kurz warten.":"Fehler bei der Suche", "error");
    }
    setApiLoading(false);
  };

  useEffect(()=>{
    if(searchMode==="api"&&search.length>=3){
      const t=setTimeout(()=>searchOpenFoodFacts(search),600);
      return()=>clearTimeout(t);
    }
  },[search,searchMode]);

  useEffect(() => {
    return () => { if(scannerRef.current) scannerRef.current.stop().catch(()=>{}); };
  }, []);

  const calGoal=user.calorieGoal||2500,protGoal=user.proteinGoal||150,carbGoal=Math.round(calGoal*0.5/4),fatGoal=Math.round(calGoal*0.3/9);
  const addMeal=()=>{if(!meal.name||!meal.calories)return notify("Name und Kalorien ausfüllen","error");const entry={...meal,id:Date.now(),calories:parseInt(meal.calories)||0,protein:parseFloat(meal.protein)||0,carbs:parseFloat(meal.carbs)||0,fat:parseFloat(meal.fat)||0};setNutrition(n=>{const d=n[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[]};return{...n,[selDate]:{calories:d.calories+entry.calories,protein:d.protein+entry.protein,carbs:d.carbs+entry.carbs,fat:d.fat+entry.fat,meals:[...d.meals,entry]}};});notify(`${meal.name} hinzugefügt! ✅`);setMeal({name:"",calories:"",protein:"",carbs:"",fat:"",mealType:"Frühstück"});setShowAdd(false);};
  const quickAdd=food=>{setNutrition(n=>{const d=n[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[]};return{...n,[selDate]:{calories:d.calories+food.calories,protein:d.protein+food.protein,carbs:d.carbs+food.carbs,fat:d.fat+food.fat,meals:[...d.meals,{...food,id:Date.now(),mealType:"Sonstige"}]}};});notify(`${food.name} hinzugefügt!`);};
  const delMeal=id=>{setNutrition(n=>{const d=n[selDate];if(!d)return n;const rm=d.meals.find(m=>m.id===id);if(!rm)return n;return{...n,[selDate]:{calories:Math.max(0,d.calories-rm.calories),protein:Math.max(0,d.protein-rm.protein),carbs:Math.max(0,d.carbs-rm.carbs),fat:Math.max(0,d.fat-rm.fat),meals:d.meals.filter(m=>m.id!==id)}};});notify("Eintrag gelöscht");};
  const mealGroups=["Frühstück","Mittagessen","Abendessen","Snack","Sonstige"];
  const filtered=COMMON_FOODS.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));

  const filteredKnowledge = NUTRITION_KNOWLEDGE.filter(k => 
    k.title.toLowerCase().includes(knowledgeSearch.toLowerCase()) || 
    k.cat.toLowerCase().includes(knowledgeSearch.toLowerCase()) ||

  );

  return (
    <div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding}}>

        <div style={{display:"flex",alignItems: isMobile ? "flex-start" : "center", gap: isMobile ? 12 : 16, flexDirection: isMobile ? "column" : "row", justifyContent:"space-between", width:"100%"}}>
          <div>
            <h1 style={{...s.pageTitle, fontSize: isMobile ? 24 : 32}}>Ernährung</h1>
