@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.dropIn{animation:dropIn 0.25s cubic-bezier(0.16,1,0.3,1) both;}

.cardIconBtn:hover{background:#1A1A1F!important;color:#F0EDE8!important;}

input:focus,select:focus,textarea:focus{border-color:#FF6B35!important;outline:none;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=color]{-webkit-appearance:none;padding:0;}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border:none;border-radius:7px;}
.markAllBtn{background:transparent;border:none;color:#FF6B35;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;}
.profEditBtn:hover{color:#F0EDE8!important;}

  move:<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>,

function genNotifs(data,user){const n=[],t=new Date(),ti=t.getDay()===0?6:t.getDay()-1,tn=FULL_WEEKDAYS[ti],tmn=FULL_WEEKDAYS[(ti+1)%7];data.plans.forEach(p=>{if(p.days.includes(tn))n.push({id:`today-${p.id}`,type:"training",title:"Training heute! 💪",body:`${p.name} steht heute an!`,read:false,ts:Date.now()-3e5});if(p.days.includes(tmn))n.push({id:`tmrw-${p.id}`,type:"reminder",title:"Training morgen 📅",body:`${p.name} steht morgen auf dem Plan!`,read:false,ts:Date.now()-36e5});});const last=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];if(last){const d=Math.floor((t-new Date(last.date))/864e5);if(d>=3)n.push({id:"rest",type:"warning",title:"Lange Pause 😴",body:`Letztes Training vor ${d} Tagen!`,read:false,ts:Date.now()-18e5});}if(data.workouts.length>=5)n.push({id:`mile-${data.workouts.length}`,type:"achievement",title:"Meilenstein 🏆",body:`${data.workouts.length} Trainings – weiter so!`,read:true,ts:Date.now()-864e5});return n;}
let _chartId=0;
function LineChart({points,color="#FF6B35",height=80}){
  const id=useRef(`lc${++_chartId}`).current;
  if(!points||points.length<2)return<div style={{color:"#555",fontSize:13,padding:"20px 0",textAlign:"center"}}>Noch nicht genug Daten</div>;
  const W=500,H=height,pad=12;
  const vals=points.map(v=>isFinite(v)?v:0);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const xs=vals.map((_,i)=>pad+(i/(vals.length-1))*(W-pad*2));
  const ys=vals.map(v=>H-pad-((v-mn)/rng)*(H-pad*2));
  const d=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area=`${d} L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block"}} preserveAspectRatio="none">
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map((x,i)=><circle key={i} cx={x.toFixed(1)} cy={ys[i].toFixed(1)} r="4" fill={color} stroke="#111114" strokeWidth="2"/>)}
    </svg>
  );
}
function BarChart({bars,color="#FF6B35",height=90}){
  if(!bars||!bars.length)return null;
  const W=500,H=height,pad=4,gap=6;
  const mx=Math.max(...bars.map(b=>b.v),1);
  const bw=(W-pad*2-gap*(bars.length-1))/bars.length;
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",height:H+20,display:"block"}}>
      {bars.map((b,i)=>{
        const bh=b.v>0?Math.max((b.v/mx)*(H-pad),4):0;
        const x=pad+i*(bw+gap),y=H-bh;
        return(<g key={i}><rect x={x} y={y} width={bw} height={bh} rx="4" fill={color} opacity="0.82"/><text x={x+bw/2} y={H+15} textAnchor="middle" fontSize="11" fill="#555">{b.l}</text></g>);
      })}
    </svg>
  );
}
function DonutChart({value,max,color="#FF6B35",size=80,label=""}){const r=30,circ=2*Math.PI*r,pct=Math.min(value/Math.max(max,1),1),dash=pct*circ;return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><svg width={size} height={size} viewBox="0 0 80 80"><circle cx="40" cy="40" r={r} fill="none" stroke="#1E1E24" strokeWidth="8"/><circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform="rotate(-90 40 40)" style={{transition:"stroke-dasharray 0.5s"}}/><text x="40" y="44" textAnchor="middle" fontSize="12" fontWeight="800" fill="#F0EDE8" fontFamily="Syne,sans-serif">{Math.round(pct*100)}%</text></svg>{label&&<div style={{fontSize:10,color:"#666",textAlign:"center",maxWidth:70}}>{label}</div>}</div>);}
const COMMON_FOODS=[{name:"Hähnchenbrust (100g)",calories:165,protein:31,carbs:0,fat:3.6},{name:"Reis gekocht (100g)",calories:130,protein:2.7,carbs:28,fat:0.3},{name:"Ei",calories:78,protein:6,carbs:0.6,fat:5},{name:"Haferflocken (100g)",calories:371,protein:13,carbs:58,fat:7},{name:"Banane",calories:89,protein:1.1,carbs:23,fat:0.3},{name:"Magerquark (100g)",calories:59,protein:12,carbs:4,fat:0.3},{name:"Protein Shake",calories:120,protein:25,carbs:3,fat:1.5},{name:"Thunfisch Dose (100g)",calories:116,protein:26,carbs:0,fat:1},{name:"Vollkornbrot (Scheibe)",calories:81,protein:4,carbs:15,fat:1},{name:"Mandeln (30g)",calories:174,protein:6,carbs:6,fat:15},{name:"Lachs (100g)",calories:208,protein:20,carbs:0,fat:13},{name:"Süßkartoffel (100g)",calories:86,protein:1.6,carbs:20,fat:0.1},{name:"Griechischer Joghurt",calories:97,protein:9,carbs:6,fat:5},{name:"Avocado (½)",calories:120,protein:1.5,carbs:6,fat:11}];
function FitForge(){
  const [data,setData]=useState(defaultData);
  const [user,setUser]=useState(defaultUser);
  const [prs,setPrs]=useState(defaultPRs);
  const [nutrition,setNutrition]=useState({});
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState("dashboard");
  const [animK,setAnimK]=useState(0);
  const [logModal,setLogModal]=useState(false);
  const [planModal,setPlanModal]=useState(false);
  const [editPlan,setEditPlan]=useState(null);
  const [profileOpen,setProfileOpen]=useState(false);
  const [notifOpen,setNotifOpen]=useState(false);
  const [selWO,setSelWO]=useState(null);
  const [toast,setToast]=useState(null);
  const [notifs,setNotifs]=useState([]);

  // ── Load initial data from Firestore ──────────────────────────────────────
  useEffect(()=>{
    Promise.all([
      fbGet("data", defaultData),
      fbGet("user", defaultUser),
      fbGet("prs",  defaultPRs),
      fbGet("nutrition", {}),
    ]).then(([d,u,p,n])=>{
      setData(d); setUser(u); setPrs(p); setNutrition(n);
      setLoaded(true);
    });
  },[]);

  // ── Sync to Firestore on every change (debounced 800ms) ───────────────────
  const debRef=useRef({});
  const syncFb=(key,val)=>{
    clearTimeout(debRef.current[key]);
    debRef.current[key]=setTimeout(()=>fbSet(key,val),800);
  };
  useEffect(()=>{if(loaded)syncFb("data",data);},[data,loaded]);
  useEffect(()=>{if(loaded)syncFb("user",user);},[user,loaded]);
  useEffect(()=>{if(loaded)syncFb("prs",prs);},[prs,loaded]);
  useEffect(()=>{if(loaded)syncFb("nutrition",nutrition);},[nutrition,loaded]);

  useEffect(()=>{setAnimK(k=>k+1);},[view]);
  useEffect(()=>{
    const gen=genNotifs(data,user);
    const stored=notifs.length?notifs:[];
    const ids=new Set(stored.map(n=>n.id));
    const merged=[...gen.filter(g=>!ids.has(g.id)),...stored].slice(0,20);
    setNotifs(merged);
  },[data.plans.length,data.workouts.length]);

  const unread=notifs.filter(n=>!n.read).length;
  const markAll=()=>setNotifs(n=>n.map(x=>({...x,read:true})));
  const markRead=id=>setNotifs(n=>n.map(x=>x.id===id?{...x,read:true}:x));
  const delNotif=id=>setNotifs(n=>n.filter(x=>x.id!==id));

  if(!loaded) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0D0D0F",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid #FF6B35",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:"#666",fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>Verbinde mit Firebase...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
    </div>
  );
  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const closeAll=()=>{setProfileOpen(false);setNotifOpen(false);};
  const totalVol=data.workouts.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.weight*s.reps,0),0),0);
  const thisWeek=data.workouts.filter(w=>new Date(w.date)>=new Date(Date.now()-7*864e5));

    <div style={s.fg}><label style={s.lbl}>Farbe</label><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:38,height:38,borderRadius:9,background:form.color,border:"2px solid #3A3A40",flexShrink:0}}/><input type="color" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} style={{flex:1,height:38,borderRadius:9,border:"1px solid #2A2A30",background:"transparent",cursor:"pointer",padding:2}}/></div><div style={{display:"flex",gap:7,flexWrap:"wrap",marginTop:9}}>{["#FF6B35","#EF476F","#FFD166","#06D6A0","#00D9C0","#118AB2","#A78BFA","#F72585","#7209B7","#4361EE","#4CC9F0","#FF9F1C","#2EC4B6","#CBFF8C","#FF6B6B"].map(c=>(<div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",outline:form.color===c?`3px solid ${c}`:"none",outlineOffset:2}} className="colorSwatch"/>))}</div></div>
    <div style={s.fg}><label style={s.lbl}>Trainingstage</label><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{FULL_WEEKDAYS.map((day,i)=><button key={day} onClick={()=>toggleDay(day)} style={{...s.dayToggle,...(form.days.includes(day)?{background:form.color,color:"#fff",borderColor:form.color}:{})}}>{WEEKDAYS[i]}</button>)}</div></div>
    <div style={s.fg}><label style={s.lbl}>Übungen</label><div style={{display:"flex",gap:9,marginBottom:9}}><input style={{...s.inp,flex:1}} value={exInput} onChange={e=>setExInput(e.target.value)} placeholder="Übung hinzufügen..." onKeyDown={e=>e.key==="Enter"&&addEx()}/><button style={s.addBtn} onClick={addEx}>{IC.plus}</button></div><div style={{display:"flex",flexDirection:"column",gap:7}}>{form.exercises.map((ex,idx)=>(<div key={idx} style={{display:"flex",alignItems:"center",gap:9,background:"#0D0D0F",borderRadius:9,padding:"9px 11px"}}><div style={{position:"relative",flexShrink:0,cursor:"pointer"}} onClick={()=>fileRefs.current[idx]?.click()}>{ex.photo?<img src={ex.photo} alt={ex.name} style={{width:40,height:40,borderRadius:7,objectFit:"cover"}}/>:<div style={{width:40,height:40,borderRadius:7,background:"#1A1A1F",border:"1px dashed #3A3A40",display:"flex",alignItems:"center",justifyContent:"center",color:"#555"}}>{IC.camera}</div>}<input ref={el=>fileRefs.current[idx]=el} type="file" accept="image/*" style={{display:"none"}} onChange={e=>setExPhoto(idx,e.target.files[0])}/></div><input style={{flex:1,fontSize:15,fontWeight:600,background:"transparent",border:"none",borderBottom:"1px solid #2A2A30",color:"#F0EDE8",padding:"2px 4px",fontFamily:"'DM Sans',sans-serif",outline:"none"}} value={ex.name} onChange={e=>setForm(f=>{const ex=[...f.exercises];ex[idx]={...ex[idx],name:e.target.value};return{...f,exercises:ex};})} onFocus={e=>e.target.style.borderBottomColor="#FF6B35"} onBlur={e=>e.target.style.borderBottomColor="#2A2A30"}/><button style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",display:"flex",padding:3}} onClick={()=>setForm(f=>({...f,exercises:f.exercises.filter((_,i)=>i!==idx)}))}>{IC.x}</button></div>))}</div></div>
    <div style={{display:"flex",gap:11,marginTop:18}}><button style={s.secBtn} onClick={onClose}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={save}>{isEdit?"Speichern":"Plan erstellen"}</button></div>
  </div></div>);}
function QuickLogModal({data,setData,onClose,notify}){const [name,setName]=useState(""), [dur,setDur]=useState("");const save=()=>{if(!name)return notify("Name fehlt","error");setData(d=>({...d,workouts:[{id:Date.now(),planId:null,name,date:todayStr(),duration:parseInt(dur)||0,note:"",photo:null,exercises:[]},...d.workouts]}));notify("Gestartet! 🚀");onClose();};return(<div style={s.overlay2} onClick={onClose}><div style={s.modal} onClick={e=>e.stopPropagation()} className="dropIn"><h2 style={s.modalTitle}>Schnell-Log</h2><div style={s.fg}><label style={s.lbl}>Name</label><input style={s.inp} value={name} onChange={e=>setName(e.target.value)} placeholder="Training Name" autoFocus/></div><div style={s.fg}><label style={s.lbl}>Dauer (Min)</label><input style={s.inp} type="number" value={dur} onChange={e=>setDur(e.target.value)} placeholder="60"/></div><div style={{display:"flex",gap:11,marginTop:18}}><button style={s.secBtn} onClick={onClose}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={save}>Speichern</button></div></div></div>);}
function ProfilePage({user,setUser,notify}){const [form,setForm]=useState({...user});const fileRef=useRef();const handleAv=e=>{const f=e.target.files[0];if(!f)return;readFile(f).then(d=>setForm(f2=>({...f2,avatar:d})));};const save=()=>{setUser(form);notify("Profil gespeichert! ✅");};return(<div style={s.page}><div style={s.pageHead}><div><h1 style={s.pageTitle}>Mein Profil</h1><p style={s.pageSub}>Daten & Einstellungen</p></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
  <div style={s.card}><h3 style={s.cardTitle}>Persönliche Daten</h3><div style={{display:"flex",alignItems:"center",gap:18,marginBottom:24}}><div className="avCircle" style={{width:76,height:76,borderRadius:"50%",background:"#1A1A1F",border:"2px dashed #3A3A40",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",overflow:"hidden",flexShrink:0}} onClick={()=>fileRef.current.click()}>{form.avatar?<img src={form.avatar} alt="av" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>:<span style={{fontSize:28,fontFamily:"'Syne',sans-serif",fontWeight:800,color:"#FF6B35"}}>{getInitials(form)}</span>}<div className="avOverlay" style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",opacity:0,transition:"opacity 0.2s"}}>{IC.camera}</div></div><input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleAv}/><div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16}}>{form.firstName||form.lastName?`${form.firstName} ${form.lastName}`.trim():"Dein Name"}</div></div></div>
  <div style={s.formGrid}><div style={s.fg}><label style={s.lbl}>Vorname</label><input style={s.inp} value={form.firstName} onChange={e=>setForm(f=>({...f,firstName:e.target.value}))} placeholder="Max"/></div><div style={s.fg}><label style={s.lbl}>Nachname</label><input style={s.inp} value={form.lastName} onChange={e=>setForm(f=>({...f,lastName:e.target.value}))} placeholder="Mustermann"/></div></div>
  <div style={s.fg}><label style={s.lbl}>E-Mail</label><input style={s.inp} type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="max@beispiel.de"/></div>
  <div style={s.formGrid}><div style={s.fg}><label style={s.lbl}>Gewicht (kg)</label><input style={s.inp} type="number" value={form.weight} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} placeholder="80"/></div><div style={s.fg}><label style={s.lbl}>Größe (cm)</label><input style={s.inp} type="number" value={form.height} onChange={e=>setForm(f=>({...f,height:e.target.value}))} placeholder="180"/></div></div>
  <div style={s.fg}><label style={s.lbl}>Fitnessziel</label><select style={s.inp} value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))}>{["Muskelaufbau","Gewichtsverlust","Ausdauer","Fitness & Gesundheit","Kraft steigern"].map(g=><option key={g}>{g}</option>)}</select></div></div>
  <div style={s.card}><h3 style={s.cardTitle}>Ernährungsziele</h3><div style={s.fg}><label style={s.lbl}>Tageskalorienziel</label><input style={s.inp} type="number" value={form.calorieGoal||""} onChange={e=>setForm(f=>({...f,calorieGoal:parseInt(e.target.value)||2500}))} placeholder="2500"/></div><div style={s.fg}><label style={s.lbl}>Proteinziel (g/Tag)</label><input style={s.inp} type="number" value={form.proteinGoal||""} onChange={e=>setForm(f=>({...f,proteinGoal:parseInt(e.target.value)||150}))} placeholder="150"/></div><div style={{height:1,background:"#1E1E24",margin:"18px 0"}}/><h3 style={{...s.cardTitle,marginBottom:14}}>Benachrichtigungen</h3><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #1E1E24"}}><div><div style={{fontWeight:700,fontSize:15}}>Erinnerungen</div><div style={{color:"#666",fontSize:11,marginTop:2}}>Wenn Training ansteht</div></div><div style={{...s.toggle,...(form.notificationsEnabled?s.toggleOn:{})}} onClick={()=>setForm(f=>({...f,notificationsEnabled:!f.notificationsEnabled}))}><div style={{...s.thumb,...(form.notificationsEnabled?s.thumbOn:{})}}/></div></div>{form.notificationsEnabled&&<div style={{...s.fg,marginTop:14}}><label style={s.lbl}>Erinnerungszeit</label><input style={s.inp} type="time" value={form.reminderTime} onChange={e=>setForm(f=>({...f,reminderTime:e.target.value}))}/></div>}</div>
</div><button style={{...s.primaryBtn,marginTop:22}} onClick={save}>💾 Speichern</button></div>);}
// ─── Docs Page ────────────────────────────────────────────────────────────────
const TAG_COLORS=["#FF6B35","#00D9C0","#FFD166","#A78BFA","#EF476F","#06D6A0","#4361EE","#F72585"];

function DocsPage({notify}){
  const [folders,setFolders]=useState(()=>{try{const r=localStorage.getItem("ff_folders");return r?JSON.parse(r):[{id:"default",name:"Allgemein",color:"#FF6B35"},{id:"training",name:"Training",color:"#00D9C0"},{id:"ernaehrung",name:"Ernährung",color:"#FFD166"}];}catch{return[];}});
  const [docs,setDocs]=useState(()=>{try{const r=localStorage.getItem("ff_docs");return r?JSON.parse(r):[];}catch{return[];}});
  const [selFolder,setSelFolder]=useState("all");
  const [dragDoc,setDragDoc]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [preview,setPreview]=useState(null);
  const [newFolderModal,setNewFolderModal]=useState(false);
  const [newFolderName,setNewFolderName]=useState("");
  const [newFolderColor,setNewFolderColor]=useState("#FF6B35");
  const [tagModal,setTagModal]=useState(null);
  const [tagInput,setTagInput]=useState("");
  const [renaming,setRenaming]=useState(null);
  const [renameVal,setRenameVal]=useState("");
  const fileRef=useRef();

  useEffect(()=>localStorage.setItem("ff_folders",JSON.stringify(folders)),[folders]);
  useEffect(()=>localStorage.setItem("ff_docs",JSON.stringify(docs)),[docs]);

  const uploadDocs=async(files)=>{
    const arr=Array.from(files);
    for(const file of arr){
      if(file.type!=="application/pdf"&&!file.name.endsWith(".pdf")){notify(`${file.name} ist kein PDF`,"error");continue;}
      const reader=new FileReader();
      reader.onload=e=>{
        const newDoc={id:Date.now()+Math.random(),name:file.name.replace(".pdf",""),folderId:selFolder==="all"?"default":selFolder,tags:[],data:e.target.result,size:Math.round(file.size/1024),uploadedAt:new Date().toISOString()};
        setDocs(d=>[...d,newDoc]);
        notify(`${newDoc.name} hochgeladen! 📄`);
      };
      reader.readAsDataURL(file);
      await new Promise(r=>setTimeout(r,100));
    }
  };

  const delDoc=id=>{setDocs(d=>d.filter(x=>x.id!==id));notify("Dokument gelöscht");};
  const delFolder=id=>{
    if(id==="default")return notify("Standard-Ordner kann nicht gelöscht werden","error");
    setDocs(d=>d.map(x=>x.folderId===id?{...x,folderId:"default"}:x));
    setFolders(f=>f.filter(x=>x.id!==id));
    if(selFolder===id)setSelFolder("all");
    notify("Ordner gelöscht");
  };

  const addFolder=()=>{
    if(!newFolderName.trim())return;
    const id=Date.now().toString();
    setFolders(f=>[...f,{id,name:newFolderName.trim(),color:newFolderColor}]);
    setNewFolderModal(false);setNewFolderName("");
    notify(`Ordner "${newFolderName}" erstellt! 📁`);
  };

  const addTag=(docId,tag)=>{
    if(!tag.trim())return;
    setDocs(d=>d.map(x=>x.id===docId?{...x,tags:[...new Set([...(x.tags||[]),tag.trim()])]}:x));
  };
  const removeTag=(docId,tag)=>setDocs(d=>d.map(x=>x.id===docId?{...x,tags:(x.tags||[]).filter(t=>t!==tag)}:x));

  const moveDoc=(docId,folderId)=>{
    setDocs(d=>d.map(x=>x.id===docId?{...x,folderId}:x));
    notify("Dokument verschoben! 📁");
  };

  const renameDoc=(id,name)=>{setDocs(d=>d.map(x=>x.id===id?{...x,name}:x));setRenaming(null);};

  const onDragStart=(e,docId)=>{setDragDoc(docId);e.dataTransfer.effectAllowed="move";};
  const onDragOverFolder=(e,folderId)=>{e.preventDefault();setDragOver(folderId);};
  const onDropFolder=(e,folderId)=>{e.preventDefault();if(dragDoc)moveDoc(dragDoc,folderId);setDragDoc(null);setDragOver(null);};

  const visibleDocs=selFolder==="all"?docs:docs.filter(d=>d.folderId===selFolder);
  const folder=folders.find(f=>f.id===selFolder);

  return(
    <div style={{display:"flex",height:"calc(100vh - 57px)",overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:220,background:"#0D0D0F",borderRight:"1px solid #1E1E24",display:"flex",flexDirection:"column",padding:"20px 12px",flexShrink:0,overflowY:"auto"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10,padding:"0 6px"}}>Ordner</div>
        {/* All */}
        <button onClick={()=>setSelFolder("all")} style={{...docS.folderBtn,...(selFolder==="all"?docS.folderBtnOn:{})}}
          onDragOver={e=>{e.preventDefault();setDragOver("all");}} onDrop={e=>{e.preventDefault();if(dragDoc)moveDoc(dragDoc,"default");setDragDoc(null);setDragOver(null);}}>
          <span style={{color:"#888",display:"flex"}}>{IC.folder}</span>
          <span style={{flex:1}}>Alle Dokumente</span>
          <span style={{fontSize:11,color:"#555",background:"#1A1A1F",borderRadius:10,padding:"1px 7px"}}>{docs.length}</span>
        </button>
        {/* Folders */}
        {folders.map(f=>(
          <div key={f.id} style={{position:"relative",group:true}}
            onDragOver={e=>onDragOverFolder(e,f.id)} onDrop={e=>onDropFolder(e,f.id)}>
            <button onClick={()=>setSelFolder(f.id)} style={{...docS.folderBtn,...(selFolder===f.id?{...docS.folderBtnOn,background:f.color+"18",borderColor:f.color+"44"}:{}),...(dragOver===f.id?{borderColor:f.color,background:f.color+"25"}:{})}}>
              <span style={{color:f.color,display:"flex"}}>{IC.folder}</span>
              <span style={{flex:1,fontSize:14}}>{f.name}</span>
              <span style={{fontSize:11,color:"#555",background:"#1A1A1F",borderRadius:10,padding:"1px 7px"}}>{docs.filter(d=>d.folderId===f.id).length}</span>
            </button>
            {f.id!=="default"&&<button style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:"#333",cursor:"pointer",padding:3,display:"flex",borderRadius:4}} className="folderDelBtn" onClick={e=>{e.stopPropagation();delFolder(f.id);}}>{IC.x}</button>}
          </div>
        ))}
        <button style={{...docS.folderBtn,color:"#FF6B35",borderStyle:"dashed",marginTop:8}} onClick={()=>setNewFolderModal(true)}>
          {IC.plus} <span style={{fontSize:13}}>Neuer Ordner</span>
        </button>
      </div>

      {/* Main area */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Toolbar */}
        <div style={{padding:"16px 24px",borderBottom:"1px solid #1E1E24",display:"flex",alignItems:"center",gap:12,background:"#0D0D0F"}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>{selFolder==="all"?"Alle Dokumente":folder?.name||"Dokumente"}</div>
            <div style={{fontSize:13,color:"#666",marginTop:2}}>{visibleDocs.length} Dokument{visibleDocs.length!==1?"e":""}</div>
          </div>
          <input ref={fileRef} type="file" accept="application/pdf,.pdf" multiple style={{display:"none"}} onChange={e=>uploadDocs(e.target.files)}/>
          <button style={docS.uploadBtn} onClick={()=>fileRef.current.click()}>
            {IC.plus} PDF hochladen
          </button>
        </div>

        {/* Drop zone + grid */}
        <div style={{flex:1,overflowY:"auto",padding:24}}
          onDragOver={e=>{e.preventDefault();e.currentTarget.style.background="#FF6B3508";}}
          onDragLeave={e=>{e.currentTarget.style.background="";}}
          onDrop={e=>{e.preventDefault();e.currentTarget.style.background="";const files=e.dataTransfer.files;if(files.length)uploadDocs(files);}}>

          {!visibleDocs.length&&(
            <div style={{textAlign:"center",padding:"80px 20px",color:"#555",border:"2px dashed #1E1E24",borderRadius:18}}>
              <div style={{fontSize:48,marginBottom:16}}>📄</div>
              <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Keine Dokumente</div>
              <div style={{fontSize:13}}>PDFs hier reinziehen oder oben hochladen</div>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:16}}>
            {visibleDocs.map(doc=>(
              <div key={doc.id} draggable onDragStart={e=>onDragStart(e,doc.id)}
                style={{...docS.docCard,...(dragDoc===doc.id?{opacity:0.5,transform:"scale(0.97)"}:{})}} className="docCard">
                {/* PDF Preview thumbnail */}
                <div style={{height:120,background:"#0D0D0F",borderRadius:10,overflow:"hidden",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",border:"1px solid #1E1E24"}}
                  onClick={()=>setPreview(doc)}>
                  {doc.data?(
                    <iframe src={`${doc.data}#toolbar=0&navpanes=0&scrollbar=0&page=1`} style={{width:"100%",height:"200%",border:"none",pointerEvents:"none",marginTop:"-50%"}} title={doc.name}/>
                  ):(
                    <div style={{color:"#333",fontSize:36}}>📄</div>
                  )}
                  <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0)",transition:"background 0.2s"}} className="pdfOverlay"/>
                  <div style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.7)",borderRadius:6,padding:"3px 7px",fontSize:10,color:"#aaa"}}>{doc.size}KB</div>
                </div>

                {/* Name */}
                {renaming===doc.id?(
                  <input autoFocus style={{...docS.renameInp}} value={renameVal}
                    onChange={e=>setRenameVal(e.target.value)}
                    onBlur={()=>renameDoc(doc.id,renameVal||doc.name)}
                    onKeyDown={e=>{if(e.key==="Enter")renameDoc(doc.id,renameVal||doc.name);if(e.key==="Escape")setRenaming(null);}}/>
                ):(
                  <div style={{fontSize:13,fontWeight:700,marginBottom:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",cursor:"pointer"}}
                    onDoubleClick={()=>{setRenaming(doc.id);setRenameVal(doc.name);}}>
                    {doc.name}
                  </div>
                )}

                {/* Tags */}
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8,minHeight:20}}>
                  {(doc.tags||[]).map((tag,ti)=>(
                    <span key={ti} style={{fontSize:10,background:TAG_COLORS[ti%TAG_COLORS.length]+"22",color:TAG_COLORS[ti%TAG_COLORS.length],borderRadius:6,padding:"2px 7px",display:"flex",alignItems:"center",gap:3,cursor:"pointer"}}
                      onClick={()=>removeTag(doc.id,tag)}>
                      {tag} ×
                    </span>
                  ))}
                  <button style={{fontSize:10,background:"#1A1A1F",border:"1px dashed #2A2A30",color:"#666",borderRadius:6,padding:"2px 7px",cursor:"pointer",display:"flex",alignItems:"center",gap:3}}
                    onClick={()=>{setTagModal(doc.id);setTagInput("");}}>
                    {IC.tag} Tag
                  </button>
                </div>

                {/* Folder badge + actions */}
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {(()=>{const f=folders.find(x=>x.id===doc.folderId);return f?<span style={{fontSize:10,background:f.color+"20",color:f.color,borderRadius:6,padding:"2px 8px",fontWeight:600}}>{f.name}</span>:null;})()}
                  <div style={{flex:1}}/>
                  <button style={docS.iconAct} title="Vorschau" onClick={()=>setPreview(doc)}>{IC.image}</button>
                  <button style={docS.iconAct} title="Löschen" onClick={()=>delDoc(doc.id)}>{IC.trash}</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* PDF Preview Modal */}
      {preview&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setPreview(null)}>
          <div style={{background:"#111114",borderRadius:18,overflow:"hidden",width:"min(90vw,900px)",height:"90vh",display:"flex",flexDirection:"column",border:"1px solid #2A2A30"}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:"14px 20px",borderBottom:"1px solid #1E1E24",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:18}}>📄</span>
              <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,flex:1}}>{preview.name}</span>
              <span style={{fontSize:12,color:"#666"}}>{preview.size}KB</span>
              <button style={{background:"transparent",border:"none",color:"#888",cursor:"pointer",padding:6,display:"flex",borderRadius:8}} onClick={()=>setPreview(null)}>{IC.x}</button>
            </div>
            <iframe src={preview.data} style={{flex:1,border:"none",width:"100%"}} title={preview.name}/>
          </div>
        </div>
      )}

      {/* Tag Modal */}
      {tagModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setTagModal(null)}>
          <div style={{background:"#111114",borderRadius:16,padding:24,width:320,border:"1px solid #2A2A30"}} onClick={e=>e.stopPropagation()} className="dropIn">
            <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,margin:"0 0 16px"}}>Tag hinzufügen</h3>
            <input autoFocus style={{...docS.renameInp,width:"100%",padding:"10px 14px",marginBottom:12,fontSize:14}} placeholder="Tag eingeben..."
              value={tagInput} onChange={e=>setTagInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&tagInput.trim()){addTag(tagModal,tagInput);setTagModal(null);}}}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
              {["Wichtig","Vertrag","Rezept","Workout","Medizin","Finanzen","Personal"].map(t=>(
                <button key={t} style={{background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:8,padding:"5px 12px",color:"#aaa",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}
                  onClick={()=>{addTag(tagModal,t);setTagModal(null);}}>{t}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button style={{...docS.secBtn2}} onClick={()=>setTagModal(null)}>Abbrechen</button>
              <button style={{...docS.primBtn2,flex:1}} onClick={()=>{if(tagInput.trim()){addTag(tagModal,tagInput);setTagModal(null);}}}>Hinzufügen</button>
            </div>
          </div>
        </div>
      )}

      {/* New Folder Modal */}
      {newFolderModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setNewFolderModal(false)}>
          <div style={{background:"#111114",borderRadius:16,padding:24,width:320,border:"1px solid #2A2A30"}} onClick={e=>e.stopPropagation()} className="dropIn">
            <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,margin:"0 0 16px"}}>Neuer Ordner</h3>
            <input autoFocus style={{...docS.renameInp,width:"100%",padding:"10px 14px",marginBottom:12,fontSize:14}} placeholder="Ordner-Name..."
              value={newFolderName} onChange={e=>setNewFolderName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addFolder()}/>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:16}}>
              {TAG_COLORS.map(c=>(
                <div key={c} onClick={()=>setNewFolderColor(c)} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",outline:newFolderColor===c?`3px solid ${c}`:"none",outlineOffset:2,transition:"transform 0.15s"}} className="colorSwatch"/>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button style={docS.secBtn2} onClick={()=>setNewFolderModal(false)}>Abbrechen</button>
              <button style={{...docS.primBtn2,flex:1}} onClick={addFolder}>Erstellen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
